.appHeader .brand{

  align-items:center;

.appHeader .brandMark{
  width:46px;
  height:46px;
  display:grid;

.appHeader .brandText{

  font-size:18px;

}
.appHeader .brandSub{

}
.appWaitIndicator{
  position:fixed;
  top:12px;
  left:50%;
  z-index:1450;
  display:none;
  align-items:center;
  gap:9px;
  max-width:min(420px,calc(100vw - 32px));
  padding:9px 14px;
  border:1px solid #bfdbfe;
  border-radius:999px;
  background:rgba(255,255,255,.96);
  box-shadow:0 8px 24px rgba(15,23,42,.12);
  color:#1e3a8a;
  font-size:13px;
  font-weight:900;
  transform:translateX(-50%);
  overflow:hidden;
}
.appWaitIndicator.is-active{
  display:flex;
}
.appWaitIndicator::after{
  content:'';
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#2563eb,transparent);
  animation:appWaitSweep 1.05s linear infinite;
}
.appWaitSpinner{
  width:15px;
  height:15px;
  flex:0 0 auto;
  border:2px solid #bfdbfe;
  border-top-color:#2563eb;
  border-radius:50%;
  animation:appWaitSpin .72s linear infinite;
}
.appWaitText{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
@keyframes appWaitSpin{
  to{ transform:rotate(360deg); }
}
@keyframes appWaitSweep{
  from{ transform:translateX(-100%); }
  to{ transform:translateX(100%); }
}
@media(max-width:820px){
  .appHeader{
    padding:0 16px;
  }
}
@media(max-width:720px){

<script>
(function(){
  if(window.AppWait && typeof window.AppWait.push === 'function'){
    return;
  }

  var waitStack = [];
  var waitSeq = 0;

  function render(){
    var indicator = document.getElementById('appWaitIndicator');
    var textEl = document.getElementById('appWaitText');
    if(!indicator || !textEl){
      return;
    }

    var active = waitStack.length > 0;
    var current = active ? waitStack[waitStack.length - 1] : null;
    indicator.classList.toggle('is-active', active);
    indicator.setAttribute('aria-busy', active ? 'true' : 'false');
    textEl.innerText = current && current.message ? current.message : '處理中...';
  }

  function push(message){
    var id = ++waitSeq;
    waitStack.push({
      id:id,
      message:message || '處理中...'
    });
    render();

    var closed = false;
    return function(){
      if(closed){
        return;
      }

      closed = true;
      waitStack = waitStack.filter(function(item){
        return item.id !== id;
      });
      render();
    };
  }

  window.AppWait = {
    push:push,
    render:render
  };
  window.pushAppWait = push;
  window.renderAppWaitIndicator = render;
})();
</script>
