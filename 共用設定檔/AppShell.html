  to{ transform:rotate(360deg); }
}
@keyframes appWaitSweep{
  from{ transform:translateX(-100%); }
  to{ transform:translateX(100%); }
}

<script>
(function(){
  if(window.AppWait && typeof window.AppWait.push === 'function'){
    return;
  }

  var waitStack = [];
  var waitSeq = 0;

  function render(){
    var indicator = document.getElementById('appWaitIndicator');
    var textEl = document.getElementById('appWaitText');
    if(!indicator || !textEl){
      return;
    }

    var active = waitStack.length > 0;
    var current = active ? waitStack[waitStack.length - 1] : null;
    indicator.classList.toggle('is-active', active);
    indicator.setAttribute('aria-busy', active ? 'true' : 'false');
    textEl.innerText = current && current.message ? current.message : '處理中...';
  }

  function push(message){
    var id = ++waitSeq;
    waitStack.push({
      id:id,
      message:message || '處理中...'
    });
    render();

    var closed = false;
    return function(){
      if(closed){
        return;
      }

      closed = true;
      waitStack = waitStack.filter(function(item){
        return item.id !== id;
      });
      render();
    };
  }

  window.AppWait = {
    push:push,
    render:render
  };
  window.pushAppWait = push;
  window.renderAppWaitIndicator = render;
})();
</script>
