<style>
body{
  margin:0;
  padding:32px;
  background:var(--skh-bg);
  color:var(--skh-text);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.testPage{
  max-width:1180px;
  margin:0 auto;
}

.testHeader{
  margin-bottom:28px;
}

.testHeader h1{
  margin:0 0 8px;
  font-size:34px;
}

.testHeader p{
  margin:0;
  color:var(--skh-muted);
}

.testSection{
  background:white;
  border:1px solid var(--skh-line);
  border-radius:var(--skh-radius);
  padding:24px;
  margin-bottom:22px;
  box-shadow:var(--skh-shadow);
}

.testSection h2{
  margin:0 0 8px;
  font-size:22px;
}

.testNote{
  margin:0 0 18px;
  color:var(--skh-muted);
  line-height:1.7;
}

.testSubhead{
  margin:24px 0 10px;
  font-size:16px;
  font-weight:800;
  color:#1e293b;
}

.testTable{
  width:100%;
  border-collapse:collapse;
  margin-bottom:18px;
}

.testTable th{
  background:#f8fafc;
  text-align:left;
  padding:12px;
  border:1px solid var(--skh-line);
  font-size:14px;
}

.testTable td{
  padding:12px;
  border:1px solid var(--skh-line);
  vertical-align:middle;
}

.testTable code{
  background:#eef2f7;
  padding:3px 6px;
  border-radius:6px;
  font-size:13px;
  display:inline-block;
  margin:2px 0;
}

.testDemoBox{
  border:1px dashed var(--skh-line);
  border-radius:var(--skh-radius);
  padding:14px;
  background:#f8fafc;
}

.testRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

@media(max-width:900px){
  body{
    padding:18px;
  }

  .testTable{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }
}
</style>
</head>

<header class="testHeader">
