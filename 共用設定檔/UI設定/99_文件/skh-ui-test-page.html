子頁載入流程：

2. 本頁呼叫後端 getUiTestPageContent(page.path)。
3. 後端回傳對應 UiTest HTML 字串。
4. 本頁將 HTML 插入 #test-content。
5. runInsertedScripts() 重新建立子頁 script，使子頁自己的初始化流程執行。

const GITHUB_PAGE_MAP = {
  home:'科室系統用戶端/FrontIndex.html',
  frontIndex:'科室系統用戶端/FrontIndex.html',
  uiTest:'共用設定檔/UI設定/99_文件/skh-ui-test-page.html'
};

function isGithubPage(){
  return (window.location.hostname.includes('github.io') || window.location.hostname === 'dev-skhps.jonaminz.com' || window.location.hostname === 'skhps.jonaminz.com');
}

function getGithubRepoBasePath(){
  if(!window.location.hostname.includes('github.io')){
    return '/';
  }

  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts.length ? '/' + parts[0] + '/' : '/';
}

function getGithubPageUrl(pageKey){
  const path = GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;
  return window.location.origin + getGithubRepoBasePath() + path;
}

function goHome(){
  window.top.location.href = isGithubPage()
    ? getGithubPageUrl('home')
    : '<?= APP_ENTRY_URL ?>';
}

<script>
(function(){

  /*
    UI Test 路由表

    每一筆 path 會傳給後端 getUiTestPageContent(path)。
    後端應回傳對應子頁 HTML 字串，例如：
    - UiStyleTest.html
    - UiButtonTest.html
    - UiFormTest.html

    注意：
    父頁只負責「載入與插入子頁」。
    各子頁自己的資料讀取與初始化，應放在子頁本身，例如 UiStyleTest 的 bootBaseEditor()。
  */
  var testPages = [
    {id:'UiStyleTest',name:'00_基礎樣式',path:'共用設定檔/UI設定/00_基礎/UiStyleTest',waitForReadyEvent:'skh-ui-test-ready'},
    {id:'UiButtonTest',name:'01_按鈕元件',path:'共用設定檔/UI設定/01_按鈕/UiButtonTest',waitForReadyEvent:'skh-ui-test-ready'},
    {id:'UiFormTest',name:'02_表單元件',path:'共用設定檔/UI設定/02_表單/UiFormTest'},
    {id:'UiTableTest',name:'03_表格元件',path:'共用設定檔/UI設定/03_表格/UiTableTest'},
    {id:'UiAlertTest',name:'04_提示元件',path:'共用設定檔/UI設定/04_提示/UiAlertTest'},
    {id:'UiLoadingTest',name:'05_載入互動',path:'共用設定檔/UI設定/05_互動/UiLoadingTest'},
    {id:'UiModalTest',name:'06_彈跳視窗',path:'共用設定檔/UI設定/05_互動/UiModalTest'}
  ];

  var sidebar = document.getElementById('test-sidebar');
  var content = document.getElementById('test-content');
  var activeRequestId = 0;
  var isPageLoading = false;

  /*
    將子頁 table 包成可橫向捲動容器。
    這是父頁提供給所有 UiTest 子頁共用的版面保護，不負責資料載入。
  */
  function wrapTables(container){
    var tables = container.querySelectorAll('table.testTable');

    tables.forEach(function(table){
      if(table.parentElement && table.parentElement.classList.contains('testTableScroll')){
        return;
      }

      var wrap = document.createElement('div');
      wrap.className = 'testTableScroll';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    });
  }

  /*
    重要：innerHTML 插入的 <script> 不會自動執行。

    所以子頁 HTML 插入後，父頁必須把子頁裡的 script 重新建立一次，
    子頁的初始化函式才會真的執行。

    例如 UiStyleTest.html / UiButtonTest.html：
    - render()
    - init()
    - bind()
    - loadBaseTheme() / loadButtonTheme()

    這些都依賴此函式讓子頁 script 生效。
  */
  function runInsertedScripts(container){
    var scripts = Array.prototype.slice.call(container.querySelectorAll('script'));

    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');

      Array.prototype.slice.call(oldScript.attributes).forEach(function(attr){
        newScript.setAttribute(attr.name, attr.value);
      });

      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function activateButton(activeBtn){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.classList.remove('active');
    });

    if(activeBtn){
      activeBtn.classList.add('active');
    }
  }

  /*
    載入鎖定：

    使用者切換子頁後，在 getUiTestPageContent() 回傳、子頁 script 執行、
    以及子頁 dispatch ready event 之前，左側選單全部 disabled。

    目的：
    1. 避免連點導致多個 request 同時回來。
    2. 避免前一頁 ready event 誤影響下一頁。
    3. 符合「載入中不可操作」的 UI 規則。
  */
  function setNavDisabled(disabled){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.disabled = !!disabled;
    });
  }


  function showLoading(message){
    content.classList.add('is-loading');
    content.innerHTML =
      '<div class="ui-loading-box" data-ui-loading="1">' +
        '<div class="ui-loading-card">' +
          '<div class="ui-loading-spinner"></div>' +
          '<div class="ui-loading-title ui-loading-dots">' + message + '</div>' +
          '<div class="ui-loading-subtitle">正在跟 Sheet 讀取設定，完成後才會顯示畫面。</div>' +
          '<div class="ui-loading-bar"></div>' +
        '</div>' +
      '</div>';
  }

  function showError(error){
    isPageLoading = false;
    setNavDisabled(false);
    content.classList.remove('is-loading');
    content.innerHTML =
      '<div class="ui-error-box">載入失敗：' +
      (error && error.message ? error.message : error) +
      '</div>';
  }

  function buildLoadingNode(message){
    var node = document.createElement('div');
    node.className = 'ui-loading-box';
    node.setAttribute('data-ui-loading','1');
    node.innerHTML =
      '<div class="ui-loading-card">' +
        '<div class="ui-loading-spinner"></div>' +
        '<div class="ui-loading-title ui-loading-dots">' + message + '</div>' +
        '<div class="ui-loading-subtitle">正在套用 Sheet Theme，完成後才會顯示畫面。</div>' +
        '<div class="ui-loading-bar"></div>' +
      '</div>';
    return node;
  }

  function revealLoadedWrapper(wrapper,loadingNode){
    isPageLoading = false;
    setNavDisabled(false);

    if(loadingNode && loadingNode.parentNode){
      loadingNode.parentNode.removeChild(loadingNode);
    }

    wrapper.classList.remove('is-waiting-ready');
    content.classList.remove('is-loading');
  }

  function waitForReadyAndReveal(pageObj,requestId,wrapper,loadingNode){
    var eventName = pageObj.waitForReadyEvent;

    if(!eventName){
      requestAnimationFrame(function(){
        if(requestId !== activeRequestId){
          return;
        }

        revealLoadedWrapper(wrapper,loadingNode);
      });
      return;
    }

    var done = false;
    var timeoutId = null;

    function cleanup(){
      window.removeEventListener(eventName,onReady);
      if(timeoutId){
        clearTimeout(timeoutId);
        timeoutId = null;
      }
    }

    function finish(){
      if(done || requestId !== activeRequestId){
        return;
      }

      done = true;
      cleanup();
      revealLoadedWrapper(wrapper,loadingNode);
    }

    function onReady(evt){
      if(requestId !== activeRequestId){
        cleanup();
        return;
      }

      /*
        UiStyleTest / UiButtonTest 會在 loadBaseTheme() / loadButtonTheme() 完成後 dispatch：
        - skh-ui-style-ready
        - skh-ui-test-ready

        父頁不直接呼叫後端，也不猜 Sheet 什麼時候回來；
        只等子頁宣告「我已經把 Sheet Theme 寫進 input / CSS variables」。
      */
      finish();
    }

    window.addEventListener(eventName,onReady);

    /*
      安全保底：避免子頁 JS 壞掉時永遠白畫面。
      這不是用來解決正常載入時序；正常流程應由 ready event 立即 reveal。
    */
    timeoutId = setTimeout(function(){
      if(done || requestId !== activeRequestId){
        return;
      }

      console.warn(
        '[SKH UI Test] 子頁未發出 ready event，改用保底 reveal：',
        pageObj.id,
        eventName
      );

      finish();
    },15000);
  }

  /*
    子頁載入入口。

    呼叫後端：
    - getUiTestPageContent(pageObj.path)

    等待回傳：
    - HTML 字串

    回傳後流程：
    1. 清空 #test-content。
    2. 插入子頁 HTML。
    3. 若該頁設定 waitForReadyEvent，wrapper 先保持隱藏。
    4. wrapTables() 包裝 table。
    5. runInsertedScripts() 執行子頁 script。
    6. 子頁完成 Sheet/theme 初始化後 dispatch ready event。
    7. 父頁 reveal wrapper。

    重要：
    本頁不直接改 color input，也不直接呼叫 getBaseCssSettings() / getButtonCssSettings()。
    Sheet 資料來源與套用流程屬於子頁，例如 UiStyleTest.html 的 loadBaseTheme()、UiButtonTest.html 的 loadButtonTheme()。
  */
  function loadPage(pageObj,btn){
    if(isPageLoading){
      return;
    }

    isPageLoading = true;
    setNavDisabled(true);

    activeRequestId += 1;
    var requestId = activeRequestId;

    activateButton(btn);
    showLoading('載入中：' + pageObj.name + '...');

    google.script.run
      .withSuccessHandler(function(html){
        if(requestId !== activeRequestId){
          return;
        }

        content.innerHTML = '';

        var loadingNode = buildLoadingNode(
          pageObj.waitForReadyEvent
            ? '讀取 Sheet Theme 中：' + pageObj.name + '...'
            : '載入中：' + pageObj.name + '...'
        );

        var wrapper = document.createElement('div');
        wrapper.className = 'ui-preload-wrapper';

        if(pageObj.waitForReadyEvent){
          wrapper.classList.add('is-waiting-ready');
        }

        wrapper.innerHTML = html;

        content.appendChild(loadingNode);
        content.appendChild(wrapper);

        wrapTables(wrapper);
        waitForReadyAndReveal(pageObj,requestId,wrapper,loadingNode);
        runInsertedScripts(wrapper);
      })
      .withFailureHandler(function(error){
        if(requestId !== activeRequestId){
          return;
        }

        showError(error);
      })
      .getUiTestPageContent(pageObj.path);
  }

  function renderSidebar(){
    sidebar.innerHTML = '';

    testPages.forEach(function(page){
      var btn = document.createElement('button');
      btn.className = 'testNavButton';
      btn.textContent = page.name;
      btn.onclick = function(){
        loadPage(page,btn);
      };
      sidebar.appendChild(btn);
    });
  }


  function installGithubAppShellFallback(){

    }

    document.body.style.padding = '0';
    document.body.style.display = 'flex';
    document.body.style.flexDirection = 'column';
    document.body.style.minHeight = '100vh';

    if(!document.getElementById('githubAppShellStyle')){
      var shellStyle = document.createElement('style');
      shellStyle.id = 'githubAppShellStyle';
      shellStyle.textContent =
        ':root{--app-shell-wide-inset:15vw;--app-shell-wide-width:70vw;--app-shell-gutter:24px;}' +
        '.appHeader{padding:0 var(--app-shell-gutter)!important;}' +
        '@media(min-width:1200px){.shell,.wrap,.container,.testPage{width:var(--app-shell-wide-width)!important;max-width:none!important;margin-left:auto!important;margin-right:auto!important;padding-left:0!important;padding-right:0!important;}.appHeader{padding:0 var(--app-shell-wide-inset)!important;}}' +
        '@media(max-width:820px){.appHeader{padding:0 16px!important;}}';
      document.head.appendChild(shellStyle);
    }

    var testPage = document.querySelector('.testPage');
    if(testPage){
      testPage.style.flex = '1';
      testPage.style.padding = '24px 24px 66px';
      testPage.style.boxSizing = 'border-box';
    }

    if(!document.querySelector('.appHeader')){
      var ghHeader = document.createElement('header');
      ghHeader.className = 'appHeader';
      ghHeader.style.cssText = 'position:relative;flex-shrink:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:18px;height:76px;margin:0;box-sizing:border-box;border-bottom:1px solid #dbe4ef;background:rgba(248,251,255,.92);backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(15,23,42,.06);';
      ghHeader.innerHTML =
        '<div class="brand" onclick="goHome()" style="display:flex;align-items:center;gap:14px;cursor:pointer;">' +
          '<div class="brandMark" style="width:46px;height:46px;display:grid;place-items:center;border-radius:14px;color:#ffffff;font-size:22px;font-weight:800;background:linear-gradient(135deg,#2563eb,#0f766e);box-shadow:0 12px 24px rgba(37,99,235,.2);">S</div>' +
          '<div class="brandText" style="display:grid;gap:2px;">' +
            '<span class="brandName" style="font-size:18px;font-weight:800;">新光整形外科科室系統</span>' +
            '<span class="brandSub" style="color:#64748b;font-size:13px;">UI 測試中心</span>' +
          '</div>' +
        '</div>';
      document.body.prepend(ghHeader);
    }

    if(!document.querySelector('script[data-skh-environment-footer-fallback]')){
    var footerScript = document.createElement('script');
    footerScript.src = window.location.hostname.includes('github.io')
      ? 'https://ndmc402010104.github.io/plastic-surgery-department-system/%E5%85%B1%E7%94%A8%E8%A8%AD%E5%AE%9A%E6%AA%94/EnvironmentFooter.js'
      : '/%E5%85%B1%E7%94%A8%E8%A8%AD%E5%AE%9A%E6%AA%94/EnvironmentFooter.js';
    footerScript.src += '?v=' + Date.now();
    footerScript.setAttribute('data-skh-environment-footer', '1');
    footerScript.setAttribute('data-skh-environment-footer-fallback', '1');
    document.body.appendChild(footerScript);
  }
  }

  document.addEventListener('DOMContentLoaded', function(){
    installGithubAppShellFallback();
    renderSidebar();
  });

})();
</script>
