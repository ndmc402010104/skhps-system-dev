<style>
body{
  margin:0;
  padding:32px;
  background:var(--skh-bg,#f8fafc);
  color:var(--skh-text,#334155);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.testPage{
  width:100%;
  max-width:1800px;
  margin:0 auto;
}

.testHeader{
  margin-bottom:28px;
}

.testHeader h1{
  margin:0 0 8px;
  font-size:34px;
}

.testHeader p{
  margin:0;
  color:var(--skh-muted,#64748b);
}

.testLayout{
  display:flex;
  gap:24px;
  align-items:flex-start;
}

.testSidebar{
  width:220px;
  flex-shrink:0;
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:12px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
}

.testContent{
  flex:1;
  min-width:0;
  background:#fff;
  border-radius:var(--skh-radius,8px);
  min-height:600px;
  padding:24px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
  overflow:hidden;
}

.testContent > div{
  min-width:0;
}

.testSection{
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:24px;
  margin-bottom:22px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
  box-sizing:border-box;
  max-width:100%;
}

.testSection h2{
  margin:0 0 8px;
  font-size:22px;
}

.testNote{
  margin:0 0 18px;
  color:var(--skh-muted,#64748b);
  line-height:1.7;
}

.testSubhead{
  margin:24px 0 10px;
  font-size:16px;
  font-weight:800;
  color:#1e293b;
}

.testRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

/* Table 預設：大畫面維持壓縮式 table，不出現內部拉條 */
.testTableScroll{
  width:100%;
  max-width:100%;
}

/* 大畫面：table 吃滿可用寬度，自動壓縮 */
.testTable{
  width:100%;
  border-collapse:collapse;
  margin:0;
  table-layout:auto;
}

/*
  中小視窗：
  這裡用 1500px，不用 1200px。
  因為左側 sidebar 會吃掉 220px + gap，
  實際內容區會比視窗寬度小很多。
*/
@media(max-width:1500px){

  .testTableScroll{
    width:100%;
    max-width:100%;
    max-height:52vh;
    overflow:auto;
    border:1px solid var(--skh-line,#cbd5e1);
    border-radius:12px;
    background:white;
    box-sizing:border-box;
  }

  .testTable{
    width:max-content;
    min-width:1120px;
  }

}

/* 很小的高度：讓水平捲軸更容易出現在畫面內 */
@media(max-height:720px){

  .testTableScroll{
    max-height:46vh;
  }

}

.testTable th{
  position:sticky;
  top:0;
  z-index:2;
  background:#f8fafc;
  text-align:left;
  padding:12px;
  border:1px solid var(--skh-line,#cbd5e1);
  font-size:14px;
  white-space:nowrap;
}

.testTable td{
  padding:14px;
  border:1px solid var(--skh-line,#cbd5e1);
  vertical-align:top;
  background:white;
}

.testTable code{
  background:#eef2f7;
  padding:3px 6px;
  border-radius:6px;
  font-size:13px;
  display:inline-block;
  margin:2px 0;
}

.testTable th:nth-child(1),
.testTable td:nth-child(1){
  min-width:180px;
  max-width:220px;
}

.testTable th:nth-child(2),
.testTable td:nth-child(2){
  min-width:150px;
}

.testTable th:nth-child(3),
.testTable td:nth-child(3){
  min-width:280px;
}

.testTable th:nth-child(4),
.testTable td:nth-child(4){
  min-width:300px;
}

.testTable th:nth-child(5),
.testTable td:nth-child(5){
  min-width:360px;
}

.testNavButton{
  display:block;
  width:100%;
  text-align:left;
  padding:12px 16px;
  margin-bottom:8px;
  background:transparent;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  font-size:15px;
  color:var(--skh-text,#334155);
}

.testNavButton:hover{
  background:#f1f5f9;
  color:#2563eb;
}

.testNavButton.active{
  background:#eff6ff;
  color:#1d4ed8;
  font-weight:bold;
}
.testNavButton:disabled{
  opacity:.55;
  cursor:not-allowed;
  background:#f8fafc;
}

.testContent.is-loading{
  pointer-events:none;
}


/*
  防二次載入：
  新頁面先放進 DOM 但保持不可見，讓 script/theme 可以先跑完。
  等 callback + DOM 變動穩定後，再一次移除 loading 並顯示內容。
*/
.ui-test-stage.is-preparing{
  visibility:hidden;
  opacity:0;
  pointer-events:none;
}

.ui-test-stage.is-ready{
  visibility:visible;
  opacity:1;
  pointer-events:auto;
  transition:opacity .12s ease;
}



.ui-loading-box{
  padding:40px;
  text-align:center;
  color:#64748b;
}

.ui-error-box{
  color:#b42318;
  background:#fff7f7;
  border:1px solid #f4b4ae;
  border-radius:10px;
  padding:20px;
}

@media(max-width:1200px){
  body{
    padding:20px;
  }

  .testLayout{
    flex-direction:column;
  }

  .testSidebar{
    width:auto;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:14px;
  }

  .testNavButton{
    width:auto;
    margin-bottom:0;
    padding:8px 14px;
    border:1px solid var(--skh-line,#cbd5e1);
  }

  .testContent{
    width:100%;
    box-sizing:border-box;
  }
}

@media(max-width:640px){
  body{
    padding:14px;
  }

  .testHeader h1{
    font-size:28px;
  }

  .testContent{
    padding:14px;
  }

  .testSection{
    padding:14px;
  }

  .testSidebar{
    flex-direction:column;
    width:100%;
    box-sizing:border-box;
  }

  .testNavButton{
    width:100%;
  }

  .testTableScroll{
    max-height:62vh;
  }
}

<body>

<main class="testPage">

<header class="testHeader">
  <h1>SKH CSS 測試頁</h1>
  <p>模組化 UI 元件測試，請從選單切換想檢視的元件。</p>
</header>

<div class="testLayout">
  <nav class="testSidebar" id="test-sidebar"></nav>

  <div class="testContent" id="test-content">
    <div style="padding:40px;text-align:center;color:#64748b;border:1px dashed var(--skh-line,#cbd5e1);border-radius:var(--skh-radius,8px);">
      請從左側選單選擇要測試的元件
    </div>
  </div>
</div>

</main>

<script>
(function(){

  var testPages = [
    {id:'UiStyleTest',name:'00_基礎樣式',path:'共用設定檔/UI設定/00_基礎/UiStyleTest'},
    {id:'UiButtonTest',name:'01_按鈕元件',path:'共用設定檔/UI設定/01_按鈕/UiButtonTest'},
    {id:'UiFormTest',name:'02_表單元件',path:'共用設定檔/UI設定/02_表單/UiFormTest'},
    {id:'UiTableTest',name:'03_表格元件',path:'共用設定檔/UI設定/03_表格/UiTableTest'},
    {id:'UiAlertTest',name:'04_提示元件',path:'共用設定檔/UI設定/04_提示/UiAlertTest'},
    {id:'UiLoadingTest',name:'05_載入互動',path:'共用設定檔/UI設定/05_互動/UiLoadingTest'},
    {id:'UiModalTest',name:'06_彈跳視窗',path:'共用設定檔/UI設定/05_互動/UiModalTest'}
  ];

  var sidebar = document.getElementById('test-sidebar');
  var content = document.getElementById('test-content');

  var activeRequestId = 0;
  var isLoadingPage = false;

  window.getCurrentUiTestState = function(){
    return {
      activeRequestId:activeRequestId,
      isLoadingPage:isLoadingPage,
      hasLoadUiStyleTheme:typeof window.loadUiStyleTheme,
      hasLoadBaseTheme:typeof window.loadBaseTheme,
      hasLoadButtonTheme:typeof window.loadButtonTheme,
      hasLoadUiTheme:typeof window.loadUiTheme
    };
  };

  function wrapTables(container){

    var tables =
      container.querySelectorAll('table.testTable');

    tables.forEach(function(table){

      if(
        table.parentElement &&
        table.parentElement.classList.contains('testTableScroll')
      ){
        return;
      }

      var wrap =
        document.createElement('div');

      wrap.className =
        'testTableScroll';

      table.parentNode.insertBefore(
        wrap,
        table
      );

      wrap.appendChild(
        table
      );

    });

  }

  function runInsertedScripts(container){
    var scripts = container.querySelectorAll('script');

    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');

      Array.prototype.slice.call(oldScript.attributes).forEach(function(attr){
        newScript.setAttribute(attr.name, attr.value);
      });

      newScript.textContent = oldScript.textContent;

      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function activateButton(activeBtn){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.classList.remove('active');
    });

    if(activeBtn){
      activeBtn.classList.add('active');
    }
  }

  function setSidebarLocked(locked){

    isLoadingPage =
      !!locked;

    var buttons =
      sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.disabled = !!locked;
    });

    if(locked){
      content.classList.add('is-loading');
    }
    else{
      content.classList.remove('is-loading');
    }

  }

  function forceUnlockIfStuck(requestId){

    setTimeout(function(){

      if(
        isLoadingPage &&
        requestId === activeRequestId
      ){

        setSidebarLocked(false);

        var loadingEl =
          content.querySelector('[data-ui-loading]');

        if(loadingEl){
          loadingEl.querySelector('div:last-child').textContent =
            '讀取較久，已解除選單鎖定；可重新選擇頁面。';
        }

      }

    },3000);

  }

  function showLoading(message){

    content.innerHTML =
      '<div class="ui-loading-box" data-ui-loading="1">' +
        '<div class="skh-spinner"></div>' +
        '<div style="margin-top:12px;font-weight:600;color:#64748b;">' +
          message +
        '</div>' +
      '</div>';

  }

  function showError(error){
    content.innerHTML =
      '<div class="ui-error-box">載入失敗：' +
      (error && error.message ? error.message : error) +
      '</div>';
  }

  function revealWhenThemeReady(pageObj, wrapper, loadingEl, requestId){

    var revealed = false;
    var visualIdleTimer = null;
    var visualIdleObserver = null;
    var visualIdleHardTimer = null;

    function cleanupVisualWait(){
      if(visualIdleTimer){
        clearTimeout(visualIdleTimer);
        visualIdleTimer = null;
      }

      if(visualIdleHardTimer){
        clearTimeout(visualIdleHardTimer);
        visualIdleHardTimer = null;
      }

      if(visualIdleObserver){
        visualIdleObserver.disconnect();
        visualIdleObserver = null;
      }
    }

    function revealNow(){

      if(revealed){
        return;
      }

      if(requestId !== activeRequestId){
        cleanupVisualWait();
        return;
      }

      revealed = true;
      cleanupVisualWait();

      wrapper.classList.remove('is-preparing');
      wrapper.classList.add('is-ready');

      if(
        loadingEl &&
        loadingEl.parentNode
      ){
        loadingEl.parentNode.removeChild(
          loadingEl
        );
      }

      setSidebarLocked(false);

    }

    function revealAfterPaint(){
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          revealNow();
        });
      });
    }

    function waitForVisualIdle(){
      /*
        關鍵：theme/builder 常常 callback 先回來，DOM style 或色塊再補一輪。
        所以不是 callback 後立刻顯示，而是等 DOM 120ms 沒變動再顯示。
        但最多等 2200ms，避免真的卡住。
      */
      if(requestId !== activeRequestId){
        cleanupVisualWait();
        return;
      }

      function scheduleReveal(){
        if(visualIdleTimer){
          clearTimeout(visualIdleTimer);
        }

        visualIdleTimer = setTimeout(function(){
          revealAfterPaint();
        },120);
      }

      try{
        visualIdleObserver = new MutationObserver(function(){
          scheduleReveal();
        });

        visualIdleObserver.observe(wrapper,{
          childList:true,
          subtree:true,
          attributes:true,
          attributeFilter:['class','style','disabled','checked','value']
        });
      }
      catch(err){
        revealAfterPaint();
        return;
      }

      visualIdleHardTimer = setTimeout(function(){
        revealAfterPaint();
      },2200);

      scheduleReveal();
    }

    function safeThemeLoad(loader){

      var doneCalled = false;

      function done(){
        if(doneCalled){
          return;
        }

        doneCalled = true;
        clearTimeout(timeoutId);
        waitForVisualIdle();
      }

      var timeoutId = setTimeout(function(){
        done();
      },1800);

      try{
        loader(done);
      }
      catch(err){
        done();
      }

    }

    function getThemeLoader(){

      if(
        pageObj.id === 'UiStyleTest'
      ){

        if(
          typeof window.loadUiStyleTheme === 'function'
        ){
          return window.loadUiStyleTheme;
        }

        if(
          typeof window.loadBaseTheme === 'function'
        ){
          return window.loadBaseTheme;
        }

      }

      if(
        pageObj.id === 'UiButtonTest' &&
        typeof window.loadButtonTheme === 'function'
      ){
        return window.loadButtonTheme;
      }

      return null;

    }

    function runPageThemeLoader(){

      var loader = getThemeLoader();

      if(loader){
        safeThemeLoad(loader);
        return;
      }

      waitForVisualIdle();

    }

    if(
      typeof window.loadUiTheme === 'function'
    ){

      var globalDoneCalled = false;
      var globalTimeoutId = null;

      function globalDone(){
        if(globalDoneCalled){
          return;
        }

        globalDoneCalled = true;

        if(globalTimeoutId){
          clearTimeout(globalTimeoutId);
        }

        runPageThemeLoader();
      }

      globalTimeoutId = setTimeout(function(){
        globalDone();
      },1200);

      try{
        window.loadUiTheme(globalDone);
      }
      catch(err){
        globalDone();
      }

      return;

    }

    runPageThemeLoader();

  }
  
  function loadPage(pageObj, btn){

    if(isLoadingPage){
      return;
    }

    activeRequestId += 1;

    var requestId =
      activeRequestId;

    setSidebarLocked(true);

    forceUnlockIfStuck(
      requestId
    );

    activateButton(btn);

    var startTime =
      Date.now();

    content.innerHTML = '';

    showLoading(
      '載入中：' +
      pageObj.name +
      '...'
    );

    google.script.run
      .withSuccessHandler(function(html){

        if(requestId !== activeRequestId){
          return;
        }

        var loadingEl =
          content.querySelector('[data-ui-loading]');

        if(loadingEl){
          loadingEl.querySelector('div:last-child').textContent =
            '讀取樣式設定中...';
        }

        var wrapper =
          document.createElement('div');

        wrapper.className =
          'ui-test-stage is-preparing';

        wrapper.innerHTML =
          html;

        content.appendChild(
          wrapper
        );

        wrapTables(
          wrapper
        );

        runInsertedScripts(
          wrapper
        );

        var elapsed =
          Date.now() - startTime;

        var wait =
          Math.max(
            0,
            350 - elapsed
          );

        setTimeout(function(){

          revealWhenThemeReady(
            pageObj,
            wrapper,
            loadingEl,
            requestId
          );

        },wait);

      })
      .withFailureHandler(function(error){

        if(requestId !== activeRequestId){
          return;
        }

        setSidebarLocked(false);

        showError(
          error
        );

      })
      .getUiTestPageContent(
        pageObj.path
      );

  }

  function renderSidebar(){
    sidebar.innerHTML = '';

    testPages.forEach(function(page){
      var btn = document.createElement('button');

      btn.className = 'testNavButton';
      btn.textContent = page.name;

      btn.onclick = function(){
        loadPage(page, btn);
      };

      sidebar.appendChild(btn);

    });
  }

  document.addEventListener('DOMContentLoaded', renderSidebar);

})();
</script>

</body>
