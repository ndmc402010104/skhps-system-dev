<script>
(function(){

  /*
    UI Test 路由表

    每一筆 path 會傳給後端 getUiTestPageContent(path)。
    後端應回傳對應子頁 HTML 字串，例如：
    - UiStyleTest.html
    - UiButtonTest.html
    - UiFormTest.html

    注意：
    父頁只負責「載入與插入子頁」。
    各子頁自己的資料讀取與初始化，應放在子頁本身，例如 UiStyleTest 的 bootBaseEditor()。
  */
  var testPages = [
    {id:'UiStyleTest',name:'00_基礎樣式',path:'共用設定檔/UI設定/00_基礎/UiStyleTest'},
    {id:'UiButtonTest',name:'01_按鈕元件',path:'共用設定檔/UI設定/01_按鈕/UiButtonTest'},
    {id:'UiFormTest',name:'02_表單元件',path:'共用設定檔/UI設定/02_表單/UiFormTest'},
    {id:'UiTableTest',name:'03_表格元件',path:'共用設定檔/UI設定/03_表格/UiTableTest'},
    {id:'UiAlertTest',name:'04_提示元件',path:'共用設定檔/UI設定/04_提示/UiAlertTest'},
    {id:'UiLoadingTest',name:'05_載入互動',path:'共用設定檔/UI設定/05_互動/UiLoadingTest'},
    {id:'UiModalTest',name:'06_彈跳視窗',path:'共用設定檔/UI設定/05_互動/UiModalTest'}
  ];

  var sidebar = document.getElementById('test-sidebar');
  var content = document.getElementById('test-content');
  var activeRequestId = 0;

  /*
    將子頁 table 包成可橫向捲動容器。
    這是父頁提供給所有 UiTest 子頁共用的版面保護，不負責資料載入。
  */
  function wrapTables(container){
    var tables = container.querySelectorAll('table.testTable');

    tables.forEach(function(table){
      if(table.parentElement && table.parentElement.classList.contains('testTableScroll')){
        return;
      }

      var wrap = document.createElement('div');
      wrap.className = 'testTableScroll';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    });
  }

  /*
    重要：innerHTML 插入的 <script> 不會自動執行。

    所以子頁 HTML 插入後，父頁必須把子頁裡的 script 重新建立一次，
    子頁的初始化函式才會真的執行。

    例如 UiStyleTest.html：
    - render()
    - init()
    - bind()
    - loadBaseTheme()

    這些都依賴此函式讓子頁 script 生效。
  */
  function runInsertedScripts(container){
    var scripts = Array.prototype.slice.call(container.querySelectorAll('script'));

    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');

      Array.prototype.slice.call(oldScript.attributes).forEach(function(attr){
        newScript.setAttribute(attr.name, attr.value);
      });

      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function activateButton(activeBtn){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.classList.remove('active');
    });

    if(activeBtn){
      activeBtn.classList.add('active');
    }
  }

  function showLoading(message){
    content.classList.add('is-loading');
    content.innerHTML =
      '<div class="ui-loading-box" data-ui-loading="1">' +
        '<div class="skh-spinner"></div>' +
        '<div style="margin-top:12px;font-weight:600;color:#64748b;">' + message + '</div>' +
      '</div>';
  }

  function showError(error){
    content.classList.remove('is-loading');
    content.innerHTML =
      '<div class="ui-error-box">載入失敗：' +
      (error && error.message ? error.message : error) +
      '</div>';
  }

  /*
    子頁載入入口。

    呼叫後端：
    - getUiTestPageContent(pageObj.path)

    等待回傳：
    - HTML 字串

    回傳後流程：
    1. 清空 #test-content。
    2. 插入子頁 HTML。
    3. 包裝 table。
    4. 執行子頁 script。

    注意：
    不要在這裡硬等 Theme 或直接改 color input。
    Theme 初始化應由子頁自己負責。
  */
  function loadPage(pageObj,btn){
    activeRequestId += 1;
    var requestId = activeRequestId;

    activateButton(btn);
    showLoading('載入中：' + pageObj.name + '...');

    google.script.run
      .withSuccessHandler(function(html){
        if(requestId !== activeRequestId){
          return;
        }

        content.innerHTML = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'ui-preload-wrapper';
        wrapper.innerHTML = html;
        content.appendChild(wrapper);

        wrapTables(wrapper);
        runInsertedScripts(wrapper);

        content.classList.remove('is-loading');
      })
      .withFailureHandler(function(error){
        if(requestId !== activeRequestId){
          return;
        }

        showError(error);
      })
      .getUiTestPageContent(pageObj.path);
  }

  function renderSidebar(){
    sidebar.innerHTML = '';

    testPages.forEach(function(page){
      var btn = document.createElement('button');
      btn.className = 'testNavButton';
      btn.textContent = page.name;
      btn.onclick = function(){
        loadPage(page,btn);
      };
      sidebar.appendChild(btn);
    });
  }

  document.addEventListener('DOMContentLoaded', renderSidebar);

})();
</script>
