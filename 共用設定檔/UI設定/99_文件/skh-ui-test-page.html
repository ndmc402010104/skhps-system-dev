<style>
body{
  margin:0;
  padding:32px;
  background:var(--skh-bg,#f8fafc);
  color:var(--skh-text,#334155);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.testPage{
  width:100%;
  max-width:1800px;
  margin:0 auto;
}

.testHeader{
  margin-bottom:28px;
}

.testHeader h1{
  margin:0 0 8px;
  font-size:34px;
}

.testHeader p{
  margin:0;
  color:var(--skh-muted,#64748b);
}

.testLayout{
  display:flex;
  gap:24px;
  align-items:flex-start;
}

.testSidebar{
  width:220px;
  flex-shrink:0;
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:12px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
}

.testContent{
  flex:1;
  min-width:0;
  background:#fff;
  border-radius:var(--skh-radius,8px);
  min-height:600px;
  padding:24px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
  overflow:hidden;
  position:relative;
}

.testContent > div{
  min-width:0;
}

.testSection{
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:24px;
  margin-bottom:22px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
  box-sizing:border-box;
  max-width:100%;
}

.testSection h2{
  margin:0 0 8px;
  font-size:22px;
}

.testNote{
  margin:0 0 18px;
  color:var(--skh-muted,#64748b);
  line-height:1.7;
}

.testSubhead{
  margin:24px 0 10px;
  font-size:16px;
  font-weight:800;
  color:#1e293b;
}

.testRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

/* Table 預設：大畫面維持壓縮式 table，不出現內部拉條 */
.testTableScroll{
  width:100%;
  max-width:100%;
}

/* 大畫面：table 吃滿可用寬度，自動壓縮 */
.testTable{
  width:100%;
  border-collapse:collapse;
  margin:0;
  table-layout:auto;
}

/*
  中小視窗：
  這裡用 1500px，不用 1200px。
  因為左側 sidebar 會吃掉 220px + gap，
  實際內容區會比視窗寬度小很多。
*/
@media(max-width:1500px){

  .testTableScroll{
    width:100%;
    max-width:100%;
    max-height:52vh;
    overflow:auto;
    border:1px solid var(--skh-line,#cbd5e1);
    border-radius:12px;
    background:white;
    box-sizing:border-box;
  }

  .testTable{
    width:max-content;
    min-width:1120px;
  }

}

/* 很小的高度：讓水平捲軸更容易出現在畫面內 */
@media(max-height:720px){

  .testTableScroll{
    max-height:46vh;
  }

}

.testTable th{
  position:sticky;
  top:0;
  z-index:2;
  background:#f8fafc;
  text-align:left;
  padding:12px;
  border:1px solid var(--skh-line,#cbd5e1);
  font-size:14px;
  white-space:nowrap;
}

.testTable td{
  padding:14px;
  border:1px solid var(--skh-line,#cbd5e1);
  vertical-align:top;
  background:white;
}

.testTable code{
  background:#eef2f7;
  padding:3px 6px;
  border-radius:6px;
  font-size:13px;
  display:inline-block;
  margin:2px 0;
}

.testTable th:nth-child(1),
.testTable td:nth-child(1){
  min-width:180px;
  max-width:220px;
}

.testTable th:nth-child(2),
.testTable td:nth-child(2){
  min-width:150px;
}

.testTable th:nth-child(3),
.testTable td:nth-child(3){
  min-width:280px;
}

.testTable th:nth-child(4),
.testTable td:nth-child(4){
  min-width:300px;
}

.testTable th:nth-child(5),
.testTable td:nth-child(5){
  min-width:360px;
}

.testNavButton{
  display:block;
  width:100%;
  text-align:left;
  padding:12px 16px;
  margin-bottom:8px;
  background:transparent;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  font-size:15px;
  color:var(--skh-text,#334155);
}

.testNavButton:hover{
  background:#f1f5f9;
  color:#2563eb;
}

.testNavButton.active{
  background:#eff6ff;
  color:#1d4ed8;
  font-weight:bold;
}
.testNavButton:disabled{
  opacity:.55;
  cursor:not-allowed;
  background:#f8fafc;
}

.testContent.is-loading{
  pointer-events:none;
}


.ui-loading-box{
  padding:40px;
  text-align:center;
  color:#64748b;
}

.ui-error-box{
  color:#b42318;
  background:#fff7f7;
  border:1px solid #f4b4ae;
  border-radius:10px;
  padding:20px;
}

@media(max-width:1200px){
  body{
    padding:20px;
  }

  .testLayout{
    flex-direction:column;
  }

  .testSidebar{
    width:auto;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:14px;
  }

  .testNavButton{
    width:auto;
    margin-bottom:0;
    padding:8px 14px;
    border:1px solid var(--skh-line,#cbd5e1);
  }

  .testContent{
    width:100%;
    box-sizing:border-box;
  }
}

@media(max-width:640px){
  body{
    padding:14px;
  }

  .testHeader h1{
    font-size:28px;
  }

  .testContent{
    padding:14px;
  }

  .testSection{
    padding:14px;
  }

  .testSidebar{
    flex-direction:column;
    width:100%;
    box-sizing:border-box;
  }

  .testNavButton{
    width:100%;
  }

  .testTableScroll{
    max-height:62vh;
  }
}

.ui-preload-wrapper{
  min-width:0;
}

<body>

<main class="testPage">

<header class="testHeader">
  <h1>SKH CSS 測試頁</h1>
  <p>模組化 UI 元件測試，請從選單切換想檢視的元件。</p>
</header>

<div class="testLayout">
  <nav class="testSidebar" id="test-sidebar"></nav>

  <div class="testContent" id="test-content">
    <div style="padding:40px;text-align:center;color:#64748b;border:1px dashed var(--skh-line,#cbd5e1);border-radius:var(--skh-radius,8px);">
      請從左側選單選擇要測試的元件
    </div>
  </div>
</div>

</main>

<script>
(function(){

  var testPages = [
    {id:'UiStyleTest',name:'00_基礎樣式',path:'共用設定檔/UI設定/00_基礎/UiStyleTest'},
    {id:'UiButtonTest',name:'01_按鈕元件',path:'共用設定檔/UI設定/01_按鈕/UiButtonTest'},
    {id:'UiFormTest',name:'02_表單元件',path:'共用設定檔/UI設定/02_表單/UiFormTest'},
    {id:'UiTableTest',name:'03_表格元件',path:'共用設定檔/UI設定/03_表格/UiTableTest'},
    {id:'UiAlertTest',name:'04_提示元件',path:'共用設定檔/UI設定/04_提示/UiAlertTest'},
    {id:'UiLoadingTest',name:'05_載入互動',path:'共用設定檔/UI設定/05_互動/UiLoadingTest'},
    {id:'UiModalTest',name:'06_彈跳視窗',path:'共用設定檔/UI設定/05_互動/UiModalTest'}
  ];

  var sidebar = document.getElementById('test-sidebar');
  var content = document.getElementById('test-content');

  var activeRequestId = 0;
  var activeProbe = null;
  var latestThemeEvent = null;

  /*
    2026-06-01 debug strategy:
    - 取消前面幾版的鎖定、白畫面 gate、父頁猜色、硬等 Sheet。
    - 回到快速載入：HTML 拿到後立刻顯示，讓黑色到真色的過程可以被觀察。
    - 新增 probe：記錄 click、HTML 回來、script 執行、第一次看到黑色色票、第一次看到品牌色票變成非黑、theme loader 事件。
    - probe 完成後用 alert 顯示實測毫秒數，幫助判斷到底是「後端沒抓到」、「事件太早 finish」，還是「子頁色票自己的資料晚回來」。
  */

  window.__SKH_UI_TEST_DEBUG__ = window.__SKH_UI_TEST_DEBUG__ || {
    probes:[],
    themeEvents:[]
  };

  function now(){
    return Math.round(performance.now());
  }

  function normalizeHex(value){
    value = String(value || '').trim().toLowerCase();

    if(/^#[0-9a-f]{6}$/.test(value)){
      return value;
    }

    if(/^#[0-9a-f]{3}$/.test(value)){
      return '#' + value[1] + value[1] + value[2] + value[2] + value[3] + value[3];
    }

    return '';
  }

  function isBlackOrEmpty(value){
    var hex = normalizeHex(value);
    return !hex || hex === '#000000';
  }

  function getColorInputs(root){
    if(!root){
      return [];
    }
    return Array.prototype.slice.call(
      root.querySelectorAll('input[type="color"]')
    );
  }

  function getBrandInputs(root){
    var inputs = Array.prototype.slice.call(
      root.querySelectorAll('input[type="color"][id^="brand_"]')
    );

    if(inputs.length){
      return inputs;
    }

    return getColorInputs(root);
  }

  function summarizeColors(root){
    var inputs = getBrandInputs(root);
    return inputs.map(function(input){
      return (input.id || input.name || '(no id)') + '=' + String(input.value || '');
    });
  }

  function countColorState(root){
    var inputs = getBrandInputs(root);
    var black = 0;
    var nonBlack = 0;

    inputs.forEach(function(input){
      if(isBlackOrEmpty(input.value)){
        black += 1;
      }
      else{
        nonBlack += 1;
      }
    });

    return {
      total:inputs.length,
      black:black,
      nonBlack:nonBlack,
      values:summarizeColors(root)
    };
  }

  function recordThemeEvent(name, detail){
    latestThemeEvent = {
      name:name,
      at:now(),
      detail:detail || null
    };

    window.__SKH_UI_TEST_DEBUG__.themeEvents.push(latestThemeEvent);

    if(activeProbe){
      activeProbe.themeEvents.push(latestThemeEvent);
    }

    console.log('[SKH UI theme event]', latestThemeEvent);
  }

  [
    'skh-ui-theme-loaded',
    'skh-ui-theme-sheet-applied',
    'skh-ui-theme-fallback-used',
    'skh-ui-theme-error',
    'skh-ui-test-ready',
    'skh-theme-ready',
    'ui-theme-ready'
  ].forEach(function(eventName){
    window.addEventListener(eventName,function(event){
      recordThemeEvent(eventName, event && event.detail ? event.detail : null);
    });
  });

  window.getCurrentUiTestState = function(){
    return {
      activeRequestId:activeRequestId,
      activeProbe:activeProbe,
      latestThemeEvent:latestThemeEvent,
      hasLoadUiStyleTheme:typeof window.loadUiStyleTheme,
      hasLoadBaseTheme:typeof window.loadBaseTheme,
      hasLoadButtonTheme:typeof window.loadButtonTheme,
      hasLoadUiTheme:typeof window.loadUiTheme
    };
  };

  function makeProbe(pageObj){
    var probe = {
      requestId:activeRequestId,
      pageId:pageObj.id,
      pageName:pageObj.name,
      path:pageObj.path,
      clickAt:now(),
      htmlBackAt:null,
      wrapperInsertedAt:null,
      scriptsStartAt:null,
      scriptsDoneAt:null,
      firstVisibleAt:null,
      firstBlackAt:null,
      firstNonBlackAt:null,
      stableNonBlackAt:null,
      alertAt:null,
      initialColorState:null,
      finalColorState:null,
      themeEvents:[],
      notes:[]
    };

    window.__SKH_UI_TEST_DEBUG__.probes.push(probe);
    activeProbe = probe;
    return probe;
  }

  function buildProbeMessage(probe){
    var themeEvent = null;
    var sheetApplied = null;

    probe.themeEvents.forEach(function(event){
      if(event.name === 'skh-ui-theme-sheet-applied'){
        sheetApplied = event;
      }
      if(event.name === 'skh-ui-theme-loaded'){
        themeEvent = event;
      }
    });

    var referenceEvent = sheetApplied || themeEvent;

    function diff(at){
      if(typeof at !== 'number'){
        return '尚未偵測';
      }
      return (at - probe.clickAt) + ' ms';
    }

    function diffBetween(a,b){
      if(typeof a !== 'number' || typeof b !== 'number'){
        return '無法計算';
      }
      return (b - a) + ' ms';
    }

    var lines = [];
    lines.push('SKH UI Theme Debug');
    lines.push('頁面：' + probe.pageName);
    lines.push('');
    lines.push('Click → HTML 回來：' + diff(probe.htmlBackAt));
    lines.push('Click → wrapper 顯示：' + diff(probe.firstVisibleAt));
    lines.push('Click → 第一次偵測黑色色票：' + diff(probe.firstBlackAt));
    lines.push('Click → 第一次偵測非黑色票：' + diff(probe.firstNonBlackAt));
    lines.push('Click → 穩定非黑色票：' + diff(probe.stableNonBlackAt));
    lines.push('Click → Theme event：' + diff(referenceEvent ? referenceEvent.at : null));
    lines.push('黑色 → 非黑：' + diffBetween(probe.firstBlackAt, probe.firstNonBlackAt));
    lines.push('黑色 → Theme event：' + diffBetween(probe.firstBlackAt, referenceEvent ? referenceEvent.at : null));
    lines.push('');
    lines.push('Theme event：' + (referenceEvent ? referenceEvent.name : '沒有收到'));

    if(referenceEvent && referenceEvent.detail){
      if(referenceEvent.detail.source){
        lines.push('Theme source：' + referenceEvent.detail.source);
      }
      if(referenceEvent.detail.error){
        lines.push('Theme error：' + referenceEvent.detail.error);
      }
      if(referenceEvent.detail.timings){
        lines.push('Theme timings：' + JSON.stringify(referenceEvent.detail.timings));
      }
    }

    lines.push('');
    lines.push('目前色票：');
    (probe.finalColorState && probe.finalColorState.values || []).forEach(function(v){
      lines.push('  ' + v);
    });

    if(probe.notes.length){
      lines.push('');
      lines.push('Notes：');
      probe.notes.forEach(function(note){
        lines.push('  - ' + note);
      });
    }

    lines.push('');
    lines.push('完整資料可在 console 輸入：window.__SKH_UI_TEST_DEBUG__');

    return lines.join('\n');
  }

  function maybeFinishProbe(probe, wrapper, reason){
    if(!probe || probe.alertAt){
      return;
    }

    probe.finalColorState = countColorState(wrapper);

    var readyEnough = false;

    if(probe.pageId !== 'UiStyleTest'){
      readyEnough = true;
    }
    else if(probe.stableNonBlackAt){
      readyEnough = true;
    }
    else if(now() - probe.clickAt >= 5000){
      readyEnough = true;
      probe.notes.push('超過 5 秒仍未達穩定非黑，可能沒有抓到後台資料或子頁沒有把 Sheet 值寫回 color input。');
    }

    if(!readyEnough){
      return;
    }

    probe.notes.push('完成原因：' + reason);
    probe.alertAt = now();

    console.log('[SKH UI probe result]', probe);

    setTimeout(function(){
      alert(buildProbeMessage(probe));
    },0);
  }

  function startProbeObserver(probe, wrapper){
    var stablePass = 0;
    var stopped = false;
    var observer = null;
    var timer = null;

    function cleanup(){
      stopped = true;
      if(observer){
        try{ observer.disconnect(); }catch(err){}
        observer = null;
      }
      if(timer){
        clearTimeout(timer);
        timer = null;
      }
    }

    function check(reason){
      if(stopped || probe.requestId !== activeRequestId){
        cleanup();
        return;
      }

      var state = countColorState(wrapper);

      if(!probe.initialColorState){
        probe.initialColorState = state;
      }

      if(state.black > 0 && !probe.firstBlackAt){
        probe.firstBlackAt = now();
        console.log('[SKH UI probe] first black color detected', state);
      }

      if(state.total > 0 && state.nonBlack > 0 && !probe.firstNonBlackAt){
        probe.firstNonBlackAt = now();
        console.log('[SKH UI probe] first non-black color detected', state);
      }

      if(probe.pageId === 'UiStyleTest'){
        if(state.total >= 5 && state.nonBlack >= Math.min(5,state.total)){
          stablePass += 1;
        }
        else{
          stablePass = 0;
        }

        if(stablePass >= 3 && !probe.stableNonBlackAt){
          probe.stableNonBlackAt = now();
          console.log('[SKH UI probe] stable non-black colors detected', state);
        }
      }
      else{
        probe.stableNonBlackAt = probe.stableNonBlackAt || now();
      }

      probe.finalColorState = state;
      maybeFinishProbe(probe, wrapper, reason);

      if(probe.alertAt){
        cleanup();
      }
    }

    try{
      observer = new MutationObserver(function(){
        check('MutationObserver');
      });
      observer.observe(wrapper, {
        subtree:true,
        childList:true,
        attributes:true,
        characterData:true,
        attributeFilter:['value','style','class','disabled']
      });
    }
    catch(err){
      probe.notes.push('MutationObserver 啟動失敗：' + err.message);
    }

    function poll(){
      if(stopped){
        return;
      }
      check('poll');
      timer = setTimeout(poll,100);
    }

    requestAnimationFrame(function(){
      probe.firstVisibleAt = now();
      poll();
    });
  }

  function wrapTables(container){
    var tables = container.querySelectorAll('table.testTable');

    tables.forEach(function(table){
      if(
        table.parentElement &&
        table.parentElement.classList.contains('testTableScroll')
      ){
        return;
      }

      var wrap = document.createElement('div');
      wrap.className = 'testTableScroll';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    });
  }

  function runInsertedScripts(container, probe){
    var scripts = Array.prototype.slice.call(container.querySelectorAll('script'));

    probe.scriptsStartAt = now();

    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');

      Array.prototype.slice.call(oldScript.attributes).forEach(function(attr){
        newScript.setAttribute(attr.name, attr.value);
      });

      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

    probe.scriptsDoneAt = now();
  }

  function activateButton(activeBtn){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.classList.remove('active');
    });

    if(activeBtn){
      activeBtn.classList.add('active');
    }
  }

  function showLoading(message){
    content.innerHTML =
      '<div class="ui-loading-box" data-ui-loading="1">' +
        '<div class="skh-spinner"></div>' +
        '<div style="margin-top:12px;font-weight:600;color:#64748b;">' +
          message +
        '</div>' +
      '</div>';
  }

  function showError(error){
    content.innerHTML =
      '<div class="ui-error-box">載入失敗：' +
      (error && error.message ? error.message : error) +
      '</div>';
  }

  function makeWrapper(html){
    var wrapper = document.createElement('div');
    wrapper.className = 'ui-preload-wrapper';
    wrapper.setAttribute('data-ui-wrapper','1');
    wrapper.innerHTML = html;
    return wrapper;
  }

  function loadPage(pageObj, btn){
    activeRequestId += 1;

    var requestId = activeRequestId;
    var probe = makeProbe(pageObj);

    activateButton(btn);
    showLoading('載入中：' + pageObj.name + '...');

    google.script.run
      .withSuccessHandler(function(html){
        if(requestId !== activeRequestId){
          return;
        }

        probe.htmlBackAt = now();

        var wrapper = makeWrapper(html);
        content.innerHTML = '';
        content.appendChild(wrapper);
        probe.wrapperInsertedAt = now();

        wrapTables(wrapper);
        runInsertedScripts(wrapper, probe);
        startProbeObserver(probe, wrapper);
      })
      .withFailureHandler(function(error){
        if(requestId !== activeRequestId){
          return;
        }

        probe.notes.push('getUiTestPageContent failure：' + (error && error.message ? error.message : error));
        showError(error);
      })
      .getUiTestPageContent(pageObj.path);
  }

  function renderSidebar(){
    sidebar.innerHTML = '';

    testPages.forEach(function(page){
      var btn = document.createElement('button');

      btn.className = 'testNavButton';
      btn.textContent = page.name;

      btn.onclick = function(){
        loadPage(page, btn);
      };

      sidebar.appendChild(btn);
    });
  }

  document.addEventListener('DOMContentLoaded', renderSidebar);

})();
</script>

</body>
