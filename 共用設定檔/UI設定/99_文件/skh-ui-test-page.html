<style>
body{
  margin:0;
  padding:32px;
  background:var(--skh-bg,#f8fafc);
  color:var(--skh-text,#334155);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

.testPage{max-width:1180px;margin:0 auto;}
.testHeader{margin-bottom:28px;}
.testHeader h1{margin:0 0 8px;font-size:34px;}
.testHeader p{margin:0;color:var(--skh-muted,#64748b);}

.testSection{
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:24px;
  margin-bottom:22px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
}

.testSection h2{margin:0 0 8px;font-size:22px;}
.testNote{margin:0 0 18px;color:var(--skh-muted,#64748b);line-height:1.7;}
.testSubhead{margin:24px 0 10px;font-size:16px;font-weight:800;color:#1e293b;}
.testRow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}

.testTable{width:100%;border-collapse:collapse;margin-bottom:18px;}
.testTable th{
  background:#f8fafc;
  text-align:left;
  padding:12px;
  border:1px solid var(--skh-line,#cbd5e1);
  font-size:14px;
}
.testTable td{
  padding:12px;
  border:1px solid var(--skh-line,#cbd5e1);
  vertical-align:middle;
}
.testTable code{
  background:#eef2f7;
  padding:3px 6px;
  border-radius:6px;
  font-size:13px;
  display:inline-block;
  margin:2px 0;
}

.testLayout{display:flex;gap:24px;align-items:flex-start;}

.testSidebar{
  width:220px;
  flex-shrink:0;
  background:white;
  border:1px solid var(--skh-line,#cbd5e1);
  border-radius:var(--skh-radius,8px);
  padding:12px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
}

.testContent{
  flex-grow:1;
  min-width:0;
  background:#fff;
  border-radius:var(--skh-radius,8px);
  min-height:600px;
  padding:24px;
  box-shadow:var(--skh-shadow,0 1px 3px rgba(0,0,0,.1));
}

.testNavButton{
  display:block;
  width:100%;
  text-align:left;
  padding:12px 16px;
  margin-bottom:8px;
  background:transparent;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  font-size:15px;
  color:var(--skh-text,#334155);
}

.testNavButton:hover{background:#f1f5f9;color:#2563eb;}
.testNavButton.active{background:#eff6ff;color:#1d4ed8;font-weight:bold;}

.ui-loading-box{padding:40px;text-align:center;color:#64748b;}
.ui-error-box{
  color:#b42318;
  background:#fff7f7;
  border:1px solid #f4b4ae;
  border-radius:10px;
  padding:20px;
}

@media(max-width:900px){
  body{padding:18px;}
  .testLayout{flex-direction:column;}
  .testSidebar{
    width:auto;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:16px;
  }
  .testNavButton{
    width:auto;
    margin-bottom:0;
    padding:8px 14px;
    border:1px solid var(--skh-line,#cbd5e1);
  }
  .testTable{display:block;overflow-x:auto;white-space:nowrap;}
}
</style>
</head>

<body>

<main class="testPage">

<header class="testHeader">
  <h1>SKH CSS 測試頁</h1>
  <p>模組化 UI 元件測試，請從選單切換想檢視的元件。</p>
</header>

<div class="testLayout">
  <nav class="testSidebar" id="test-sidebar"></nav>

  <div class="testContent" id="test-content">
    <div style="padding:40px;text-align:center;color:#64748b;border:1px dashed var(--skh-line,#cbd5e1);border-radius:var(--skh-radius,8px);">
      請從選單選擇要測試的元件
    </div>
  </div>
</div>

</main>

<script>
(function(){

  var testPages = [
    {id:'UiStyleTest',name:'00_基礎樣式',path:'共用設定檔/UI設定/00_基礎/UiStyleTest'},
    {id:'UiButtonTest',name:'01_按鈕元件',path:'共用設定檔/UI設定/01_按鈕/UiButtonTest'},
    {id:'UiFormTest',name:'02_表單元件',path:'共用設定檔/UI設定/02_表單/UiFormTest'},
    {id:'UiTableTest',name:'03_表格元件',path:'共用設定檔/UI設定/03_表格/UiTableTest'},
    {id:'UiAlertTest',name:'04_提示元件',path:'共用設定檔/UI設定/04_提示/UiAlertTest'},
    {id:'UiLoadingTest',name:'05_載入互動',path:'共用設定檔/UI設定/05_互動/UiLoadingTest'},
    {id:'UiModalTest',name:'06_彈跳視窗',path:'共用設定檔/UI設定/05_互動/UiModalTest'}
  ];

  var sidebar = document.getElementById('test-sidebar');
  var content = document.getElementById('test-content');

  function runInsertedScripts(container){
    var scripts = container.querySelectorAll('script');

    scripts.forEach(function(oldScript){
      var newScript = document.createElement('script');

      Array.prototype.slice.call(oldScript.attributes).forEach(function(attr){
        newScript.setAttribute(attr.name, attr.value);
      });

      newScript.textContent = oldScript.textContent;

      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function activateButton(activeBtn){
    var buttons = sidebar.querySelectorAll('.testNavButton');

    buttons.forEach(function(btn){
      btn.classList.remove('active');
    });

    if(activeBtn){
      activeBtn.classList.add('active');
    }
  }

  function showLoading(message){

    content.innerHTML =
      '<div class="ui-loading-box" data-ui-loading="1">' +
        '<div class="skh-spinner"></div>' +
        '<div style="margin-top:12px;font-weight:600;color:#64748b;">' +
          message +
        '</div>' +
      '</div>';

  }

  function showError(error){
    content.innerHTML =
      '<div class="ui-error-box">載入失敗：' +
      (error && error.message ? error.message : error) +
      '</div>';
  }

  function revealWhenThemeReady(pageObj, wrapper, loadingEl){

    function reveal(){
      if(loadingEl && loadingEl.parentNode){
        loadingEl.parentNode.removeChild(loadingEl);
      }

      wrapper.style.display =
        '';
    }

    if(
      pageObj.id === 'UiButtonTest' &&
      typeof window.loadButtonTheme === 'function'
    ){

      var revealed =
        false;

      function done(){
        if(revealed){
          return;
        }

        revealed =
          true;

        reveal();
      }

      /*
        UiButtonTest 如果支援 callback，theme 載入完成才顯示。
        如果舊版不支援 callback，0.8 秒後也會顯示，避免永遠卡住。
      */
      window.loadButtonTheme(done);

      setTimeout(
        done,
        800
      );

      return;
    }

    reveal();

  }

  function loadPage(pageObj, btn){

    activateButton(btn);

    var startTime =
      Date.now();

    showLoading(
      '載入中：' +
      pageObj.name +
      '...'
    );

    google.script.run
      .withSuccessHandler(function(html){

        var loadingEl =
          content.querySelector('[data-ui-loading]');

        if(loadingEl){
          loadingEl.querySelector('div:last-child').textContent =
            '讀取樣式設定中...';
        }

        var wrapper =
          document.createElement('div');

        wrapper.style.display =
          'none';

        wrapper.innerHTML =
          html;

        /*
          不要清掉 content。
          Loading 要留著，wrapper 先藏起來。
          等 theme ready 再移除 Loading 並顯示 wrapper。
        */
        content.appendChild(
          wrapper
        );

        runInsertedScripts(
          wrapper
        );

        var elapsed =
          Date.now() - startTime;

        var wait =
          Math.max(
            0,
            400 - elapsed
          );

        setTimeout(function(){

          revealWhenThemeReady(
            pageObj,
            wrapper,
            loadingEl
          );

        },wait);

      })
      .withFailureHandler(function(error){

        showError(
          error
        );

      })
      .getUiTestPageContent(
        pageObj.path
      );

  }

  function renderSidebar(){
    sidebar.innerHTML = '';

    testPages.forEach(function(page){
      var btn = document.createElement('button');

      btn.className = 'testNavButton';
      btn.textContent = page.name;

      btn.onclick = function(){
        loadPage(page, btn);
      };

      sidebar.appendChild(btn);

      if(page.id === 'UiButtonTest'){
        setTimeout(function(){
          loadPage(page, btn);
        },0);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', renderSidebar);

})();
</script>

</body>
</html>
