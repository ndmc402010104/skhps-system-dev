<section class="testSection">
  <h2>02 UiForm / 表單</h2>
  <p class="testNote">每個表單元件第一列都是原始基底。</p>

  <table class="testTable">
    <tbody>
      <tr>
        <td>最原始輸入框基底，病歷號、姓名、GTIN 都可用</td>
        <td><code>.skh-input</code></td>
        <td><input class="skh-input" placeholder="請輸入病歷號"></td>
      </tr>
      <tr>
        <td>最原始下拉選單，敷料分類、狀態使用</td>
        <td><code>.skh-select</code></td>
        <td>
          <select class="skh-select">
            <option>泡棉</option>
            <option>Ag</option>
            <option>藻酸鹽</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>最原始文字區，備註使用</td>
        <td><code>.skh-textarea</code></td>
        <td><textarea class="skh-textarea" rows="3" placeholder="備註"></textarea></td>
      </tr>
      <tr>
        <td>最原始 radio 群組，健保/自費、已計價/未計價使用</td>
        <td><code>.skh-radio-group</code><br><code>.skh-radio</code></td>
        <td>
          <div class="skh-radio-group">
            <label class="skh-radio"><input type="radio" name="pay" checked>健保</label>
            <label class="skh-radio"><input type="radio" name="pay">自費</label>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</section>
