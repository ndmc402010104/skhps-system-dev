  var state = {};
  var isBusy = false;
  var MAX_HISTORY = 20;

  function getEl(id){ return document.getElementById(id); }

  function kebab(v){
    return String(v).replace(/[A-Z]/g,function(m){ return '-' + m.toLowerCase(); });
  }

  function clone(o){
    var x = {};
    Object.keys(o || {}).forEach(function(k){ x[k] = o[k]; });
    return x;
  }

  function same(a,b,key){
    return CONFIG_BY_KEY[key].props.every(function(p){
      return String(a[p.key]) === String(b[p.key]);
    });
  }

  function isDirty(key){ return !same(state[key].current,state[key].original,key); }
  function isDefault(key){ return same(state[key].current,state[key].defaultValue,key); }
  function systemIsDefault(key){ return same(state[key].original,state[key].defaultValue,key); }

  function cssVar(key,prop){
    var cfg = CONFIG_BY_KEY[key];
    return '--skh-btn-' + cfg.className + '-' + kebab(prop);
  }

  function inputId(key,prop){ return key + '_' + prop + '_input'; }
  function unitId(key,prop){ return key + '_' + prop + '_unit'; }
  function modeId(key,prop){ return key + '_' + prop + '_mode'; }
  function customId(key,prop){ return key + '_' + prop + '_custom'; }
  function auxId(key,prop,name){ return key + '_' + prop + '_' + name; }
  function cssId(key){ return key + '_cssPreview'; }

  function parseUnitValue(value,defaultUnit){
    value = String(value || '').trim();

    if(value === '0'){
      return {num:'0',unit:defaultUnit || 'px'};
    }

    var m = value.match(/^(-?\d+(?:\.\d+)?)([a-z%]*)$/i);

    if(m){
      return {
        num:m[1],
        unit:m[2] || defaultUnit || 'px'
      };
    }

    return {
      num:value,
      unit:defaultUnit || 'px'
    };
  }

  function normalizeValue(value,fallback,type){
    value = String(value || '').trim();

    if(type === 'color'){
      if(/^#[0-9a-fA-F]{6}$/.test(value)) return value.toLowerCase();
      if(/^#[0-9a-fA-F]{3}$/.test(value)){
        return ('#' + value[1]+value[1] + value[2]+value[2] + value[3]+value[3]).toLowerCase();
      }
      if(value === 'transparent') return 'transparent';
      if(value === 'currentColor') return 'currentColor';
      if(/^var\(.+\)$/.test(value)) return value;
      if(/^rgba?\(.+\)$/.test(value)) return value;
    }

    return value || fallback;
  }

  function readFromData(data,key,fallback){
    var cfg = CONFIG_BY_KEY[key];
    var src = data && data[cfg.className] ? data[cfg.className] : {};
    var out = {};

    cfg.props.forEach(function(p){
      out[p.key] = normalizeValue(
        src[p.key],
        fallback[p.key],
        p.type
      );
    });

    return out;
  }

  function colorPickerFallback(value){
    value = String(value || '');

    if(/^#[0-9a-fA-F]{6}$/.test(value)) return value;
    if(/^#[0-9a-fA-F]{3}$/.test(value)){
      return ('#' + value[1]+value[1] + value[2]+value[2] + value[3]+value[3]).toLowerCase();
    }

    return '#ffffff';
  }

  function detectColorMode(value){
    value = String(value || '').trim();

    if(value === 'transparent') return 'transparent';
    if(value === 'currentColor') return 'currentColor';
    if(value === 'var(--skh-primary)') return 'systemPrimary';
    if(/^rgba?\(.+\)$/.test(value)) return 'custom';
    if(/^var\(.+\)$/.test(value)) return 'custom';
    if(/^#[0-9a-fA-F]{3,6}$/.test(value)) return 'color';

    return 'custom';
  }

  function shadowPresetName(value){
    value = String(value || '').trim();

    for(var key in SHADOW_PRESETS){
      if(SHADOW_PRESETS[key] === value) return key;
    }

    return 'custom';
  }

  function radiusPresetName(value){
    value = String(value || '').trim();

    for(var key in RADIUS_PRESETS){
      if(RADIUS_PRESETS[key] === value) return key;
    }

    return 'custom';
  }

  function parseOutline(value){
    value = String(value || '').trim();

    var m = value.match(/^(-?\d+(?:\.\d+)?)([a-z%]+)\s+([a-zA-Z]+)\s+(.+)$/);

    if(m){
      return {
        width:m[1],
        unit:m[2],
        style:m[3],
        color:m[4]
      };
    }

    return {
      width:'3',
      unit:'px',
      style:'solid',
      color:'rgba(37,99,235,.25)'
    };
  }

  function parseBoxShadow(value){
    value = String(value || '').trim();

    if(value === 'none'){
      return {
        x:'0',
        xUnit:'px',
        y:'0',
        yUnit:'px',
        blur:'0',
        blurUnit:'px',
        color:'rgba(15,23,42,.08)'
      };
    }

    var m = value.match(/^(-?\d+(?:\.\d+)?)([a-z%]*)\s+(-?\d+(?:\.\d+)?)([a-z%]*)\s+(-?\d+(?:\.\d+)?)([a-z%]*)\s+(.+)$/i);

    if(m){
      return {
        x:m[1],
        xUnit:m[2] || 'px',
        y:m[3],
        yUnit:m[4] || 'px',
        blur:m[5],
        blurUnit:m[6] || 'px',
        color:m[7]
      };
    }

    return {
      x:'0',
      xUnit:'px',
      y:'3',
      yUnit:'px',
      blur:'10',
      blurUnit:'px',
      color:'rgba(15,23,42,.06)'
    };
  }

  function writeInputs(key,vals){
    var cfg = CONFIG_BY_KEY[key];

    cfg.props.forEach(function(p){
      var input = getEl(inputId(key,p.key));
      var unit = getEl(unitId(key,p.key));
      var mode = getEl(modeId(key,p.key));
      var custom = getEl(customId(key,p.key));

      if(p.type === 'unit'){
        var parsed = parseUnitValue(vals[p.key],p.unit || 'px');
        if(input) input.value = parsed.num;
        if(unit) unit.value = parsed.unit;
        return;
      }

      if(p.type === 'number'){
        if(input) input.value = vals[p.key];
        return;
      }

      if(p.type === 'enum'){
        if(input) input.value = vals[p.key];
        return;
      }

      if(p.type === 'fontWeight'){
        if(input) input.value = vals[p.key];
        if(mode){
          var allowed = ['400','500','600','700','800'];
          mode.value = allowed.indexOf(String(vals[p.key])) >= 0
            ? String(vals[p.key])
            : '700';
        }
        return;
      }

      if(p.type === 'shadow'){
        var shadowMode = shadowPresetName(vals[p.key]);
        if(mode) mode.value = shadowMode;

        var shadow = parseBoxShadow(vals[p.key]);

        var xInput = getEl(auxId(key,p.key,'x'));
        var xUnit = getEl(auxId(key,p.key,'xUnit'));
        var yInput = getEl(auxId(key,p.key,'y'));
        var yUnit = getEl(auxId(key,p.key,'yUnit'));
        var blurInput = getEl(auxId(key,p.key,'blur'));
        var blurUnit = getEl(auxId(key,p.key,'blurUnit'));
        var colorModeInput = getEl(auxId(key,p.key,'colorMode'));
        var colorInput = getEl(auxId(key,p.key,'color'));

        if(xInput) xInput.value = shadow.x;
        if(xUnit) xUnit.value = shadow.xUnit;
        if(yInput) yInput.value = shadow.y;
        if(yUnit) yUnit.value = shadow.yUnit;
        if(blurInput) blurInput.value = shadow.blur;
        if(blurUnit) blurUnit.value = shadow.blurUnit;

        var detected = detectColorMode(shadow.color);
        if(colorModeInput) colorModeInput.value = detected;
        if(colorInput) colorInput.value = colorPickerFallback(shadow.color);
        if(custom) custom.value = shadow.color;

        return;
      }

      if(p.type === 'radius'){
        var radiusMode = radiusPresetName(vals[p.key]);
        if(mode) mode.value = radiusMode;

        var parsedRadius = parseUnitValue(vals[p.key],'px');

        if(input) input.value = parsedRadius.num;
        if(unit) unit.value = parsedRadius.unit;
        return;
      }

      if(p.type === 'outline'){
        var outline = parseOutline(vals[p.key]);

        var widthInput = getEl(auxId(key,p.key,'width'));
        var widthUnit = getEl(auxId(key,p.key,'unit'));
        var styleInput = getEl(auxId(key,p.key,'style'));
        var colorModeInput = getEl(auxId(key,p.key,'colorMode'));
        var colorInput = getEl(auxId(key,p.key,'color'));
        var customInput = getEl(customId(key,p.key));

        if(widthInput) widthInput.value = outline.width;
        if(widthUnit) widthUnit.value = outline.unit;
        if(styleInput) styleInput.value = outline.style;

        var detectedOutlineColor = detectColorMode(outline.color);

        if(colorModeInput) colorModeInput.value = detectedOutlineColor;
        if(colorInput) colorInput.value = colorPickerFallback(outline.color);
        if(customInput) customInput.value = outline.color;

        return;
      }

      if(p.type === 'color'){
        var colorMode = detectColorMode(vals[p.key]);
        if(mode) mode.value = colorMode;

        if(input) input.value = colorPickerFallback(vals[p.key]);
        if(custom) custom.value = vals[p.key];

        return;
      }

      if(input) input.value = vals[p.key];
    });

    updateControlVisibility(key);
  }

  function readInputs(key){
    var cfg = CONFIG_BY_KEY[key];
    var out = {};

    cfg.props.forEach(function(p){

          (xUnit ? xUnit.value : 'px') +

          (yInput ? yInput.value : '3') +
          (yUnit ? yUnit.value : 'px') +

          (blurUnit ? blurUnit.value : 'px') +

      if(p.type === 'radius'){
        var radiusMode =
          mode
          ? mode.value

          out[p.key] =
            (input ? input.value : '') +
            (unit ? unit.value : 'px');
        }
        else{
          out[p.key] =
            RADIUS_PRESETS[radiusMode];

      if(p.type === 'outline'){

        var widthUnit = getEl(auxId(key,p.key,'unit'));

        var colorInput = getEl(auxId(key,p.key,'color'));

          outlineColor = 'currentColor';

          outlineColor = 'var(--skh-primary)';
        }
        else if(outlineColorMode === 'custom'){
          outlineColor =
            customInput
            ? customInput.value
            : 'rgba(37,99,235,.25)';
        }
        else{
          outlineColor =
            colorInput
            ? colorInput.value
            : '#2563eb';
        }

        out[p.key] =
          (widthInput ? widthInput.value : '3') +
          (widthUnit ? widthUnit.value : 'px') +
          ' ' +
          (styleInput ? styleInput.value : 'solid') +
          ' ' +
          outlineColor;

        return;
      }

      if(p.type === 'color'){
        var colorModeInput =
          mode
          ? mode.value
          : 'color';

        if(colorModeInput === 'transparent'){
          out[p.key] = 'transparent';
        }
        else if(colorModeInput === 'currentColor'){
          out[p.key] = 'currentColor';
        }
        else if(colorModeInput === 'systemPrimary'){
          out[p.key] = 'var(--skh-primary)';
        }
        else if(colorModeInput === 'custom'){
          out[p.key] =
            custom
            ? custom.value
            : state[key].defaultValue[p.key];
        }
        else{
          out[p.key] =
            input
            ? input.value
            : state[key].defaultValue[p.key];
        }

        return;
      }

      out[p.key] =
        input
        ? input.value
        : state[key].defaultValue[p.key];

    return out;

  function updateControlVisibility(key){
    var cfg = CONFIG_BY_KEY[key];

    cfg.props.forEach(function(p){
      var input = getEl(inputId(key,p.key));
      var unit = getEl(unitId(key,p.key));
      var mode = getEl(modeId(key,p.key));
      var custom = getEl(customId(key,p.key));

      if(p.type === 'color'){

          mode

          : 'color';

        if(input) input.style.display = colorMode === 'color' ? '' : 'none';
        if(custom) custom.style.display = colorMode === 'custom' ? '' : 'none';

      if(p.type === 'shadow'){
        var shadowMode =
          mode
          ? mode.value

        var box = getEl(auxId(key,p.key,'box'));
        var colorModeInput = getEl(auxId(key,p.key,'colorMode'));
        var colorInput = getEl(auxId(key,p.key,'color'));

        if(box) box.style.display = shadowMode === 'custom' ? '' : 'none';

        var shadowColorMode =
          colorModeInput
          ? colorModeInput.value
          : 'custom';

        if(colorInput) colorInput.style.display = shadowColorMode === 'color' ? '' : 'none';
        if(custom) custom.style.display = shadowColorMode === 'custom' ? '' : 'none';
      }

      if(p.type === 'radius'){
        var radiusMode =
          mode
          ? mode.value
          : 'custom';

        if(input) input.style.display = radiusMode === 'custom' ? '' : 'none';
        if(unit) unit.style.display = radiusMode === 'custom' ? '' : 'none';
      }

      if(p.type === 'outline'){
        var colorModeInput = getEl(auxId(key,p.key,'colorMode'));
        var colorInput = getEl(auxId(key,p.key,'color'));

        var outlineColorMode =
          colorModeInput
          ? colorModeInput.value
          : 'custom';

        if(colorInput) colorInput.style.display = outlineColorMode === 'color' ? '' : 'none';

        '  padding:' + value('paddingY') + ' ' + value('paddingX') + ';\n' +
        '  font-size:' + value('fontSize') + ';\n' +
        '  font-weight:' + value('fontWeight') + ';\n' +
        '  gap:' + value('gap') + ';\n' +
        '  line-height:' + value('lineHeight') + ';\n' +
        '}\n\n.skh-btn:hover{\n' +
        '  box-shadow:' + value('hoverShadow') + ';\n' +
        '}\n\n.skh-btn:active{\n' +
        '  box-shadow:' + value('activeShadow') + ';\n' +
        '}\n\n.skh-btn:focus-visible{\n' +
        '  outline:' + value('focusOutline') + ';\n' +
        '  outline-offset:' + value('focusOutlineOffset') + ';\n' +
        '}';
    }

    if(key === 'sm' || key === 'lg'){
      return cfg.selector + '{\n' +
        '  padding:' + value('paddingY') + ' ' + value('paddingX') + ';\n' +
        '  font-size:' + value('fontSize') + ';\n' +
        '}';
    }

    if(key === 'full'){
      return cfg.selector + '{\n  width:' + value('width') + ';\n}';
    }

    if(key === 'icon'){
      return cfg.selector + '{\n' +
        '  width:' + value('width') + ';\n' +
        '  height:' + value('height') + ';\n' +
        '  padding:' + value('padding') + ';\n' +
        '}';
    }

    if(key === 'pill'){
      return cfg.selector + '{\n  border-radius:' + value('radius') + ';\n}';
    }

    if(key === 'selected'){
      return cfg.selector + '{\n' +
        '  background:' + value('bg') + ';\n' +
        '  color:' + value('text') + ';\n' +
        '  border-color:' + value('border') + ';\n' +
        '}';
    }

    if(key === 'loading'){
      return cfg.selector + '{\n' +
        '  opacity:' + value('opacity') + ';\n' +
        '}\n\n' + cfg.selector + '::before{\n' +
        '  width:' + value('spinnerSize') + ';\n' +
        '  height:' + value('spinnerSize') + ';\n' +
        '  border-width:' + value('spinnerBorderWidth') + ';\n' +
        '  border-color:' + value('spinnerBorderColor') + ';\n' +
        '  border-top-color:' + value('spinnerTopColor') + ';\n' +
        '}';
    }

    if(key === 'disabled'){
      return cfg.selector + '{\n  opacity:' + value('opacity') + ';\n}';
    }

    if(key === 'group' || key === 'toolbar'){
      return cfg.selector + '{\n  gap:' + value('gap') + ';\n}';
    }

    if(key === 'mobile'){
      return '@media(max-width:640px){\n  .skh-btn{\n    min-height:' + value('minHeight') + ';\n  }\n}';
    }

    if(key === 'iconMobile'){
      return '@media(max-width:640px){\n  .skh-btn-icon{\n    width:' + value('width') + ';\n    height:' + value('height') + ';\n  }\n}';
    }

    var normal = [];
    var hover = [];

    cfg.props.forEach(function(p){
      var cssName = p.key;

      if(p.key === 'bg') cssName = 'background';
      if(p.key === 'text') cssName = 'color';
      if(p.key === 'border') cssName = 'border-color';
      if(p.key === 'hoverBg') cssName = 'background';
      if(p.key === 'hoverBorder') cssName = 'border-color';

      var line = '  ' + cssName + ':' + value(p.key) + ';';

      if(p.key.indexOf('hover') === 0){
        hover.push(line);
      }
      else{
        normal.push(line);
      }
    });

    var out = cfg.selector + '{\n' + normal.join('\n') + '\n}';

    if(hover.length){
      out += '\n\n' + cfg.selector + ':hover{\n' + hover.join('\n') + '\n}';
    }

    return out;
  }

    if(!s) return;

    var btn = getEl(key + '_editButton');
    if(btn) btn.textContent = s.isEditing ? '返回' : '編輯';

    show(key + '_undoButton', s.isEditing && s.history.length > 0);
    show(key + '_restoreSystemButton', s.isEditing && isDirty(key) && !systemIsDefault(key));
    show(key + '_restoreDefaultButton', s.isEditing && !isDefault(key));
    show(key + '_setDefaultButton', s.isEditing && !isDefault(key));
    show(key + '_saveButton', s.isEditing && isDirty(key));
    show(key + '_cssApplyButton', s.cssDirty);
    show(key + '_cssSaveButton', s.cssDirty || isDirty(key));
  }

  function setInputsEnabled(key,on){
    var cfg = CONFIG_BY_KEY[key];

    cfg.props.forEach(function(p){
      var controls = [
        getEl(inputId(key,p.key)),
        getEl(unitId(key,p.key)),
        getEl(modeId(key,p.key)),
        getEl(customId(key,p.key)),
        getEl(auxId(key,p.key,'width')),
        getEl(auxId(key,p.key,'unit')),
        getEl(auxId(key,p.key,'style')),
        getEl(auxId(key,p.key,'colorMode')),
        getEl(auxId(key,p.key,'color')),
        getEl(auxId(key,p.key,'x')),
        getEl(auxId(key,p.key,'xUnit')),
        getEl(auxId(key,p.key,'y')),
        getEl(auxId(key,p.key,'yUnit')),
        getEl(auxId(key,p.key,'blur')),
        getEl(auxId(key,p.key,'blurUnit'))
      ];

      controls.forEach(function(el){
        if(!el) return;
        el.disabled = !on;
        el.style.opacity = '1';
        el.style.cursor = on ? 'pointer' : 'not-allowed';
      });
    });

    updateControlVisibility(key);
  }

  function setCssLocked(key,locked){
    var el = getEl(cssId(key));
    var btn = getEl(key + '_cssEditButton');
    if(!el) return;

    el.disabled = locked;
    el.readOnly = locked;
    el.style.background = locked ? '#f8fafc' : '#fff';
    el.style.borderColor = locked ? '#dbe4ef' : '#93c5fd';
    el.style.opacity = '1';
    el.style.cursor = locked ? 'not-allowed' : 'text';

    if(btn) btn.textContent = locked ? '編輯 CSS' : '取消編輯';

    if(locked){
      state[key].cssEditSnapshot = null;
      state[key].cssDirty = false;
    }

    refresh(key);
  }

  function setBusy(busy,msg){
    isBusy = !!busy;

    CONFIG.forEach(function(cfg){
      var key = cfg.key;

      [
        key+'_editButton',
        key+'_undoButton',
        key+'_restoreSystemButton',
        key+'_restoreDefaultButton',
        key+'_setDefaultButton',
        key+'_saveButton',
        key+'_cssEditButton',
        key+'_cssApplyButton',
        key+'_cssSaveButton'
      ].forEach(function(id){
        var el = getEl(id);
        if(el) el.disabled = isBusy;
      });

      if(state[key]){
        setInputsEnabled(key,state[key].isEditing && !isBusy);
      }
    });

    if(msg) setStatus(msg,'');
  }

  function apply(key,vals,opt){
    opt = opt || {};

    if(opt.recordHistory) pushHistorySnapshot(key,state[key].current);

    state[key].current = clone(vals);
    setVars(key,state[key].current);
    writeInputs(key,state[key].current);
    writeCss(key,state[key].current);

    if(opt.lockCss !== false){
      setCssLocked(key,true);
    }

    refresh(key);
  }

  function pushHistorySnapshot(key,snap){
    if(!snap || same(snap,state[key].current,key)) return;

    var h = state[key].history;

    if(h.length && same(h[h.length - 1],snap,key)) return;

    h.push(clone(snap));

    if(h.length > MAX_HISTORY){
      h.shift();
    }
  }

  function clearUndo(key){
    state[key].history = [];
    state[key].colorDragSnapshot = null;
  }

  function jobs(key,vals){
    var cfg = CONFIG_BY_KEY[key];

    return cfg.props.map(function(p){
      return {
        className:cfg.className,
        property:p.key,
        value:vals[p.key]
      };
    });
  }

  function saveJobs(list,i,fn,done){
    if(i >= list.length){
      if(typeof done === 'function') done();
      return;
    }

    var job = list[i];

    google.script.run
      .withSuccessHandler(function(){
        saveJobs(list,i + 1,fn,done);
      })
      .withFailureHandler(function(err){
        setBusy(false);
        setStatus('儲存失敗：' + (err && err.message ? err.message : err),'error');
      })[fn](job.className,job.property,job.value);
  }

  function init(){
    CONFIG.forEach(function(cfg){
      state[cfg.key] = {
        defaultValue:clone(cfg.fallback),
        original:clone(cfg.fallback),
        current:clone(cfg.fallback),
        history:[],
        isEditing:false,
        themeEditSnapshot:null,
        colorDragSnapshot:null,
        cssEditSnapshot:null,
        cssDirty:false
      };
    });
  }

  function bind(){
    CONFIG.forEach(function(cfg){
      var key = cfg.key;

      cfg.props.forEach(function(p){
        var ids = [
          inputId(key,p.key),
          unitId(key,p.key),
          modeId(key,p.key),
          customId(key,p.key),
          auxId(key,p.key,'width'),
          auxId(key,p.key,'unit'),
          auxId(key,p.key,'style'),
          auxId(key,p.key,'colorMode'),
          auxId(key,p.key,'color')
        ];

        ids.forEach(function(id){
          var el = getEl(id);

          if(!el) return;

          el.addEventListener('change',function(){
            if(isBusy || !state[key].isEditing) return;

            if(p.type === 'fontWeight' && id === modeId(key,p.key)){
              var weightInput = getEl(inputId(key,p.key));
              if(weightInput) weightInput.value = el.value;
            }
          });

          el.addEventListener('focus',function(){
            if(isBusy || !state[key].isEditing) return;

            if(!state[key].colorDragSnapshot){
              state[key].colorDragSnapshot =
                clone(state[key].current);
            }
          });

          el.addEventListener('input',function(){
            if(isBusy || !state[key].isEditing) return;

            apply(
              key,
              readInputs(key),
              {
                recordHistory:false,
                lockCss:false
              }
            );

            updateControlVisibility(key);
          });

          el.addEventListener('change',function(){
            if(isBusy || !state[key].isEditing) return;

            apply(
              key,
              readInputs(key),
              {
                recordHistory:false,
                lockCss:false
              }
            );

            updateControlVisibility(key);

            if(
              state[key].colorDragSnapshot &&
              !same(
                state[key].colorDragSnapshot,
                state[key].current,
                key
              )
            ){
              pushHistorySnapshot(
                key,
                state[key].colorDragSnapshot
              );
            }

            state[key].colorDragSnapshot = null;
            refresh(key);
          });

          el.addEventListener('blur',function(){
            state[key].colorDragSnapshot = null;
          });
        });
      });

      var preview = getEl(cssId(key));

      if(preview){
        preview.addEventListener('input',function(){
          if(preview.readOnly || isBusy) return;

          state[key].cssDirty =
            preview.value !== state[key].cssEditSnapshot;

          setStatus('','');
          refresh(key);
        });
      }
    });

    document.addEventListener('pointerdown',function(e){
      var btn = e.target.closest('[data-action][data-key]');
      if(!btn) return;
      e.preventDefault();
    });

    document.addEventListener('click',function(e){
      var btn = e.target.closest('[data-action][data-key]');
      if(!btn) return;

      var key = btn.getAttribute('data-key');
      var action = btn.getAttribute('data-action');

      if(action === 'editButton') toggleEdit(key);
      if(action === 'undoButton') undoChange(key);
      if(action === 'restoreSystemButton') restoreSystem(key);
      if(action === 'restoreDefaultButton') restoreDefault(key);
      if(action === 'setDefaultButton') saveAsDefault(key);
      if(action === 'saveButton') saveTheme(key);
      if(action === 'cssEditButton') toggleCssEdit(key);
      if(action === 'cssApplyButton') applyFromCss(key);
      if(action === 'cssSaveButton') saveTheme(key);
    });

    document.querySelectorAll('[data-free-group]').forEach(function(group){
      group.addEventListener('click',function(e){
        var btn = e.target.closest('[data-free-value]');
        if(!btn) return;

        group.querySelectorAll('[data-free-value]').forEach(function(item){
          item.classList.remove('skh-btn-selected');
          item.classList.add('skh-btn-secondary');
        });

        btn.classList.add('skh-btn-selected');
        btn.classList.remove('skh-btn-secondary');

        updateFreeButton();
      });
    });

    var freeText = getEl('freeButtonText');

    if(freeText){
      freeText.addEventListener('input',updateFreeButton);
    }
  }

  function applyLoaded(currentData,defaultData){
    CONFIG.forEach(function(cfg){
      var key = cfg.key;

      state[key].defaultValue =
        readFromData(
          defaultData,
          key,
          cfg.fallback
        );

      state[key].original =
        readFromData(
          currentData,
          key,
          state[key].defaultValue
        );

      state[key].current =
        clone(state[key].original);

      state[key].history = [];
      state[key].isEditing = false;
      state[key].themeEditSnapshot = null;
      state[key].colorDragSnapshot = null;
      state[key].cssEditSnapshot = null;
      state[key].cssDirty = false;

      setVars(key,state[key].current);
      writeInputs(key,state[key].current);
      writeCss(key,state[key].current);
      setInputsEnabled(key,false);
      setCssLocked(key,true);
      refresh(key);
    });

    setStatus('','');
    updateFreeButton();
  }

  window.loadButtonTheme = function(done){
    if(isBusy) return;

    setBusy(true,'讀取中...');

    google.script.run
      .withSuccessHandler(function(currentData){
        google.script.run
          .withSuccessHandler(function(defaultData){
            applyLoaded(currentData,defaultData);
            setBusy(false);

            if(typeof done === 'function'){
              done();
            }

          })
          .withFailureHandler(function(err){
            setBusy(false);

            setStatus(
              '讀取 default 失敗：' +
              (
                err &&
                err.message
                ? err.message
                : err
              ),
              'error'
            );

            if(typeof done === 'function'){
              done();
            }

          })
          .getButtonDefaultCssSettings();
      })
      .withFailureHandler(function(err){
        setBusy(false);

        setStatus(
          '讀取失敗：' +
          (
            err &&
            err.message
            ? err.message
            : err
          ),
          'error'
        );

        if(typeof done === 'function'){
          done();
        }

      })
      .getButtonCssSettings();
  };

  window.applyButtonTheme = function(data){
    applyLoaded(data,{});
  };

  function toggleEdit(key){
    var s = state[key];

    if(isBusy || !s) return;

    if(!s.isEditing){
      s.isEditing = true;
      s.themeEditSnapshot = clone(s.current);
      setInputsEnabled(key,true);
      refresh(key);
      return;
    }

    s.isEditing = false;
    setInputsEnabled(key,false);

    if(isDirty(key)){
      apply(
        key,
        s.themeEditSnapshot || s.original,
        {
          recordHistory:false
        }
      );
    }

    s.themeEditSnapshot = null;
    clearUndo(key);
    refresh(key);
  }

  function undoChange(key){
    var s = state[key];

    if(
      isBusy ||
      !s ||
      !s.isEditing ||
      s.history.length === 0
    ){
      return;
    }

    apply(
      key,
      s.history.pop(),
      {
        recordHistory:false,
        lockCss:false
      }
    );

    refresh(key);
  }

  function restoreSystem(key){
    if(
      isBusy ||
      !state[key] ||
      !state[key].isEditing ||
      !isDirty(key)
    ){
      return;
    }

    pushHistorySnapshot(
      key,
      clone(state[key].current)
    );

    apply(
      key,
      state[key].original,
      {
        recordHistory:false,
        lockCss:false
      }
    );

    refresh(key);
  }

  function restoreDefault(key){
    if(
      isBusy ||
      !state[key] ||
      !state[key].isEditing ||
      isDefault(key)
    ){
      return;
    }

    pushHistorySnapshot(
      key,
      clone(state[key].current)
    );

    apply(
      key,
      state[key].defaultValue,
      {
        recordHistory:false,
        lockCss:false
      }
    );

    refresh(key);
  }

  function toggleCssEdit(key){
    var s = state[key];
    var preview = getEl(cssId(key));

    if(isBusy || !s || !preview) return;

    if(preview.readOnly){
      s.cssEditSnapshot = preview.value;
      s.cssDirty = false;
      setCssLocked(key,false);
      refresh(key);
      return;
    }

    if(s.cssDirty){
      preview.value =
        s.cssEditSnapshot ||
        cssText(key,s.current);

      s.cssDirty = false;
    }

    setCssLocked(key,true);
    refresh(key);
  }

  function applyFromCss(key){
    var s = state[key];

    if(isBusy || !s || !s.cssDirty) return;

    s.isEditing = true;
    setInputsEnabled(key,true);

    apply(
      key,
      parseCss(key),
      {
        recordHistory:true,
        lockCss:false
      }
    );

    s.cssDirty = false;
    setCssLocked(key,true);
    refresh(key);
  }

  function saveTheme(key){
    var s = state[key];

    if(isBusy || !s) return;

    var vals = clone(s.current);

    if(
      !s.cssDirty &&
      same(vals,s.original,key)
    ){
      refresh(key);
      return;
    }

    apply(
      key,
      vals,
      {
        recordHistory:false
      }
    );

    setBusy(true,'儲存中...');

    saveJobs(
      jobs(key,vals),
      0,
      'saveButtonCssSetting',
      function(){
        s.original = clone(vals);
        s.history = [];
        s.themeEditSnapshot = null;
        s.isEditing = false;
        s.cssEditSnapshot = null;
        s.cssDirty = false;

        setInputsEnabled(key,false);
        setCssLocked(key,true);
        setBusy(false);
        setStatus('已儲存','success');
        refresh(key);
      }
    );
  }

  function saveAsDefault(key){
    var s = state[key];

    if(isBusy || !s || isDefault(key)) return;

    var vals = clone(s.current);

    if(
      !confirm('確定要把目前「' + CONFIG_BY_KEY[key].label + '」設為新的 default 嗎？')
    ){
      return;
    }

    setBusy(true,'設定 default 中...');

    saveJobs(
      jobs(key,vals),
      0,
      'saveButtonDefaultCssSetting',
      function(){
        s.defaultValue = clone(vals);
        setBusy(false);
        setStatus('已設為新 default','success');
        refresh(key);
      }
    );
  }

  function selectedFree(groupName){
    var el =
      document.querySelector(
        '[data-free-group="' + groupName + '"] .skh-btn-selected'
      );

    return el
      ? el.getAttribute('data-free-value')
      : '';
  }

  function updateFreeButton(){
    var btn = getEl('freeButtonPreview');
    var output = getEl('freeButtonCss');

    if(!btn || !output) return;

    var text =
      getEl('freeButtonText').value ||
      '按鈕';

    var role = selectedFree('role');
    var size = selectedFree('size');
    var shape = selectedFree('shape');
    var stateValue = selectedFree('state');

    var classes = ['skh-btn'];

    if(role) classes.push(role);
    if(size) classes.push(size);
    if(shape) classes.push(shape);
    if(stateValue && stateValue !== 'disabled'){
      classes.push(stateValue);
    }

    btn.className = classes.join(' ');
    btn.disabled = stateValue === 'disabled';
    btn.textContent =
      shape === 'skh-btn-icon'
      ? (
          text.trim().slice(0,2) ||
          '✓'
        )
      : text;

    output.value =
      '<button class="' +
      classes.join(' ') +
      '"' +
      (
        btn.disabled
        ? ' disabled'
        : ''
      ) +
      '>' +
      btn.textContent +
      '</button>';
  }

  var CONFIG_BY_KEY = {};

  CONFIG.forEach(function(cfg){
    CONFIG_BY_KEY[cfg.key] = cfg;
  });

  render();
  init();
  bind();

  CONFIG.forEach(function(cfg){
    setInputsEnabled(cfg.key,false);
    setCssLocked(cfg.key,true);
    refresh(cfg.key);
  });

  updateFreeButton();

})();
</script>
