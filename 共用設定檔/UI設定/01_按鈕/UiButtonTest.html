<section class="testSection">

  <h2>01 UiButton Theme Editor</h2>

  <p class="testNote">
    第一階段只測試 Primary。畫面會等 Sheet 樣式載入完成後才顯示，避免先出現舊樣式再跳新樣式。
  </p>

  <div class="testCard">

    <h3>演示</h3>

    <div class="testRow">

      <button class="skh-btn skh-btn-primary">
        儲存
      </button>

      <button class="skh-btn skh-btn-primary skh-btn-lg">
        送出簽到
      </button>

      <button class="skh-btn skh-btn-primary skh-btn-loading">
        儲存中
      </button>

    </div>

  </div>

  <div class="testCard">

    <h3>目前設定</h3>

    <label for="primaryBgPicker">
      Primary 背景色
    </label>

    <input
      id="primaryBgPicker"
      type="color"
      style="
        width:120px;
        height:50px;
        margin-top:8px;
      "
    >

    <div style="margin-top:16px">

      <button
        class="skh-btn skh-btn-secondary"
        onclick="applyPrimaryBg()"
      >
        套用
      </button>

      <button
        class="skh-btn skh-btn-primary"
        onclick="savePrimaryBg()"
      >
        儲存到 Sheet
      </button>

      <button
        class="skh-btn skh-btn-ghost"
        onclick="loadButtonTheme()"
      >
        從 Sheet 重讀
      </button>

    </div>

  </div>

  <div class="testCard">

    <h3>目前 CSS</h3>

    <textarea
      id="cssPreview"
      readonly
      style="
        width:100%;
        min-height:120px;
        padding:12px;
        border:1px solid #dbe4ef;
        border-radius:10px;
        font-family:monospace;
        resize:vertical;
        box-sizing:border-box;
      "
    ></textarea>

  </div>

  <div
    id="themeStatus"
    style="
      margin-top:16px;
      color:#64748b;
      font-weight:600;
    "
  ></div>

</section>

<script>
(function(){

  function getPrimaryBg(){

    var picker =
      document.getElementById('primaryBgPicker');

    return picker && picker.value
      ? picker.value
      : '#344f9f';

  }


  function setPrimaryBg(value){

    document.documentElement.style.setProperty(
      '--skh-btn-primary-bg',
      value
    );

  }


  window.updateCssPreview =
    function(){

      var bg =
        getPrimaryBg();

      var preview =
        document.getElementById('cssPreview');

      if(!preview){
        return;
      }

      preview.value =
`.skh-btn-primary{
  background:${bg};
  color:#ffffff;
  border-color:${bg};
}`;

    };


  window.applyButtonTheme =
    function(data){

      var bg =
        data &&
        data.primary &&
        data.primary.bg
        ? data.primary.bg
        : '#344f9f';

      var picker =
        document.getElementById('primaryBgPicker');

      if(picker){
        picker.value =
          bg;
      }

      setPrimaryBg(
        bg
      );

      updateCssPreview();

      var status =
        document.getElementById('themeStatus');

      if(status){
        status.textContent =
          '已從 Sheet 載入';
      }

    };


  window.loadButtonTheme =
    function(done){

      var status =
        document.getElementById('themeStatus');

      if(status){
        status.textContent =
          '讀取中...';
      }

      google.script.run
        .withSuccessHandler(function(data){

          applyButtonTheme(
            data
          );

          if(typeof done === 'function'){
            done();
          }

        })
        .withFailureHandler(function(err){

          if(status){
            status.textContent =
              '讀取失敗：' +
              (
                err &&
                err.message
                ? err.message
                : err
              );
          }

          if(typeof done === 'function'){
            done();
          }

        })
        .getButtonCssSettings();

    };


  window.applyPrimaryBg =
    function(){

      var value =
        getPrimaryBg();

      setPrimaryBg(
        value
      );

      updateCssPreview();

      var status =
        document.getElementById('themeStatus');

      if(status){
        status.textContent =
          '已套用，尚未儲存';
      }

    };


  window.savePrimaryBg =
    function(){

      var value =
        getPrimaryBg();

      setPrimaryBg(
        value
      );

      updateCssPreview();

      var status =
        document.getElementById('themeStatus');

      if(status){
        status.textContent =
          '儲存中...';
      }

      google.script.run
        .withSuccessHandler(function(){

          if(status){
            status.textContent =
              '已儲存到 Sheet';
          }

        })
        .withFailureHandler(function(err){

          if(status){
            status.textContent =
              '儲存失敗：' +
              (
                err &&
                err.message
                ? err.message
                : err
              );
          }

        })
        .saveButtonCssSetting(
          'primary',
          'bg',
          value
        );

    };


  var picker =
    document.getElementById('primaryBgPicker');

  if(picker){
    picker.addEventListener(
      'input',
      function(){
        applyPrimaryBg();
      }
    );
  }

})();
</script>
