<section class="testSection">

  <h2>01 UiButton Theme Editor</h2>

  <p class="testNote">
    第一階段只測試 Primary。
    修改後可立即套用到畫面，確認沒問題再儲存到 Sheet。
  </p>

  <div class="testCard">

    <h3>演示</h3>

    <div class="testRow">

      <button class="skh-btn skh-btn-primary">
        儲存
      </button>

      <button class="skh-btn skh-btn-primary skh-btn-lg">
        送出簽到
      </button>

      <button class="skh-btn skh-btn-primary skh-btn-loading">
        儲存中
      </button>

    </div>

  </div>

  <div class="testCard">

    <h3>目前設定</h3>

    <label>
      Primary 背景色
    </label>

    <input
      id="primaryBgPicker"
      type="color"
      style="
        width:120px;
        height:50px;
        margin-top:8px;
      "
    >

    <div style="margin-top:16px">

      <button
        class="skh-btn skh-btn-secondary"
        onclick="applyPrimaryBg()"
      >
        套用
      </button>

      <button
        class="skh-btn skh-btn-primary"
        onclick="savePrimaryBg()"
      >
        儲存到 Sheet
      </button>

      <button
        class="skh-btn skh-btn-ghost"
        onclick="loadButtonTheme()"
      >
        從 Sheet 重讀
      </button>

    </div>

  </div>

  <div class="testCard">

    <h3>目前 CSS</h3>

    <textarea
      id="cssPreview"
      readonly
      style="
        width:100%;
        min-height:120px;
        padding:12px;
        border:1px solid #dbe4ef;
        border-radius:10px;
        font-family:monospace;
        resize:vertical;
      "
    ></textarea>

  </div>

  <div
    id="themeStatus"
    style="
      margin-top:16px;
      color:#64748b;
      font-weight:600;
    "
  ></div>

</section>

<script>

function updateCssPreview(){

  const bg =
    document.getElementById(
      'primaryBgPicker'
    ).value;

  document.getElementById(
    'cssPreview'
  ).value =
`.skh-btn-primary{
  background:${bg};
  color:#ffffff;
  border-color:${bg};
}`;

}

function applyButtonTheme(data){

  if(
    data &&
    data.primary &&
    data.primary.bg
  ){

    document.documentElement.style.setProperty(
      '--skh-btn-primary-bg',
      data.primary.bg
    );

    document.getElementById(
      'primaryBgPicker'
    ).value =
      data.primary.bg;

    updateCssPreview();

  }

  document.getElementById(
    'themeStatus'
  ).textContent =
    '已從 Sheet 載入';

}

function loadButtonTheme(done){

  document.getElementById(
    'themeStatus'
  ).textContent =
    '讀取中...';

  google.script.run
    .withSuccessHandler(function(data){

      applyButtonTheme(data);

      if(typeof done === 'function'){
        done();
      }

    })
    .withFailureHandler(function(err){

      document.getElementById(
        'themeStatus'
      ).textContent =
        '讀取失敗：' +
        err.message;

      if(typeof done === 'function'){
        done();
      }

    })
    .getButtonCssSettings();

}

function applyPrimaryBg(){

  const value =
    document.getElementById(
      'primaryBgPicker'
    ).value;

  document.documentElement.style.setProperty(
    '--skh-btn-primary-bg',
    value
  );

  updateCssPreview();

  document.getElementById(
    'themeStatus'
  ).textContent =
    '已套用，尚未儲存';

}

function savePrimaryBg(){

  const value =
    document.getElementById(
      'primaryBgPicker'
    ).value;

  document.getElementById(
    'themeStatus'
  ).textContent =
    '儲存中...';

  google.script.run
    .withSuccessHandler(
      function(){

        document.getElementById(
          'themeStatus'
        ).textContent =
          '已儲存到 Sheet';

      }
    )
    .withFailureHandler(
      function(err){

        document.getElementById(
          'themeStatus'
        ).textContent =
          '儲存失敗：' +
          err.message;

      }
    )
    .saveButtonCssSetting(
      'primary',
      'bg',
      value
    );

}

document
  .getElementById(
    'primaryBgPicker'
  )
  ?.addEventListener(
    'input',
    updateCssPreview
  );

window.loadButtonTheme =
  loadButtonTheme;

</script>
