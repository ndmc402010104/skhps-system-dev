<script>
/* =====================================
   SKH Design System v1
   00_基礎 / UiThemeLoader
   Debug version：載入 UI Sheet 設定並發出 timing event
===================================== */

(function(){

  if(window.__SKH_UI_THEME_LOADER_LOADED__){
    return;
  }

  window.__SKH_UI_THEME_LOADER_LOADED__ = true;
  window.__SKH_UI_THEME_DEBUG__ = window.__SKH_UI_THEME_DEBUG__ || {
    runs:[]
  };

  function now(){
    return Math.round(performance.now());
  }

  function kebab(value){
    return String(value)
      .replace(/[A-Z]/g,function(match){
        return '-' + match.toLowerCase();
      });
  }

  function setRootVar(name,value){
    document.documentElement.style.setProperty(name,value);
  }

  function dispatchThemeEvent(name,detail){
    try{
      window.dispatchEvent(
        new CustomEvent(name,{detail:detail || {}})
      );
    }
    catch(err){}
  }

  function applyBaseTheme(data){
    if(!data){
      return;
    }

    var map = {
      brand:{
        primary:'--skh-primary',
        primarySoft:'--skh-primary-soft',
        danger:'--skh-danger',
        success:'--skh-success',
        warning:'--skh-warning'
      },
      page:{
        bg:'--skh-page-bg',
        text:'--skh-page-text',
        muted:'--skh-page-muted'
      },
      surface:{
        bg:'--skh-surface-bg',
        border:'--skh-surface-border',
        shadow:'--skh-surface-shadow'
      },
      radius:{
        base:'--skh-radius',
        sm:'--skh-radius-sm',
        lg:'--skh-radius-lg',
        pill:'--skh-radius-pill'
      },
      space:{
        xs:'--skh-space-xs',
        sm:'--skh-space-sm',
        md:'--skh-space-md',
        lg:'--skh-space-lg',
        xl:'--skh-space-xl'
      },
      font:{
        family:'--skh-font-family',
        size:'--skh-font-size',
        sizeSm:'--skh-font-size-sm',
        sizeLg:'--skh-font-size-lg',
        weight:'--skh-font-weight',
        weightBold:'--skh-font-weight-bold',
        lineHeight:'--skh-line-height'
      },
      motion:{
        duration:'--skh-transition-duration',
        easing:'--skh-transition-easing'
      },
      layout:{
        containerMaxWidth:'--skh-container-max-width',
        containerPadding:'--skh-container-padding',
        sectionGap:'--skh-section-gap'
      }
    };

    Object.keys(data).forEach(function(className){
      Object.keys(data[className] || {}).forEach(function(property){
        if(map[className] && map[className][property]){
          setRootVar(map[className][property], data[className][property]);
        }
        else{
          setRootVar('--skh-' + className + '-' + kebab(property), data[className][property]);
        }
      });
    });

    if(data.motion && data.motion.duration && data.motion.easing){
      setRootVar('--skh-transition', data.motion.duration + ' ' + data.motion.easing);
    }
  }

  function applyButtonTheme(data){
    if(!data){
      return;
    }

    Object.keys(data).forEach(function(className){
      Object.keys(data[className] || {}).forEach(function(property){
        setRootVar('--skh-btn-' + className + '-' + kebab(property), data[className][property]);
      });
    });
  }

  function applyUiThemePayload(payload){
    if(!payload){
      return;
    }

    if(payload.base){
      applyBaseTheme(payload.base);
    }

    if(payload.button){
      applyButtonTheme(payload.button);
    }
  }

  function runGoogleFunction(functionName,onSuccess,onFailure){
    if(
      typeof google === 'undefined' ||
      !google.script ||
      !google.script.run ||
      typeof google.script.run[functionName] !== 'function'
    ){
      if(typeof onFailure === 'function'){
        onFailure(new Error(functionName + ' not found'));
      }
      return;
    }

    google.script.run
      .withSuccessHandler(function(result){
        if(typeof onSuccess === 'function'){
          onSuccess(result);
        }
      })
      .withFailureHandler(function(error){
        if(typeof onFailure === 'function'){
          onFailure(error);
        }
      })[functionName]();
  }

  function summarizePayload(payload){
    var summary = {};

    if(payload && payload.base){
      summary.baseGroups = Object.keys(payload.base || {});
    }

    if(payload && payload.button){
      summary.buttonGroups = Object.keys(payload.button || {});
    }

    if(payload && payload.base && payload.base.brand){
      summary.brand = payload.base.brand;
    }

    return summary;
  }

  function makeRun(done){
    return {
      runId:'theme-' + Date.now() + '-' + Math.floor(Math.random()*10000),
      startedAt:now(),
      ensureStartAt:null,
      ensureDoneAt:null,
      settingsStartAt:null,
      settingsDoneAt:null,
      legacyStartAt:null,
      legacyDoneAt:null,
      appliedAt:null,
      finishedAt:null,
      source:null,
      error:null,
      payloadSummary:null,
      done:done
    };
  }

  function finishRun(run){
    if(run.finishedAt){
      return;
    }

    run.finishedAt = now();

    window.__SKH_UI_THEME_DEBUG__.runs.push(run);

    var detail = {
      runId:run.runId,
      source:run.source || 'unknown',
      error:run.error || '',
      timings:{
        totalMs:run.finishedAt - run.startedAt,
        ensureMs:(run.ensureDoneAt && run.ensureStartAt) ? run.ensureDoneAt - run.ensureStartAt : null,
        settingsMs:(run.settingsDoneAt && run.settingsStartAt) ? run.settingsDoneAt - run.settingsStartAt : null,
        legacyMs:(run.legacyDoneAt && run.legacyStartAt) ? run.legacyDoneAt - run.legacyStartAt : null,
        applyMs:(run.appliedAt ? run.appliedAt - run.startedAt : null)
      },
      payloadSummary:run.payloadSummary || null
    };

    dispatchThemeEvent('skh-ui-theme-loaded', detail);

    if(typeof run.done === 'function'){
      run.done(detail);
    }
  }

  function loadUiTheme(done){
    var run = makeRun(done);
    var timeoutId = null;

    function finish(){
      if(timeoutId){
        clearTimeout(timeoutId);
        timeoutId = null;
      }
      finishRun(run);
    }

    timeoutId = setTimeout(function(){
      if(run.finishedAt){
        return;
      }
      run.source = run.source || 'timeout-before-sheet-returned';
      run.error = run.error || 'loadUiTheme timeout 2500ms before Sheet payload completed';
      dispatchThemeEvent('skh-ui-theme-error', {
        runId:run.runId,
        source:run.source,
        error:run.error,
        timings:{totalMs:now() - run.startedAt}
      });
      finish();
    },2500);

    run.ensureStartAt = now();

    runGoogleFunction(
      'ensureUiThemeDatabase',
      function(){
        run.ensureDoneAt = now();
        run.settingsStartAt = now();

        runGoogleFunction(
          'getUiThemeSettings',
          function(payload){
            run.settingsDoneAt = now();
            run.source = 'getUiThemeSettings';
            run.payloadSummary = summarizePayload(payload);

            applyUiThemePayload(payload);
            run.appliedAt = now();

            dispatchThemeEvent('skh-ui-theme-sheet-applied', {
              runId:run.runId,
              source:run.source,
              timings:{
                totalMs:run.appliedAt - run.startedAt,
                ensureMs:run.ensureDoneAt - run.ensureStartAt,
                settingsMs:run.settingsDoneAt - run.settingsStartAt,
                applyMs:run.appliedAt - run.startedAt
              },
              payloadSummary:run.payloadSummary
            });

            finish();
          },
          function(error){
            run.settingsDoneAt = now();
            run.error = 'getUiThemeSettings failed: ' + (error && error.message ? error.message : error);
            run.legacyStartAt = now();
            run.source = 'legacy-after-getUiThemeSettings-failure';
            dispatchThemeEvent('skh-ui-theme-fallback-used', {
              runId:run.runId,
              source:run.source,
              error:run.error
            });

            loadLegacyTheme(function(){
              run.legacyDoneAt = now();
              run.appliedAt = now();
              finish();
            });
          }
        );
      },
      function(error){
        run.ensureDoneAt = now();
        run.error = 'ensureUiThemeDatabase failed: ' + (error && error.message ? error.message : error);
        run.legacyStartAt = now();
        run.source = 'legacy-after-ensureUiThemeDatabase-failure';
        dispatchThemeEvent('skh-ui-theme-fallback-used', {
          runId:run.runId,
          source:run.source,
          error:run.error
        });

        loadLegacyTheme(function(){
          run.legacyDoneAt = now();
          run.appliedAt = now();
          finish();
        });
      }
    );
  }

  function loadLegacyTheme(done){
    var pending = 0;
    var doneCalled = false;

    function oneDone(){
      pending -= 1;

      if(pending <= 0 && !doneCalled){
        doneCalled = true;
        if(typeof done === 'function'){
          done();
        }
      }
    }

    if(typeof google !== 'undefined' && google.script && google.script.run){
      if(typeof google.script.run.getBaseCssSettings === 'function'){
        pending += 1;
        runGoogleFunction(
          'getBaseCssSettings',
          function(data){
            applyBaseTheme(data);
            oneDone();
          },
          oneDone
        );
      }

      if(typeof google.script.run.getButtonCssSettings === 'function'){
        pending += 1;
        runGoogleFunction(
          'getButtonCssSettings',
          function(data){
            applyButtonTheme(data);
            oneDone();
          },
          oneDone
        );
      }
    }

    if(pending === 0){
      doneCalled = true;
      if(typeof done === 'function'){
        done();
      }
    }
  }

  window.loadUiTheme = loadUiTheme;
  window.applyUiThemePayload = applyUiThemePayload;
  window.applyBaseThemeFromSheet = applyBaseTheme;
  window.applyButtonThemeFromSheet = applyButtonTheme;

  function autoLoad(){
    loadUiTheme();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', autoLoad);
  }
  else{
    autoLoad();
  }

})();
</script>
