<script>
/* =====================================
   SKH Design System v1
   00_基礎 / UiThemeLoader
   頁面載入後自動讀取 UI Sheet 設定，覆蓋 CSS Variables
===================================== */

(function(){

  if(window.__SKH_UI_THEME_LOADER_LOADED__){
    return;
  }

  window.__SKH_UI_THEME_LOADER_LOADED__ =
    true;

  function kebab(value){
    return String(value)
      .replace(/[A-Z]/g,function(match){
        return '-' + match.toLowerCase();
      });
  }

  function setRootVar(name,value){
    document.documentElement.style.setProperty(
      name,
      value
    );
  }

  function applyBaseTheme(data){

    if(!data){
      return;
    }

    var map = {
      brand:{
        primary:'--skh-primary',
        primarySoft:'--skh-primary-soft',
        danger:'--skh-danger',
        success:'--skh-success',
        warning:'--skh-warning'
      },
      page:{
        bg:'--skh-page-bg',
        text:'--skh-page-text',
        muted:'--skh-page-muted'
      },
      surface:{
        bg:'--skh-surface-bg',
        border:'--skh-surface-border',
        shadow:'--skh-surface-shadow'
      },
      radius:{
        base:'--skh-radius',
        sm:'--skh-radius-sm',
        lg:'--skh-radius-lg',
        pill:'--skh-radius-pill'
      },
      space:{
        xs:'--skh-space-xs',
        sm:'--skh-space-sm',
        md:'--skh-space-md',
        lg:'--skh-space-lg',
        xl:'--skh-space-xl'
      },
      font:{
        family:'--skh-font-family',
        size:'--skh-font-size',
        sizeSm:'--skh-font-size-sm',
        sizeLg:'--skh-font-size-lg',
        weight:'--skh-font-weight',
        weightBold:'--skh-font-weight-bold',
        lineHeight:'--skh-line-height'
      },
      motion:{
        duration:'--skh-transition-duration',
        easing:'--skh-transition-easing'
      },
      layout:{
        containerMaxWidth:'--skh-container-max-width',
        containerPadding:'--skh-container-padding',
        sectionGap:'--skh-section-gap'
      }
    };

    Object.keys(data).forEach(function(className){

      Object.keys(data[className] || {}).forEach(function(property){

        if(
          map[className] &&
          map[className][property]
        ){

          setRootVar(
            map[className][property],
            data[className][property]
          );

        }
        else{

          setRootVar(
            '--skh-' + className + '-' + kebab(property),
            data[className][property]
          );

        }

      });

    });

    if(
      data.motion &&
      data.motion.duration &&
      data.motion.easing
    ){

      setRootVar(
        '--skh-transition',
        data.motion.duration + ' ' + data.motion.easing
      );

    }

  }

  function applyButtonTheme(data){

    if(!data){
      return;
    }

    Object.keys(data).forEach(function(className){

      Object.keys(data[className] || {}).forEach(function(property){

        setRootVar(
          '--skh-btn-' + className + '-' + kebab(property),
          data[className][property]
        );

      });

    });

  }

  function applyUiThemePayload(payload){

    if(!payload){
      return;
    }

    if(payload.base){
      applyBaseTheme(
        payload.base
      );
    }

    if(payload.button){
      applyButtonTheme(
        payload.button
      );
    }

  }

  function runGoogleFunction(functionName,onSuccess,onFailure){

    if(
      typeof google === 'undefined' ||
      !google.script ||
      !google.script.run ||
      typeof google.script.run[functionName] !== 'function'
    ){

      if(typeof onFailure === 'function'){
        onFailure(
          new Error(functionName + ' not found')
        );
      }

      return;

    }

    google.script.run
      .withSuccessHandler(function(result){

        if(typeof onSuccess === 'function'){
          onSuccess(result);
        }

      })
      .withFailureHandler(function(error){

        if(typeof onFailure === 'function'){
          onFailure(error);
        }

      })[functionName]();

  }

  function loadUiTheme(done){

    var finished =
      false;

    function finish(){

      if(finished){
        return;
      }

      finished =
        true;

      if(typeof done === 'function'){
        done();
      }

      window.dispatchEvent(
        new CustomEvent(
          'skh-ui-theme-loaded'
        )
      );

    }

    runGoogleFunction(
      'ensureUiThemeDatabase',
      function(){

        runGoogleFunction(
          'getUiThemeSettings',
          function(payload){

            applyUiThemePayload(
              payload
            );

            finish();

          },
          function(){

            loadLegacyTheme(
              finish
            );

          }
        );

      },
      function(){

        loadLegacyTheme(
          finish
        );

      }
    );

    setTimeout(function(){

      finish();

    },2500);

  }

  function loadLegacyTheme(done){

    var pending = 0;
    var doneCalled = false;

    function oneDone(){

      pending -= 1;

      if(pending <= 0 && !doneCalled){
        doneCalled = true;

        if(typeof done === 'function'){
          done();
        }
      }

    }

    if(
      typeof google !== 'undefined' &&
      google.script &&
      google.script.run
    ){

      if(typeof google.script.run.getBaseCssSettings === 'function'){
        pending += 1;

        runGoogleFunction(
          'getBaseCssSettings',
          function(data){
            applyBaseTheme(data);
            oneDone();
          },
          oneDone
        );
      }

      if(typeof google.script.run.getButtonCssSettings === 'function'){
        pending += 1;

        runGoogleFunction(
          'getButtonCssSettings',
          function(data){
            applyButtonTheme(data);
            oneDone();
          },
          oneDone
        );
      }

    }

    if(pending === 0){
      doneCalled = true;

      if(typeof done === 'function'){
        done();
      }
    }

  }

  window.loadUiTheme =
    loadUiTheme;

  window.applyUiThemePayload =
    applyUiThemePayload;

  window.applyBaseThemeFromSheet =
    applyBaseTheme;

  window.applyButtonThemeFromSheet =
    applyButtonTheme;

  function autoLoad(){

    loadUiTheme();

  }

  if(document.readyState === 'loading'){

    document.addEventListener(
      'DOMContentLoaded',
      autoLoad
    );

  }
  else{

    autoLoad();

  }

})();
</script>
