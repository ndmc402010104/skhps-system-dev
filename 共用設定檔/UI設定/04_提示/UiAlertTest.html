<section class="testSection">
  <h2>04 UiAlert / 提示</h2>
  <p class="testNote">第一列為最原始提示框，後面才是狀態顏色。</p>

  <table class="testTable">
    <tbody>
      <tr>
        <td>最原始提示框，一般訊息 / 查詢中</td>
        <td><code>.skh-alert</code></td>
        <td><div class="skh-alert">查詢中...</div></td>
      </tr>
      <tr>
        <td>成功提示，儲存成功、建檔成功</td>
        <td><code>.skh-alert</code><br><code>.skh-alert-success</code></td>
        <td><div class="skh-alert skh-alert-success">儲存成功</div></td>
      </tr>
      <tr>
        <td>警告提示，尚未儲存、資料可能重複</td>
        <td><code>.skh-alert</code><br><code>.skh-alert-warning</code></td>
        <td><div class="skh-alert skh-alert-warning">尚有未儲存資料</div></td>
      </tr>
      <tr>
        <td>錯誤提示，儲存失敗、查詢失敗</td>
        <td><code>.skh-alert</code><br><code>.skh-alert-error</code></td>
        <td><div class="skh-alert skh-alert-error">儲存失敗</div></td>
      </tr>
    </tbody>
  </table>
</section>
