<script>
const APP_ENTRY_URL =
  '<?= appEntryUrl ?>';

const APP_DEV_URL =
  '<?= appDevUrl ?>';

const APP_PROD_URL =
  '<?= appProdUrl ?>';

const APP_ENV =
  '<?= appEnv ?>';

const GITHUB_PAGE_MAP = {
  home:'科室系統用戶端/FrontIndex.html',
  frontIndex:'科室系統用戶端/FrontIndex.html',
  hisConnect:'HisConnect/HisConnectPage.html'
};

function isGithubPage(){
  return window.location.hostname.includes('github.io') ||
    window.location.hostname === 'dev-skhps.jonaminz.com' ||
    window.location.hostname === 'skhps.jonaminz.com';
}

function isAppsScriptPage(){
  return !isGithubPage() &&
    typeof google !== 'undefined' &&
    google.script &&
    google.script.run;
}

function getGithubRepoBasePath(){
  if(!window.location.hostname.includes('github.io')){
    return '/';
  }

  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts.length ? '/' + parts[0] + '/' : '/';
}

function getGithubPageUrl(pageKey){
  const path = GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;
  return window.location.origin + getGithubRepoBasePath() + path;
}

function getCurrentAppEnv(){
  if(window.location.hostname === 'dev-skhps.jonaminz.com'){
    return 'dev';
  }

  if(window.location.hostname === 'skhps.jonaminz.com' || window.location.hostname.includes('github.io')){
    return 'prod';
  }

  if(APP_ENV === 'dev' || APP_ENV === 'prod'){
    return APP_ENV;
  }

  return 'prod';
}

function getAppEntryUrl(){
  const env = getCurrentAppEnv();

  if(isGithubPage() && window.SKH_ENVIRONMENTS){
    const runtimeKey =
      env === 'dev'
        ? 'webDev'
        : 'webProd';
    const runtimeEnv = window.SKH_ENVIRONMENTS[runtimeKey] || {};
    const apiUrl = String(runtimeEnv.apiUrl || '').trim();
    if(apiUrl){
      return apiUrl;
    }
  }

  const value = env === 'dev' ? APP_DEV_URL : (APP_PROD_URL || APP_ENTRY_URL);

  if(value && !String(value).includes('<' + '?=')){
    return value;
  }

  try{
    const currentUrl = new URL(window.location.href);
    currentUrl.search = '';
    currentUrl.hash = '';
    return currentUrl.toString();
  } catch(error){
    return window.location.href.split('?')[0].split('#')[0];
  }
}

function callAppsScriptJsonp(params){
  params = params || {};
  return new Promise(function(resolve, reject){
    const callbackName =
      '__hisBridgeCallback_' +
      Date.now() +
      '_' +
      Math.random().toString(36).slice(2);
    const query = new URLSearchParams();

    Object.keys(params).forEach(function(key){
      const value = params[key];
      if(value !== undefined && value !== null){
        query.set(key, typeof value === 'object' ? JSON.stringify(value) : value);
      }
    });

    query.set('callback', callbackName);

    const script = document.createElement('script');
    const timer = setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時，請確認 Apps Script 部署權限'));
    }, 20000);

    window[callbackName] = function(result){
      cleanup();
      resolve(result);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('API 載入失敗，請確認 Apps Script 部署網址'));
    };

    script.src = getAppEntryUrl() + '?' + query.toString();
    document.head.appendChild(script);

    function cleanup(){
      clearTimeout(timer);
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
      try{
        delete window[callbackName];
      } catch(error){
        window[callbackName] = undefined;
      }
    }
  });
}

function callBackend(action, payload){
  payload = payload || {};

  if(isAppsScriptPage()){
    return new Promise(function(resolve, reject){
      try{
        const runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject);

        if(!runner || typeof runner[action] !== 'function'){
          throw new Error('找不到 Apps Script 函式：' + action);
        }

        runner[action](payload);
      } catch(error){
        reject(error);
      }
    });
  }

  return callAppsScriptJsonp({
    action:action,
    payload:payload
  });
}

function goHome(){
  if(isGithubPage()){
    window.top.location.href = getGithubPageUrl('frontIndex');
    return;
  }

  const env = getCurrentAppEnv();
  const url = getAppEntryUrl();
  const separator = url.indexOf('?') >= 0 ? '&' : '?';
  window.top.location.href = url + separator + 'appEnv=' + encodeURIComponent(env);
}

function setStatus(message, type){
  const status = document.getElementById('hisStatus');
  if(!status){
    return;
  }
  status.textContent = message || '';
  status.className = 'status' + (type === 'error' ? ' error' : '');
}

function writePopupError(popup, message){
  if(!popup || popup.closed){
    return;
  }

  popup.document.open();
  popup.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>HIS Excel Bridge 測試</title>' +
    '<style>body{font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;padding:24px;color:#172033;background:#f8fafc;} .error{color:#b91c1c;font-weight:800;}</style>' +
    '</head><body><h1>HIS Excel Bridge 測試</h1><p class="error">' +
    escapeHtml(message || 'bridge 建立失敗') +
    '</p></body></html>'
  );
  popup.document.close();
}

function escapeHtml(value){
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function openHisExcelBridgeTest(){
  const button = document.getElementById('hisExcelButton');
  const popup = window.open('about:blank', '_blank');

  if(!popup){
    setStatus('瀏覽器封鎖彈出視窗，請允許後再試。', 'error');
    alert('瀏覽器封鎖彈出視窗，請允許後再試。');
    return;
  }

  const payload = {
    mode:'excel-export',
    sourcePage:'HisConnect',
    createdAt:new Date().toISOString(),
    debug:true,
    runtimeMode:getCurrentAppEnv(),
    appVersion:window.SKH_RUNTIME && window.SKH_RUNTIME.version ? window.SKH_RUNTIME.version : ''
  };

  if(button){
    button.disabled = true;
    button.textContent = '建立中...';
  }
  setStatus('正在建立 HIS Excel Bridge...');

  popup.document.open();
  popup.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>HIS Excel Bridge 測試</title></head><body><p>正在準備 HIS Excel 提取...</p></body></html>');
  popup.document.close();

  try{
    const res = await callBackend('buildHisBridge', payload);

    if(res && res.ok && res.mode === 'html'){
      popup.document.open();
      popup.document.write(res.html || '');
      popup.document.close();
      setStatus(res.message || 'HIS Excel Bridge 已建立');
      return;
    }

    if(res && res.ok && res.mode === 'url' && res.url){
      popup.location.href = res.url;
      setStatus(res.message || 'HIS Excel Bridge 已建立');
      return;
    }

    const message = (res && res.message) || '尚未設定 HIS Excel Bridge 後端參數，請先補 Apps Script Script Properties。若已設定但送出後顯示找不到網頁，請確認已連線 AnyConnect/VPN。';
    writePopupError(popup, message);
    setStatus(message, 'error');
    alert(message);
  } catch(error){
    const message = error && error.message ? error.message : String(error);
    writePopupError(popup, message);
    setStatus(message, 'error');
    alert(message);
  } finally {
    if(button){
      button.disabled = false;
      button.textContent = '測試 HIS Excel';
    }
  }
}
</script>
