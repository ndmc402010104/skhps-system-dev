function runGoogleScript(methodName,args){

function jsonpDressingUseApi(params){

      Date.now() +
      '_' +
      Math.random().toString(36).slice(2);
    const query = new URLSearchParams();

    Object.keys(params).forEach(function(key){
      const value = params[key];
      if(value !== undefined && value !== null){
        query.set(key, typeof value === 'object' ? JSON.stringify(value) : value);
      }
    });

    query.set('callback', callbackName);

    const script = document.createElement('script');
    const timer = setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時，請檢查部署網址或 Sheet 權限'));
    }, 20000);

    window[callbackName] = function(result){
      cleanup();
      if(!result || typeof result !== 'object'){
        reject(new Error('API 回傳格式錯誤'));
        return;
      }
      resolve(result);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('API 載入失敗，請檢查部署網址或 Apps Script 權限'));
    };

    script.src = APP_ENTRY_URL + '?' + query.toString();
    document.head.appendChild(script);

    function cleanup(){
      clearTimeout(timer);
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
      try{
        delete window[callbackName];
      }catch(error){
        window[callbackName] = undefined;
      }
    }
  });
}

function findMasterByCodeOrGtin(raw){ const parsed=parseGs1Barcode(raw), gtin=parsed.gtin||normalizeDigits(raw), text=normalizeText(raw); if(gtin){ const f=dressingMasterCache.find(item=>sameGtin(item.singleGtin||item.gtin||'',gtin)||sameGtin(item.boxGtin||'',gtin)); if(f)return {item:f,parsed}; } return {item:dressingMasterCache.find(item=>normalizeText(item.hospitalCode)===text)||null,parsed}; }

function handleRowSearchInput(rowId){

  const suggest=tr.querySelector('.suggestBox');
  const value=normalizeText(input.value);
  const stockUnit=normalizeText(document.getElementById('stockUnit').value);

  if(!stockUnit){

    suggest.style.display='none';
    suggest.innerHTML='';
    return;
  }

  if(matches.length===0){

function findExistingUseRowByLot(hospitalCode, lot, exp, excludeRowId){

  lot=normalizeText(lot);
  exp=normalizeText(exp);

  const found=Array.from(document.querySelectorAll('#useTbody [data-row-id]')).find(function(row){
    if(excludeRowId && row.dataset.rowId===excludeRowId)return false;
    return normalizeText(row.dataset.hospitalCode)===hospitalCode &&
      normalizeText(row.dataset.lot)===lot &&
      normalizeText(row.dataset.exp)===exp;
  });
  return found ? found.dataset.rowId : null;

function selectByRawCode(rowId,raw){

function renderLotOptionsForRow(rowId,parsed){ const tr=getRow(rowId); if(!tr)return; parsed=parsed||{}; const lotSelect=tr.querySelector('.rowLotSelect'), stockUnit=normalizeText(document.getElementById('stockUnit').value), code=normalizeText(tr.dataset.hospitalCode); if(!code){ lotSelect.innerHTML='<option value="">請先選擇敷料</option>'; lotSelect.disabled=true; applyLotSelection(rowId); return; } if(!stockUnit){ lotSelect.innerHTML='<option value="">請先選擇領用單位</option>'; lotSelect.disabled=true; applyLotSelection(rowId); return; } const lots=getAvailableLots(code,stockUnit); if(lots.length===0){ lotSelect.innerHTML='<option value="">此敷料在本領用單位沒有可領用庫存</option>'; lotSelect.disabled=true; applyLotSelection(rowId); return; } let preferred=0; if(parsed&&(parsed.lot||parsed.exp)){ const idx=lots.findIndex(l=>{ const lotMatch=!parsed.lot||normalizeText(l.lot)===normalizeText(parsed.lot); const expMatch=!parsed.exp||normalizeText(l.exp)===normalizeText(parsed.exp); return lotMatch&&expMatch; }); if(idx>=0)preferred=idx; } lotSelect.disabled=false; lotSelect.innerHTML=lots.map((lot,i)=>{ const label=['批號 '+(lot.lot||'未填'),lot.exp?'效期 '+lot.exp:'效期未填','可領 '+formatQty(lot.quantity)].join('｜'); const value=encodeURIComponent(JSON.stringify({lot:lot.lot||'',exp:lot.exp||'',quantity:toNumber(lot.quantity)})); return '<option value="'+value+'"'+(i===preferred?' selected':'')+'>'+escapeHtml(label)+'</option>'; }).join(''); applyLotSelection(rowId); }
function applyLotSelection(rowId){

function getHisStatusPhrase(status){

function buildPrimaryItemSummary(validRows){
  if(!validRows.length){
    return '_敷料名稱+敷料規格+數量_';
  }

  if(validRows.length === 1){
    const row = validRows[0];
    return getSummaryItemName(row) + '｜' + (row.useCategory || '健保') + '｜領用 ' + formatQty(row.quantity) + '單位';
  }

  const totalQty = validRows.reduce(function(sum, row){ return sum + row.quantity; }, 0);
  return validRows.length + '種敷料，共 ' + formatQty(totalQty) + '單位';

function buildSummarySentence(validRows, patientId, operator, useUnit, attending, his, note){
  const itemText = buildPrimaryItemSummary(validRows);
  const operatorText = operator || '_領用人_';
  const useUnitText = useUnit || '_扣庫單位_';
  const attendingText = attending || '_主治醫師_';
  const patientText = patientId || '_病歷號_';
  const noteText = note ? '。備註：' + note : '';

  const sentence =
    operatorText +
    '從' +
    useUnitText +
    '領用' +
    itemText +
    '給' +
    attendingText +
    '的' +
    patientText +
    '，' +
    getHisStatusPhrase(his) +
    noteText +
    '。';

  const isReady = operator && useUnit && patientId && attending && validRows.length > 0;
  if(!isReady){
    return '<span class="placeholder">' + escapeHtml(sentence) + '</span>';
  }

  return escapeHtml(sentence)
    .replace(escapeHtml(operatorText), '<span class="strong">' + escapeHtml(operatorText) + '</span>')
    .replace(escapeHtml(useUnitText), '<span class="strong">' + escapeHtml(useUnitText) + '</span>')
    .replace(escapeHtml(itemText), '<span class="strong">' + escapeHtml(itemText) + '</span>')
    .replace(escapeHtml(attendingText), '<span class="strong">' + escapeHtml(attendingText) + '</span>')
    .replace(escapeHtml(patientText), '<span class="strong">' + escapeHtml(patientText) + '</span>');
}
function updateSummary(){

  const note = valid.map(r => r.note).filter(Boolean).join('；');
  const itemList = document.getElementById('summaryItemList');

    buildSummarySentence(valid, patientId, operator, useUnit, attending, his, note);

    if(valid.length === 0){
      itemList.innerHTML = '<div class="summaryItemMuted">尚未新增敷料</div>';
    } else {
      itemList.innerHTML = valid.map(function(row, index){
        const name = getSummaryItemName(row);
        const stockAfter = formatQty(row.currentQty - row.quantity);
        return '<div class="useSummaryItem">' +

          '<div class="useSummaryItemMeta">目前可領用 ' + escapeHtml(formatQty(row.currentQty)) + ' 單位' +
          '｜送出後剩餘 ' + escapeHtml(stockAfter) + ' 單位' +

  renderControls();
}
function getUseFormErrors(){ const errors=[], rows=getUseRows(); if(!normalizeText(document.getElementById('patientId').value))errors.push('請輸入領用病歷號。'); if(!normalizeText(document.getElementById('useOperator').value))errors.push('請輸入領用人。'); if(!normalizeText(document.getElementById('useUnit').value))errors.push('請輸入領用單位。'); if(!normalizeText(document.getElementById('stockUnit').value))errors.push('請選擇領用單位。'); if(!normalizeText(document.getElementById('attendingDoctor').value))errors.push('請輸入領用主治醫師。'); if(rows.length===0)errors.push('請至少新增一筆敷料列。'); rows.forEach((row,i)=>{ const label='第 '+(i+1)+' 列'; if(!row.hospitalCode)errors.push(label+'：尚未選擇敷料。'); if(!row.lot&&!row.exp)errors.push(label+'：尚未選擇可領用批號。'); if(!row.quantityRaw)errors.push(label+'：請輸入領用數量。'); if(row.quantity<=0)errors.push(label+'：領用數量必須大於 0。'); if(row.quantity>row.currentQty)errors.push(label+'：庫存不足，目前最多可領 '+formatQty(row.currentQty)+'。'); }); return errors; }
function validateUseForm(){ const errors=getUseFormErrors(); if(errors.length){ openDialog({title:'資料尚未完成',message:errors.join('\n'),okText:'知道了',cancel:false}); return false; } showNotice('資料檢查通過，可以送出','success','檢查通過'); return true; }
function buildUsePayload(force){
  return {
    forceSubmit:!!force,
    useTime:normalizeText(document.getElementById('useTime').value),
    patientId:normalizeText(document.getElementById('patientId').value),
    hisStatus:normalizeText(document.getElementById('hisStatus').value),
    attendingDoctor:normalizeText(document.getElementById('attendingDoctor').value),
    operator:normalizeText(document.getElementById('useOperator').value),
    useUnit:normalizeText(document.getElementById('useUnit').value),
    stockUnit:normalizeText(document.getElementById('stockUnit').value),
    note:'',
    rows:getUseRows().filter(r=>r.hospitalCode).map(r=>({
      hospitalCode:r.hospitalCode,
      singleGtin:r.singleGtin,
      dressingName:r.dressingName,
      size:r.size,
      lot:r.lot,
      exp:r.exp,
      currentQty:r.currentQty,
      unitsPerBox:r.unitsPerBox,
      boxQuantity:r.boxQuantity,
      unitQuantity:r.unitQuantity,
      quantity:r.quantity,
      useCategory:r.useCategory || '健保',
      note:r.note
    }))
  };
}
async function submitUseForm(force){ if(!validateUseForm())return; if(!force){ const ok=await openDialog({title:'確認領用並扣庫',message:'送出後會扣除批號庫存，並寫入庫存交易紀錄與敷料領用紀錄。\n\n確定要送出嗎？',okText:'確認送出',cancelText:'回去檢查'}); if(!ok)return; } setBusy(true,'正在送出領用紀錄...'); try{ const res=await submitDressingUse(buildUsePayload(force)); if(res&&res.duplicateWarning&&!force){ setBusy(false); const ok=await openDialog({title:'可能重複領用',message:(res.message||'同一病歷號近期已有相同敷料領用紀錄。')+'\n\n是否仍要建立新的領用紀錄？',okText:'仍要送出',cancelText:'取消，回去檢查'}); if(ok)await submitUseForm(true); return; } if(!res||!res.ok)throw new Error((res&&res.message)||'領用送出失敗'); showNotice('領用成功：'+(res.useId||'已送出'),'success','送出完成'); await refreshInventoryAfterSubmit(); clearUseAfterSubmitAndContinue(); }catch(e){ showNotice(e.message||String(e),'error','送出失敗'); }finally{ setBusy(false); } }
async function refreshInventoryAfterSubmit(){ try{ const inv=await listDressingInventory(); if(inv&&inv.ok)inventoryCache=inv.data||[]; }catch(e){ console.warn('refresh inventory failed',e); } }
function clearUseRowsOnly(){ document.getElementById('useTbody').innerHTML='<div class="useRowsEmpty">尚未新增敷料列</div>'; rowSeq=0; updateSummary(); }
function clearUseAfterSubmitAndContinue(){
  document.getElementById('patientId').value = '';
  
  clearUseRowsOnly();
  if(dataReady){
    addUseRow();
  }
  updateSummary();
  setTimeout(function(){
    const patientInput = document.getElementById('patientId');
    if(patientInput) patientInput.focus();
  }, 80);
}
function clearUseForm(){
  ['patientId','useOperator','useUnit','stockUnit','attendingDoctor'].forEach(function(id){
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.querySelectorAll('[data-use-unit]').forEach(function(btn){ btn.classList.remove('active'); });
  const useTimeText = document.getElementById('useTimeText');
  const useTimeEditor = document.getElementById('useTimeEditor');
  const makeupBtn = document.getElementById('makeupUseBtn');
  if(useTimeText) useTimeText.style.display = 'flex';
  if(useTimeEditor) useTimeEditor.style.display = 'none';
  if(makeupBtn) makeupBtn.innerText = '補領用';
  setUseTimeValue(nowTaipeiInput());
  setHisStatus('未計價');
  clearUseRowsOnly();
  updateSummary();
  setTimeout(function(){
    const patientInput = document.getElementById('patientId');
    if(patientInput) patientInput.focus();
  }, 30);
}
function useTestSingleCode(){
  handleScannedCode(USE_TEST_CODES.single);
}
function useTestBoxCode(){
  handleScannedCode(USE_TEST_CODES.box);
}
function startUseScanner(){ if(!dataReady){ showNotice('請先讀取資料','warning','尚未讀取'); return; } if(getUseRows().length===0)addUseRow(); const last=Array.from(document.querySelectorAll('#useTbody [data-row-id]')).pop(); activeScanRowId=last?last.dataset.rowId:''; document.getElementById('scannerOverlay').style.display='block'; if(scanner){try{scanner.clear();}catch(e){} scanner=null;} scanner=new Html5Qrcode('scannerReader'); scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:260}},decoded=>handleScannedCode(decoded),()=>{}).catch(e=>{ showNotice(e.message||String(e),'error','相機開啟失敗'); closeUseScanner(); }); }
async function closeUseScanner(){ document.getElementById('scannerOverlay').style.display='none'; if(scanner){ try{await scanner.stop();}catch(e){} try{await scanner.clear();}catch(e){} scanner=null; } }
async function handleScannedCode(decoded){ await closeUseScanner(); if(!dataReady){ showNotice('請先讀取資料','warning','尚未讀取'); return; } let rowId=activeScanRowId, tr=getRow(rowId); if(!tr||tr.dataset.hospitalCode){ addUseRow({raw:decoded}); return; } tr.querySelector('.rowSearchInput').value=decoded; selectByRawCode(rowId,decoded); }
document.addEventListener('DOMContentLoaded', function(){
  setupStaffDatalists();

  const useTimeInput = document.getElementById('useTime');
  if(useTimeInput){
    setUseTimeValue(nowTaipeiInput());
  }

  ['patientId','useOperator','attendingDoctor'].forEach(function(id){
    const el = document.getElementById(id);
    if(el){
      el.addEventListener('input', updateSummary);
    }
  });

  setInterval(function(){
    const el = document.getElementById('useTime');
    if(el && !isMakeupUseTimeOpen()){
      setUseTimeValue(nowTaipeiInput());
    }
  }, 10000);

  renderControls();
  updateSummary();
  initializeUsePage();
});
</script>
</body>
</html>
