<script>

const APP_ENTRY_URL =
'<?= appEntryUrl ?>';

const DRESSING_BARCODE_API =
'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';

function goHome(){

window.top.location.href =
APP_ENTRY_URL;

}

</script>

<body>

<main class="shell">

<header class="appHeader">

<div class="brand" onclick="goHome()">
<div class="brandMark">S</div>
<div class="brandText">
<span class="brandName">新光整形外科科室系統</span>
<span class="brandSub">敷料領用登錄</span>
</div>
</div>

</header>

<nav class="pageMap" aria-label="頁面地圖">
<button class="pageMapLink" onclick="goHome()">首頁</button>
<span class="pageMapSep">/</span>
<span class="pageMapCurrent">敷料領用登錄</span>
</nav>

<section class="pageHero">
<p class="eyebrow">敷料作業</p>
<h1>敷料領用登錄</h1>
<p class="pageLead">登錄病人敷料領用資料，包含品項、數量與相關醫師資訊。</p>
</section>

<div class="card">

<button
class="primary"
onclick="startUse()">

開始領用

</button>

<button
type="button"
class="primary"
onclick="openBarcodeLookup()"
style="margin-left:10px;">

敷料查詢 📷

</button>

<div
id="barcodeLookupResult"
style="margin-top:14px;color:#475569;font-size:15px;">

尚未查詢敷料

</div>

<div
style="
display:flex;
gap:8px;
margin-top:10px;
align-items:center;
">

<input
id="barcodeManualInput"
placeholder="輸入條碼測試"
style="
flex:1;
padding:10px;
border:1px solid #cbd5e1;
border-radius:8px;
">

<button
type="button"
onclick="manualBarcodeLookup()">

查詢

</button>

</div>

<div id="formArea">

<div class="infoRow">
<label>領用日期與時間：</label>
<input id="useDateTime" readonly>
</div>

<div class="infoRow">
<label>領用人：</label>
<input id="userName">
</div>

<div class="infoRow">
<label>領用單位：</label>
<input id="unitName">
</div>

<div id="patientArea"></div>

<div class="actions">

<button type="button" onclick="addPatientBlock()">
下一個病人
</button>

<button
type="button"
class="primary"
onclick="submitUse()">

送出

</button>

</div>

</div>

</div>

<div id="scannerOverlay" class="scannerOverlay">

<div class="scannerBox">

<h3 class="scannerTitle">掃描 QR code / 條碼</h3>

<p class="scannerHint">
請將 QR code 或傳統條碼對準畫面。掃描成功後會自動填入敷料名稱。
</p>

<div id="scannerReader"></div>

<div class="scannerActions">
<button type="button" onclick="closeDressingScanner()">關閉</button>
</div>

</div>

</div>

<script>
    let patientCount = 0;
    let dressingScanner = null;
    let activeDressingInput = null;
    let scannerMode = '';

    function isAppsScriptMode(){

    return typeof google !== 'undefined'
    && google.script
    && google.script.run;

    }

    function openBarcodeLookup(){

    scannerMode = 'lookup';
    activeDressingInput = null;

    document.getElementById('barcodeLookupResult').innerText =
    '正在開啟相機掃描敷料條碼...';

    document.getElementById('scannerOverlay').style.display = 'block';

    startDressingScanner();

    }

    function startUse(){

    document.getElementById('formArea').style.display = 'block';

    document.getElementById('useDateTime').value =
    new Date().toLocaleString('zh-TW');

    if(patientCount === 0){
    addPatientBlock();
    }

    }

    function addPatientBlock(){

    patientCount++;

    const block = document.createElement('div');
    block.className = 'patientBlock';

    block.innerHTML = `
    <div class="patientTitle">病人 ${patientCount}</div>

    <div class="infoRow">
    <label>病歷號：</label>
    <input class="patientId">
    </div>

    <table>
    <thead>
    <tr>
    <th>操作</th>
    <th>計價狀態</th>
    <th>敷料名稱</th>
    <th>數量</th>
    <th>支付類別</th>
    <th>主治醫師</th>
    </tr>
    </thead>

    <tbody class="dressingRows">
    ${createRow()}
    </tbody>
    </table>

    <div class="actions">
    <button type="button" onclick="addRow(this)">新增一列</button>
    <button type="button" class="danger deletePatient">刪除病人</button>
    </div>
    `;

    document.getElementById('patientArea').appendChild(block);

    refreshPatientTitle();

    }

    function createRow(){

    const id = Date.now() + '_' + Math.random();

    return `
    <tr>

    <td>
    <button type="button" class="danger deleteRow">刪除</button>
    </td>

    <td>
    <div class="radioGroup">
    <label>
    <input type="radio" name="charge_${id}" value="已計價">
    已計價
    </label>
    <label>
    <input type="radio" name="charge_${id}" checked value="未計價">
    未計價
    </label>
    </div>
    </td>

    <td>
    <div class="dressingInputGroup">
    <input class="dressingName">
    <button type="button" class="cameraBtn" onclick="openDressingScanner(this)">📷</button>
    </div>
    </td>

    <td>
    <input class="quantity" type="number" value="1" min="1">
    </td>

    <td>
    <div class="radioGroup">
    <label>
    <input type="radio" name="pay_${id}" value="健保">
    健保
    </label>
    <label>
    <input type="radio" name="pay_${id}" checked value="自費">
    自費
    </label>
    </div>
    </td>

    <td>
    <input class="doctorName">
    </td>

    </tr>
    `;

    }

    function addRow(button){

    button
    .closest('.patientBlock')
    .querySelector('.dressingRows')
    .insertAdjacentHTML('beforeend', createRow());

    }

    function openDressingScanner(button){

    scannerMode = 'row';

    activeDressingInput =
    button.closest('td').querySelector('.dressingName');

    document.getElementById('scannerOverlay').style.display = 'block';

    startDressingScanner();

    }

    function startDressingScanner(){

    if(dressingScanner){
    return;
    }

    dressingScanner =
    new Html5Qrcode('scannerReader');

    const config = {
    fps: 10,
    qrbox: {
    width: 260,
    height: 180
    },
    formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E
    ]
    };

    dressingScanner
    .start(
    {
    facingMode: {
    exact: 'environment'
    }
    },
    config,
    function(decodedText){

    handleBarcodeScanResult(decodedText);
    closeDressingScanner();

    },
    function(errorMessage){}
    )
    .catch(function(err){

    console.log(err);

    alert(
    '無法開啟相機，請確認手機瀏覽器已允許相機權限'
    );

    });

    }

    function closeDressingScanner(){

    document.getElementById('scannerOverlay').style.display = 'none';

    if(dressingScanner){

    dressingScanner
    .stop()
    .then(function(){

    dressingScanner.clear();
    dressingScanner = null;

    })
    .catch(function(err){

    console.log(err);
    dressingScanner = null;

    });

    }

    }

    async function manualBarcodeLookup(){

    const barcode =
    document
    .getElementById('barcodeManualInput')
    .value
    .trim();

    if(!barcode){

    alert('請輸入條碼');
    return;

    }

    scannerMode = 'lookup';

    await handleBarcodeScanResult(barcode);

    }

    async function handleBarcodeScanResult(barcode){

    if(scannerMode === 'row'){

    if(activeDressingInput){
    activeDressingInput.value = barcode;
    }

    return;

    }

    if(scannerMode !== 'lookup'){
    return;
    }

    document.getElementById('barcodeLookupResult').innerText =
    '查詢中：' + barcode;

    try{

    const result =
    await lookupBarcode(barcode);

    if(result.found){

    document.getElementById('barcodeLookupResult').innerText =
    '已建檔：' + result.data.dressingName + '（' + barcode + '）';

    return;

    }

    const name =
    prompt(
    '新敷料，請輸入名稱',
    barcode
    );

    if(!name){

    document.getElementById('barcodeLookupResult').innerText =
    '未建立：' + barcode;

    return;

    }

    const saveResult =
    await saveBarcode({
    barcode: barcode,
    dressingName: name,
    active: true
    });

    if(!saveResult.ok){

    document.getElementById('barcodeLookupResult').innerText =
    '建立失敗：' + (saveResult.message || barcode);

    return;

    }

    document.getElementById('barcodeLookupResult').innerText =
    '已建立：' + name + '（' + barcode + '）';

    }
    catch(err){

    console.log(err);

    document.getElementById('barcodeLookupResult').innerText =
    '查詢失敗：' + err.message;

    }

    }

    function lookupBarcode(barcode){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .lookupDressingBarcode(barcode);

    });

    }

    return callDressingBarcodeApi({
    action: 'lookupDressingBarcode',
    barcode: barcode
    });

    }

    function saveBarcode(data){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .saveDressingBarcode(data);

    });

    }

    return callDressingBarcodeApi({
    action: 'saveDressingBarcode',
    barcode: data.barcode,
    dressingName: data.dressingName,
    active: true
    });

    }

    function callDressingBarcodeApi(params){

    return jsonpDressingBarcode(params);

    }

    function jsonpDressingBarcode(params){

    return new Promise(function(resolve, reject){

    const callbackName =
    '__dressingBarcodeCallback_' +
    Date.now() +
    '_' +
    Math.random().toString(36).slice(2);

    const query =
    new URLSearchParams();

    Object.keys(params).forEach(function(key){

    if(params[key] !== undefined && params[key] !== null){
    query.set(key, params[key]);
    }

    });

    query.set('callback', callbackName);

    const script =
    document.createElement('script');

    const timer =
    setTimeout(function(){

    cleanup();
    reject(
    new Error('API 逾時，請檢查部署網址或 Sheet 權限')
    );

    }, 15000);

    window[callbackName] = function(result){

    debugDressingBarcode(
    'response',
    result
    );

    cleanup();
    resolve(result);

    };

    script.onerror = function(){

    debugDressingBarcode(
    'script-error',
    {
    url: script.src,
    callback: callbackName
    }
    );

    cleanup();
    reject(
    new Error('API 載入失敗，請檢查部署網址或 Apps Script 權限')
    );

    };

    script.src =
    DRESSING_BARCODE_API +
    '?' +
    query.toString();

    debugDressingBarcode(
    'request',
    {
    url: script.src,
    params: params,
    callback: callbackName
    }
    );

    document.head.appendChild(script);

    function cleanup(){

    clearTimeout(timer);

    if(script.parentNode){
    script.parentNode.removeChild(script);
    }

    try{
    delete window[callbackName];
    }
    catch(error){
    window[callbackName] = undefined;
    }

    }

    });

    }

    function isDressingBarcodeDebugMode(){

    return /(?:\?|&)debug=1(?:&|$)/.test(
    window.location.search || ''
    );

    }

    function debugDressingBarcode(label, data){

    if(!isDressingBarcodeDebugMode()){
    return;
    }

    console.log('[DressingBarcode]', label, data);
    debugger;

    }

    document.addEventListener('click', function(e){

    if(e.target.classList.contains('deleteRow')){

    const tbody =
    e.target.closest('tbody');

    if(tbody.rows.length <= 1){
    alert('至少保留一列');
    return;
    }

    e.target.closest('tr').remove();

    }

    if(e.target.classList.contains('deletePatient')){

    if(document.querySelectorAll('.patientBlock').length <= 1){
    alert('至少保留一位病人');
    return;
    }

    e.target.closest('.patientBlock').remove();

    refreshPatientTitle();

    }

    });

    function refreshPatientTitle(){

    document
    .querySelectorAll('.patientTitle')
    .forEach(function(el, i){

    el.innerText =
    '病人 ' + (i + 1);

    });

    }

    function submitUse(){

    alert('下一步接 Sheet');

    }
</script>
