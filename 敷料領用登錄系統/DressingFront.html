html,body{

.cardGrid{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:18px; margin-top:24px; }
.navCard{
  width:100%;
  text-align:left;
  background:var(--card);
  padding:26px;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
  cursor:pointer;
}
.navCard:hover{
  border-color:#93c5fd;
  box-shadow:0 14px 32px rgba(37,99,235,.12);
  transform:translateY(-1px);
}
.navCard.active{
  border-color:#2563eb;
  box-shadow:0 14px 32px rgba(37,99,235,.16);
}
.navTitle{ margin:0 0 8px; font-size:22px; font-weight:800; color:var(--text); }
.navDesc{ margin:0; color:var(--muted); font-size:15px; line-height:1.7; }
.navAction{
  margin-top:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  font-size:14px;
}
.moduleHost{
  margin-top:24px;
}
.moduleArea{
  display:none;
}
.placeholderCard{
  width:100%;
  background:var(--card);
  padding:28px;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}
.placeholderTitle{
  margin:0 0 8px;
  font-size:22px;
  font-weight:800;
}
.placeholderText{
  margin:0;
  color:var(--muted);
  line-height:1.7;
}
@media(max-width:960px){
  .cardGrid{ grid-template-columns:1fr; }
}
@media(max-width:760px){
  body{ padding:104px 12px 72px; }
  .navCard{ padding:20px; }
}
</style>

<script>
let APP_ENTRY_URL = '<?= appEntryUrl ?>';

if (APP_ENTRY_URL.includes('<' + '?=') || APP_ENTRY_URL.trim() === '') {
  APP_ENTRY_URL = 'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';
}

let AJAX_MODULE_STATE = {
  current:'',
  dictLoadedOnce:false
};

function goHome(){
  window.top.location.href = APP_ENTRY_URL;
}

async function showModule(name){
  document.querySelectorAll('.moduleArea').forEach(function(el){
    el.style.display = 'none';
  });

  document.querySelectorAll('.navCard').forEach(function(btn){
    btn.classList.remove('active');
  });

  const target = document.getElementById(name + 'Area');
  const btn = document.querySelector('[data-module-button="' + name + '"]');

  if(btn){
    btn.classList.add('active');
  }

  if(target){
    target.style.display = 'block';
  }

  AJAX_MODULE_STATE.current = name;

  if(name === 'dict' && typeof loadDictList === 'function'){
    if(!AJAX_MODULE_STATE.dictLoadedOnce){
      AJAX_MODULE_STATE.dictLoadedOnce = true;
      await loadDictList();
    }
  }
}

function reloadCurrentModule(){
  if(AJAX_MODULE_STATE.current === 'dict' && typeof loadDictList === 'function'){
    return loadDictList();
  }
}
</script>
</head>
