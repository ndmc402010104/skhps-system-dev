<style>

}

}

padding:0;
background:transparent;
color:#2563eb;

cursor:pointer;
}

color:#172033;
}

.pageMapSep{
color:#94a3b8;
}

}

}

.card{

background:white;
padding:28px;
border:1px solid #dbe4ef;

padding:8px 14px;

border:1px solid #d6dde7;
background:#ffffff;
color:#334155;
}

.primary{
background:#2563eb;
color:white;
border:none;
}

.danger{
background:#fee2e2;
color:#991b1b;
}

#formArea{
display:none;
margin-top:20px;
}

.infoRow{
margin-bottom:12px;
}

.infoRow label{
display:inline-block;
width:130px;
font-weight:bold;
}

input{
padding:7px;
border:1px solid #cbd5e1;
border-radius:8px;
box-sizing:border-box;
}

.patientBlock{
margin-top:20px;
padding:18px;
background:#f8fafc;
border:1px solid #dbe4ef;
border-radius:8px;
}

.patientTitle{
font-size:20px;

margin-bottom:14px;
}

table{

}

th{

}

td{

padding:10px;

}

td:nth-child(1){

}

td:nth-child(2){
width:170px;
}

width:340px;
}

td:nth-child(4){
width:100px;
}

td:nth-child(5){
width:180px;
}

td:nth-child(6){
width:220px;
}

input:not([type="radio"]){
width:100%;
}

.radioGroup{
display:flex;
align-items:center;
gap:14px;
padding-left:6px;
}

.radioGroup label{
display:flex;
align-items:center;
gap:6px;
margin:0;
white-space:nowrap;
}

margin:0;
}

.quantity{
width:100%;
}

.dressingInputGroup{

gap:8px;
align-items:center;
}

flex:1;
}

.cameraBtn{

padding:7px 10px;
}

.actions{
margin-top:14px;
display:flex;
gap:10px;
}

.scannerOverlay{

position:fixed;
inset:0;

background:rgba(15,23,42,.72);
padding:24px;

}

.scannerBox{

margin:60px auto;
background:white;
border-radius:12px;
padding:18px;
box-shadow:0 16px 40px rgba(15,23,42,.25);
}

.scannerTitle{
margin:0 0 12px;

font-weight:800;
}

}

}

}

}

}

</style>

<script>

const APP_ENTRY_URL =
'<?= appEntryUrl ?>';

function goHome(){

window.top.location.href =
APP_ENTRY_URL;

}

</script>

</head>

<body>

<main class="shell">

<header class="appHeader">

<div class="brand" onclick="goHome()">
<div class="brandMark">S</div>
<div class="brandText">
<span class="brandName">新光整形外科科室系統</span>
<span class="brandSub">敷料領用登錄</span>
</div>
</div>

</header>

<nav class="pageMap" aria-label="頁面地圖">
<button class="pageMapLink" onclick="goHome()">首頁</button>
<span class="pageMapSep">/</span>
<span class="pageMapCurrent">敷料領用登錄</span>
</nav>

<section class="pageHero">
<p class="eyebrow">敷料作業</p>
<h1>敷料領用登錄</h1>
<p class="pageLead">登錄病人敷料領用資料，包含品項、數量與相關醫師資訊。</p>
</section>

<div class="card">

<button
class="primary"
onclick="startUse()">

開始領用

</button>

<div id="formArea">

<div class="infoRow">
<label>領用日期與時間：</label>
<input id="useDateTime" readonly>
</div>

<div class="infoRow">
<label>領用人：</label>
<input id="userName">
</div>

<div class="infoRow">
<label>領用單位：</label>
<input id="unitName">
</div>

<div id="patientArea"></div>

<div class="actions">

<button type="button" onclick="addPatientBlock()">
下一個病人
</button>

<button
type="button"
class="primary"
onclick="submitUse()">

送出

</button>

</div>

</div>

</div>

<div id="scannerOverlay" class="scannerOverlay">

<div class="scannerBox">

<h3 class="scannerTitle">掃描 QR code / 條碼</h3>

<p class="scannerHint">
請將 QR code 或傳統條碼對準畫面。掃描成功後會自動填入敷料名稱。
</p>

<div id="scannerReader"></div>

<div class="scannerActions">
<button type="button" onclick="closeDressingScanner()">關閉</button>
</div>

</div>

</div>

<script>

let patientCount = 0;
let dressingScanner = null;
let activeDressingInput = null;

function startUse(){

document
.getElementById(
'formArea'
)
.style.display = 'block';

document
.getElementById(
'useDateTime'
)
.value =
new Date()
.toLocaleString(
'zh-TW'
);

if(
patientCount === 0
){

addPatientBlock();

}

}



function addPatientBlock(){

patientCount++;

const block =
document.createElement(
'div'
);

block.className =
'patientBlock';

block.innerHTML =

`
<div class="patientTitle">

病人 ${patientCount}

</div>

<div class="infoRow">

<label>

病歷號：

</label>

<input class="patientId">

</div>

<table>

<thead>

<tr>

<th>操作</th>
<th>計價狀態</th>
<th>敷料名稱</th>
<th>數量</th>
<th>支付類別</th>
<th>主治醫師</th>

</tr>

</thead>

<tbody class="dressingRows">

${createRow()}

</tbody>

</table>

<div class="actions">

<button type="button" onclick="addRow(this)">
新增一列
</button>

<button
type="button"
class="
danger
deletePatient">

刪除病人

</button>

</div>

`;

document
.getElementById(
'patientArea'
)
.appendChild(
block
);

refreshPatientTitle();

}



function createRow(){

const id =
Date.now()
+
'_'
+
Math.random();

return `

<tr>

<td>

<button
type="button"
class="
danger
deleteRow">

刪除

</button>

</td>


<td>

<div class="radioGroup">

<label>

<input
type="radio"
name="charge_${id}"
value="已計價">

已計價

</label>

<label>

<input
type="radio"
name="charge_${id}"
checked
value="未計價">

未計價

</label>

</div>

</td>


<td>

<div class="dressingInputGroup">

<input
class="dressingName">

<button
type="button"
class="cameraBtn"
onclick="openDressingScanner(this)">

📷

</button>

</div>

</td>


<td>

<input
class="quantity"
type="number"
value="1"
min="1">

</td>


<td>

<div class="radioGroup">

<label>

<input
type="radio"
name="pay_${id}"
value="健保">

健保

</label>

<label>

<input
type="radio"
name="pay_${id}"
checked
value="自費">

自費

</label>

</div>

</td>


<td>

<input
class="doctorName">

</td>

</tr>

`;

}



function addRow(button){

button
.closest(
'.patientBlock'
)
.querySelector(
'.dressingRows'
)
.insertAdjacentHTML(
'beforeend',
createRow()
);

}



async function openDressingScanner(button){

activeDressingInput =
button
.closest(
'td'
)
.querySelector(
'.dressingName'
);

document
.getElementById(
'scannerOverlay'
)
.style.display =
'block';

activeDressingInput =
button
.closest(
'td'
)
.querySelector(
'.dressingName'
);

document
.getElementById(
'scannerOverlay'
)
.style.display =
'block';

if(
dressingScanner
){

return;

}

dressingScanner =
new Html5Qrcode(
'scannerReader'
);

const config = {
fps: 10,
qrbox: {
width: 260,
height: 180
},
formatsToSupport: [
Html5QrcodeSupportedFormats.QR_CODE,
Html5QrcodeSupportedFormats.CODE_128,
Html5QrcodeSupportedFormats.CODE_39,
Html5QrcodeSupportedFormats.EAN_13,
Html5QrcodeSupportedFormats.EAN_8,
Html5QrcodeSupportedFormats.UPC_A,
Html5QrcodeSupportedFormats.UPC_E
]
};

dressingScanner
.start(
{
facingMode:{
exact:'environment'
}
},
config,
function(decodedText){

if(
activeDressingInput
){

activeDressingInput.value =
decodedText;

}

closeDressingScanner();

},
function(errorMessage){

}
)
.catch(function(err){

alert(
'無法開啟相機，請確認手機瀏覽器已允許相機權限'
);

console.log(
err
);

});

}



function closeDressingScanner(){

document
.getElementById(
'scannerOverlay'
)
.style.display =
'none';

if(
dressingScanner
){

dressingScanner
.stop()
.then(function(){

dressingScanner.clear();
dressingScanner = null;

})
.catch(function(err){

console.log(
err
);

dressingScanner = null;

});

}

}



document
.addEventListener(
'click',

function(e){

if(
e.target
.classList
.contains(
'deleteRow'
)
){

const tbody =
e.target.closest(
'tbody'
);

if(
tbody.rows.length <= 1
){

alert(
'至少保留一列'
);

return;

}

e.target
.closest(
'tr'
)
.remove();

}



if(
e.target
.classList
.contains(
'deletePatient'
)
){

if(
document
.querySelectorAll(
'.patientBlock'
)
.length <= 1
){

alert(
'至少保留一位病人'
);

return;

}

e.target
.closest(
'.patientBlock'
)
.remove();

refreshPatientTitle();

}

}

);



function refreshPatientTitle(){

document
.querySelectorAll(
'.patientTitle'
)
.forEach(

function(
el,
i
){

el.innerText =
'病人 '
+
(
i + 1
);

}

);

}



function submitUse(){

alert(
'下一步接 Sheet'
);

}

</script>

</main>

<?!= versionBadgeHtml ?>

</body>

</html>
