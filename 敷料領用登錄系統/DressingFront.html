<script>
    let patientCount = 0;
    let dressingScanner = null;
    let activeDressingInput = null;
    let scannerMode = '';
    let isReorderMode = false;
    let initialOrder = [];

    function escapeHtml(value){
    return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
    }

    function isAppsScriptMode(){

    return typeof google !== 'undefined'
    && google.script
    && google.script.run;

    }

    function openDressingDict(){
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('dictArea').style.display = 'block';
    loadDictList();
    }

    async function loadDictList() {
    isReorderMode = false;
    document.getElementById('dictTable').classList.remove('reorder-mode');
    document.getElementById('reorderBtn').innerText = '更改排序';
    document.getElementById('saveOrderBtn').style.display = 'none';

    const tbody = document.getElementById('dictTbody');
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:#64748b; padding:20px;">載入中...</td></tr>';
    
    try {
    const res = await listBarcode();
    if (res.ok && res.data && res.data.length > 0) {
    tbody.innerHTML = '';
    res.data.forEach(item => {
    const tr = document.createElement('tr');
    tr.dataset.rowKey = item.singleGtin || item.gtin || item.barcode || item.boxGtin || '';
    tr.innerHTML = `
    <td><input class="dict-hospital-code" value="${escapeHtml(item.hospitalCode || '')}"></td>
    <td><input class="dict-name" value="${escapeHtml(item.dressingName || '')}"></td>
    <td><input class="dict-size" value="${escapeHtml(item.size || '')}"></td>
    <td><input class="dict-single-gtin" value="${escapeHtml(item.singleGtin || item.gtin || item.barcode || '')}"></td>
    <td><input class="dict-box-gtin" value="${escapeHtml(item.boxGtin || '')}"></td>
    <td><input class="dict-box-qty" value="${escapeHtml(item.boxQuantity || '')}"></td>
    <td><input class="dict-category" value="${escapeHtml(item.category || '')}"></td>
    <td><input class="dict-status" value="${escapeHtml(item.status || '使用中')}"></td>
    <td style="white-space:nowrap;">
    <span class="dragHandle">☰</span>
    <button type="button" class="dictActionBtn edit-btn" onclick="editDictRow(this)">編輯</button>
    <button type="button" class="dictActionBtn save-btn primary" style="display:none;" onclick="saveDictRow(this)">儲存</button>
    <button type="button" class="dictActionBtn danger" onclick="deleteDictRow(this)">刪除</button>
    <div class="dictStatus saved" style="font-size:12px; margin-top:4px;">已建檔</div>
    </td>
    `;
    tbody.appendChild(tr);
    });
    } else {
    tbody.innerHTML = '<tr id="dictEmptyRow"><td colspan="9" style="text-align:center; color:#64748b; padding:20px;">目前尚無任何敷料資料</td></tr>';
    }
    } catch (err) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:#dc2626; padding:20px;">讀取失敗：' + (err.message || err) + '</td></tr>';
    }
    }

    let draggedRow = null;
    function toggleReorderMode() {
        if (isReorderMode) {
            cancelReorderMode();
            return;
        }

        const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
        if (rows.length === 0) return;
        
        isReorderMode = true;
        initialOrder = Array.from(rows).map(r => getDictRowKey(r));

        document.getElementById('dictTable').classList.add('reorder-mode');
        document.getElementById('reorderBtn').innerText = '返回';
        document.getElementById('saveOrderBtn').style.display = 'none';
        document.getElementById('batchSaveBtn').style.display = 'none';
        
        rows.forEach(row => {
            row.setAttribute('draggable', 'true');
            row.addEventListener('dragstart', handleDragStart);
            row.addEventListener('dragend', handleDragEnd);
            row.addEventListener('dragover', handleDragOver);
            row.addEventListener('drop', handleDrop);
            
            // 加入手機觸控支援
            row.addEventListener('touchstart', handleTouchStart, {passive: false});
            row.addEventListener('touchmove', handleTouchMove, {passive: false});
            row.addEventListener('touchend', handleTouchEnd);
        });
    }

    function cancelReorderMode() {
        isReorderMode = false;
        document.getElementById('dictTable').classList.remove('reorder-mode');
        document.getElementById('reorderBtn').innerText = '更改排序';
        document.getElementById('saveOrderBtn').style.display = 'none';
        document.getElementById('batchSaveBtn').style.display = 'inline-block';

        const tbody = document.getElementById('dictTbody');
        const rows = Array.from(tbody.querySelectorAll('tr:not(#dictEmptyRow)'));
        
        rows.forEach(row => {
            row.removeAttribute('draggable');
            row.removeEventListener('dragstart', handleDragStart);
            row.removeEventListener('dragend', handleDragEnd);
            row.removeEventListener('dragover', handleDragOver);
            row.removeEventListener('drop', handleDrop);
            
            row.removeEventListener('touchstart', handleTouchStart);
            row.removeEventListener('touchmove', handleTouchMove);
            row.removeEventListener('touchend', handleTouchEnd);
        });

        rows.sort((a, b) => {
            const aVal = getDictRowKey(a);
            const bVal = getDictRowKey(b);
            return initialOrder.indexOf(aVal) - initialOrder.indexOf(bVal);
        });

        rows.forEach(r => tbody.appendChild(r));
    }

    function checkOrderChanged() {
        const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
        const currentOrder = Array.from(rows).map(r => getDictRowKey(r));
        
        let changed = false;
        if (currentOrder.length !== initialOrder.length) {
            changed = true;
        } else {
            for(let i=0; i<initialOrder.length; i++) {
                if (initialOrder[i] !== currentOrder[i]) {
                    changed = true;
                    break;
                }
            }
        }

        if (changed) {
            document.getElementById('saveOrderBtn').style.display = 'inline-block';
        } else {
            document.getElementById('saveOrderBtn').style.display = 'none';
        }
    }

    function handleDragStart(e) {
        draggedRow = this;
        if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', getDictRowKey(this));
        }
        setTimeout(() => this.classList.add('dragging'), 0);
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        draggedRow = null;
        document.querySelectorAll('#dictTbody tr').forEach(r => r.classList.remove('drag-over', 'drag-over-bottom'));
    }

    function handleDragOver(e) {
        e.preventDefault();
        if (!draggedRow || this === draggedRow) return false;
        
        const rect = this.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;

        this.classList.remove('drag-over', 'drag-over-bottom');
        if (e.clientY < midpoint) {
            this.classList.add('drag-over');
        } else {
            this.classList.add('drag-over-bottom');
        }
        return false;
    }

    function handleDrop(e) {
        e.preventDefault();
        if (!draggedRow || this === draggedRow) return false;

        this.classList.remove('drag-over', 'drag-over-bottom');

        const rect = this.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;

        if (e.clientY < midpoint) {
            this.parentNode.insertBefore(draggedRow, this);
        } else {
            this.parentNode.insertBefore(draggedRow, this.nextSibling);
        }
        
        checkOrderChanged();

        return false;
    }

    // --- 手機版專屬拖曳邏輯 ---
    function handleTouchStart(e) {
        if (!e.target.classList.contains('dragHandle')) return;
        draggedRow = this;
        this.classList.add('dragging');
    }

    function handleTouchMove(e) {
        if (!draggedRow || draggedRow !== this) return;
        e.preventDefault(); // 重要：拖曳時阻止手機畫面上下滾動
        
        const touch = e.touches[0];
        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!targetElement) return;
        
        const targetRow = targetElement.closest('tr');
        if (!targetRow || targetRow === draggedRow || targetRow.id === 'dictEmptyRow' || targetRow.parentNode !== draggedRow.parentNode) {
            return;
        }
        
        const rect = targetRow.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;
        
        // 即時替換順序
        targetRow.parentNode.insertBefore(draggedRow, touch.clientY < midpoint ? targetRow : targetRow.nextSibling);
    }

    function handleTouchEnd(e) {
        if (!draggedRow) return;
        this.classList.remove('dragging');
        draggedRow = null;
        checkOrderChanged();
    }

    async function saveDictOrder() {
    const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
    const barcodes = [];
    
    rows.forEach(tr => {
    const code = getDictRowKey(tr);
    if (code) {
    barcodes.push(code);
    }
    });
    
    if (barcodes.length === 0) return;

    const btn = document.getElementById('saveOrderBtn');
    btn.innerText = '儲存中...';
    btn.disabled = true;

    try {
    const res = await reorderBarcode(barcodes.join(','));
    if (res.ok) {
    isReorderMode = false;
    btn.style.display = 'none';
    document.getElementById('reorderBtn').innerText = '更改排序';
    document.getElementById('batchSaveBtn').style.display = 'inline-block';
    document.getElementById('dictTable').classList.remove('reorder-mode');
    
    rows.forEach(r => {
        r.removeAttribute('draggable');
        r.removeEventListener('dragstart', handleDragStart);
        r.removeEventListener('dragend', handleDragEnd);
        r.removeEventListener('dragover', handleDragOver);
        r.removeEventListener('drop', handleDrop);
        
        r.removeEventListener('touchstart', handleTouchStart);
        r.removeEventListener('touchmove', handleTouchMove);
        r.removeEventListener('touchend', handleTouchEnd);
    });
    } else {
    alert('排序儲存失敗');
    }
    } catch (err) {

    async function batchSaveDict() {
    const editingRows = document.querySelectorAll('#dictTbody tr.editing');
    if (editingRows.length === 0) {
    alert('目前沒有需要儲存的項目（請先修改或新增敷料）');
    return;
    }

    const btn = document.getElementById('batchSaveBtn');
    const originalText = btn.innerText;
    btn.innerText = '批次處理中...';
    btn.disabled = true;

    let successCount = 0;
    let failCount = 0;

    // 依序執行，避免同時寫入導致 Google Sheet 衝突
    for (const tr of editingRows) {
    const saveBtn = tr.querySelector('.save-btn');
    if (saveBtn) {
    await saveDictRow(saveBtn);
    if (!tr.classList.contains('editing')) {
    successCount++;
    } else {
    failCount++;
    }
    }

    btn.innerText = originalText;
    btn.disabled = false;

    if (failCount > 0) {
    alert(`批次儲存完成！\n成功：${successCount} 筆\n失敗：${failCount} 筆\n\n（可能有部分名稱未填寫或網路錯誤）`);

    alert(`批次儲存成功！共更新 ${successCount} 筆項目。`);
    }
    }

          activeDressingInput.value = gtin; 
          activeDressingInput.dataset.gtin = gtin;

          activeDressingInput.dataset.exp = parsed.exp || '';
          activeDressingInput.dataset.raw = parsed.raw || barcode;
          activeDressingInput.dataset.packageType = '';
          activeDressingInput.dataset.unitQuantity = '1';

          try {
            const res = await lookupBarcode(gtin);
            if (res.found && res.data.dressingName) {
              const sizeText = res.data.size ? ` ${res.data.size}` : '';
              const packageText = res.packageType === 'box' ? '（盒裝）' : '';
              activeDressingInput.value = `${res.data.dressingName}${sizeText}${packageText}`;
              activeDressingInput.dataset.packageType = res.packageType || '';
              activeDressingInput.dataset.unitQuantity = String(res.unitQuantity || 1);
              activeDressingInput.title =
                `GTIN: ${gtin}\n包裝: ${res.packageType || ''}\n數量: ${res.unitQuantity || 1}\nLOT: ${parsed.lot || ''}\nEXP: ${parsed.exp || ''}`;

              const row = activeDressingInput.closest('tr');
              const qtyInput = row ? row.querySelector('.quantity') : null;
              if (qtyInput && res.packageType === 'box') {

        await addDictRow(gtin, parsed);
        return;
      }

    }


    // UDI 解析器：支援 GS1 標準，將長條碼拆解為 GTIN, LOT, EXP
    function parseUDI(barcode) {
      const raw = String(barcode || '');
      const GS = String.fromCharCode(29);

      let text = raw
        .replace(/[()]/g, '')
        .trim();

      let gtin = '';
      let lot = '';
      let exp = '';

      function formatExp(yymmdd) {
        if (!yymmdd || yymmdd.length !== 6) return '';
        const yy = yymmdd.substring(0, 2);
        const mm = yymmdd.substring(2, 4);
        const dd = yymmdd.substring(4, 6);
        return `20${yy}-${mm}-${dd}`;
      }

      let i = 0;

      while (i < text.length) {
        const ai2 = text.substring(i, i + 2);

        if (ai2 === '01' && i + 16 <= text.length) {
          gtin = text.substring(i + 2, i + 16);
          i += 16;
          continue;
        }

        if (ai2 === '17' && i + 8 <= text.length) {
          exp = formatExp(text.substring(i + 2, i + 8));
          i += 8;
          continue;
        }

        if (ai2 === '10' && i + 2 <= text.length) {
          const start = i + 2;
          let end = text.indexOf(GS, start);

          if (end === -1) {
            const nextAiMatch = text.substring(start).match(/(17\d{6}|21[A-Za-z0-9]{1,20}|30\d{1,8})/);
            end = nextAiMatch && nextAiMatch.index > 0
              ? start + nextAiMatch.index
              : text.length;
          }

          lot = text.substring(start, end);
          i = end;
          continue;
        }

        i++;
      }

      if (!gtin) {
        gtin = raw.replace(/[\x00-\x1F\x7F]/g, '').trim();
      }

      return {
        raw: raw,
        gtin: gtin,
        lot: lot,
        exp: exp
      };
    }

    function callDressingBarcodeApi(params){

    function jsonpDressingBarcode(params){

    return new Promise(function(resolve, reject){

    const callbackName =
    '__dressingBarcodeCallback_' +
    Date.now() +
    '_' +
    Math.random().toString(36).slice(2);

    const query =
    new URLSearchParams();

    Object.keys(params).forEach(function(key){

    if(params[key] !== undefined && params[key] !== null){
    query.set(key, params[key]);
    }

    });

    query.set('callback', callbackName);

    const script =
    document.createElement('script');

    const timer =
    setTimeout(function(){

    cleanup();
    reject(
    new Error('API 逾時，請檢查部署網址或 Sheet 權限')
    );

    }, 15000);

    window[callbackName] = function(result){

    debugDressingBarcode(
    'response',
    result
    );

    cleanup();

    if(!result || typeof result !== 'object') {
    reject(new Error('API 回傳格式錯誤'));
    return;
    }

    resolve(result);

    };

    script.onerror = function(){

    debugDressingBarcode(
    'script-error',
    {
    url: script.src,
    callback: callbackName
    }
    );

    cleanup();
    reject(
    new Error('API 載入失敗，請檢查部署網址或 Apps Script 權限')
    );

    };

    script.src =
    APP_ENTRY_URL +
    '?' +
    query.toString();

    debugDressingBarcode(
    'request',
    {
    url: script.src,
    params: params,
    callback: callbackName
    }
    );

    document.head.appendChild(script);

    function cleanup(){

    clearTimeout(timer);

    if(script.parentNode){
    script.parentNode.removeChild(script);
    }

    try{
    delete window[callbackName];
    }
    catch(error){
    window[callbackName] = undefined;
    }

    }

    });

    }
