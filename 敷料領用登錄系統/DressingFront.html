<script>
let patientCount = 0;
let dressingScanner = null;
let activeDressingInput = null;
let activeDictGtinInput = null;
let scannerMode = '';
let isReorderMode = false;
let initialOrder = [];
let dressingMasterCache = [];
let dictLoaded = false;
let draggedRow = null;
let dictScanMemory = {};
let cancelledDictScanKeys = {};

const DICT_TABLE_STATE = {
  mode:'closed', // closed | loading | clean | editing | adding | saving | deleting | refreshing | reordering | error
  cacheUpdatedAt:0,
  lastMessage:''
};

function isDictTableBusy(){
  return ['loading','saving','deleting','refreshing'].indexOf(DICT_TABLE_STATE.mode) >= 0;
}

function setDictTableMode(mode, message){
  DICT_TABLE_STATE.mode = mode || 'clean';
  DICT_TABLE_STATE.lastMessage = message || '';
  renderDictTableControls();
}

function invalidateDressingMasterCache(reason){
  dressingMasterCache = [];
  DICT_TABLE_STATE.cacheUpdatedAt = 0;
  clearDictScanMemory();
  if(reason){
    console.log('invalidate dressing cache:', reason);
  }
}

function getDictDirtyCount(){
  try{
    return getDirtyDictRows().length;
  } catch(error){
    return 0;
  }
}

function getDictEditingCount(){
  try{
    return document.querySelectorAll('#dictTbody tr.editing:not(#dictEmptyRow)').length;
  } catch(error){
    return 0;
  }
}

function hasDictEditingRows(){
  return getDictEditingCount() > 0;
}

function getDictNextIdleMode(){
  if(isReorderMode){
    return 'reordering';
  }

  const rows = Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)'));
  const hasNewRow = rows.some(function(tr){ return tr.dataset.isNewRow === '1'; });
  if(hasNewRow){
    return 'adding';
  }

  if(hasDictEditingRows()){
    return 'editing';
  }

  return 'clean';
}

function syncDictTableModeFromRows(){
  if(isDictTableBusy() || DICT_TABLE_STATE.mode === 'error'){
    renderDictTableControls();
    return;
  }

  setDictTableMode(getDictNextIdleMode());
}

function renderDictTableControls(){
  const busy = isDictTableBusy();
  const dirtyCount = getDictDirtyCount();
  const editingCount = getDictEditingCount();
  const hasDirtyRows = dirtyCount > 0;
  const hasEditingRows = editingCount > 0;
  const ready = dictLoaded && DICT_TABLE_STATE.mode !== 'error';
  const blockNormalActions = busy || isReorderMode;

  const status = document.getElementById('dictLoadStatus');
  if(status && DICT_TABLE_STATE.lastMessage){
    status.innerText = DICT_TABLE_STATE.lastMessage;
  }

  const scanBtn = document.getElementById('dictScanBtn');
  const testSingleBtn = document.getElementById('testHydrocleanSingleBtn');
  const testBoxBtn = document.getElementById('testHydrocleanBoxBtn');
  const reorderBtn = document.getElementById('reorderBtn');
  const saveOrderBtn = document.getElementById('saveOrderBtn');
  const batchSaveBtn = document.getElementById('batchSaveBtn');

  // 編輯中仍允許主掃描/測試碼，方便邊補資料邊加入新掃描流程。
  // 只有 busy 或排序模式才鎖住掃描。
  if(scanBtn) scanBtn.disabled = !ready || busy || isReorderMode;
  if(testSingleBtn) testSingleBtn.disabled = !ready || busy || isReorderMode;
  if(testBoxBtn) testBoxBtn.disabled = !ready || busy || isReorderMode;

  if(reorderBtn){
    reorderBtn.disabled = !ready || busy || hasEditingRows;
    if(!isReorderMode){
      reorderBtn.title = hasEditingRows ? '有正在編輯或未儲存的列時不能排序' : '';
    }
  }

  if(saveOrderBtn){
    saveOrderBtn.disabled = !ready || busy;
  }

  if(batchSaveBtn){
    batchSaveBtn.style.display = (!isReorderMode && dirtyCount >= 2) ? 'inline-block' : 'none';
    batchSaveBtn.disabled = !ready || busy;
  }

  document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)').forEach(function(tr){
    const rowEditing = tr.classList.contains('editing');
    tr.querySelectorAll('input, select').forEach(function(input){
      input.disabled = busy || !rowEditing;
    });

    tr.querySelectorAll('.dictActionBtn').forEach(function(btn){
      btn.disabled = busy || isReorderMode;
    });

    tr.querySelectorAll('.dictGtinScanBtn').forEach(function(btn){
      btn.style.display = rowEditing ? '' : 'none';
      btn.disabled = busy || isReorderMode || !rowEditing;
    });
  });
}

function escapeHtml(value){
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}


function normalizeGtinForCompare(value){
  const clean = String(value || '').replace(/[^0-9]/g, '').trim();
  if(!clean) return '';
  const stripped = clean.replace(/^0+/, '');
  return stripped || '0';
}

function sameGtin(a, b){
  const na = normalizeGtinForCompare(a);
  const nb = normalizeGtinForCompare(b);
  return !!na && !!nb && na === nb;
}

function openAppDialog(options){
  return new Promise(function(resolve){
    const overlay = document.getElementById('appDialogOverlay');
    const titleEl = document.getElementById('appDialogTitle');
    const messageEl = document.getElementById('appDialogMessage');
    const inputEl = document.getElementById('appDialogInput');
    const okBtn = document.getElementById('appDialogOkBtn');
    const cancelBtn = document.getElementById('appDialogCancelBtn');
    
    // Check if choices exist
    let choicesContainer = document.getElementById('appDialogChoices');
    if (!choicesContainer) {
      choicesContainer = document.createElement('div');
      choicesContainer.id = 'appDialogChoices';
      choicesContainer.className = 'appDialogChoices';
      inputEl.parentNode.insertBefore(choicesContainer, inputEl.nextSibling);
    }
    
    titleEl.innerText = options.title || '提示';
    messageEl.innerText = options.message || '';
    inputEl.value = options.defaultValue || '';
    
    if (options.choices && options.choices.length > 0) {
      inputEl.style.display = 'none';
      choicesContainer.style.display = 'flex';
      choicesContainer.innerHTML = '';
      
      options.choices.forEach(function(choice) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'appDialogChoiceBtn';
        btn.innerText = choice.label || choice.value;
        btn.onclick = function() {
          cleanup(choice.value);
        };
        choicesContainer.appendChild(btn);
      });
      
      // Hide OK button when using choices since selection is immediate
      okBtn.style.display = 'none';
    } else {
      choicesContainer.style.display = 'none';
      inputEl.style.display = options.input ? 'block' : 'none';
      okBtn.style.display = 'inline-block';
      okBtn.innerText = options.okText || '確定';
    }

    cancelBtn.style.display = options.cancel === false ? 'none' : 'inline-block';
    cancelBtn.innerText = options.cancelText || '取消';
    overlay.style.display = 'flex';

    function cleanup(value){
      overlay.style.display = 'none';
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      inputEl.onkeydown = null;
      resolve(value);
    }

    okBtn.onclick = function(){
      cleanup(options.input ? inputEl.value : true);
    };

    cancelBtn.onclick = function(){
      cleanup(options.input ? null : false);
    };

    inputEl.onkeydown = function(e){
      if(e.key === 'Enter') cleanup(inputEl.value);
      if(e.key === 'Escape') cleanup(null);
    };

    if(options.input){
      setTimeout(function(){ inputEl.focus(); inputEl.select(); }, 50);
    } else {
      setTimeout(function(){ okBtn.focus(); }, 50);
    }
  });
}

function setDictLoadState(state, message){
  const status = document.getElementById('dictLoadStatus');
  const ready = state === 'ready';

  if(status){
    status.innerText = message || '';
  }

  dictLoaded = ready;

  if(state === 'loading'){
    setDictTableMode('loading', message || '正在讀取敷料主檔');
    return;
  }

  if(state === 'error'){
    setDictTableMode('error', message || '敷料主檔讀取失敗');
    return;
  }

  if(ready){
    DICT_TABLE_STATE.cacheUpdatedAt = Date.now();
    setDictTableMode(getDictNextIdleMode(), message || '已讀取敷料主檔');
    return;
  }

  setDictTableMode('closed', message || '尚未讀取敷料主檔');
}

function hasPendingDictWork(){
  /*
    離開/重開建檔頁前的保護：
    只要還有前端暫存列、正在編輯列、排序模式或儲存/刪除/刷新中，
    切換頁面或重新讀取都可能洗掉畫面上的未儲存狀態。
  */
  try{
    return isDictTableBusy() || isReorderMode || hasPendingLocalRows();
  } catch(error){
    return false;
  }
}

  return await showConfirmDialog(

    '<tr><td colspan="9" style="text-align:center; color:#64748b; padding:20px;">載入中...</td></tr>';

  try{
    const res = await listBarcode();

    if(!res || !res.ok){
      throw new Error((res && res.message) || '主檔讀取失敗');
    }

    dressingMasterCache = res.data || [];

      escapeHtml(err.message || err) +

function isDictRowDirty(tr){
  if(tr.dataset.isNewRow === '1'){
    return true;
  }

  const original = tr.dataset.originalData || '';
  if(!original){
    return false;
  }

  return original !== JSON.stringify(getDictRowData(tr));
}

function getDirtyDictRows(){

function isSameDressingIdentityForRow(rowData, item){
  rowData = rowData || {};
  item = item || {};

  const rowHospitalCode = String(rowData.hospitalCode || '').trim();
  const itemHospitalCode = String(item.hospitalCode || '').trim();

  if(rowHospitalCode && itemHospitalCode && rowHospitalCode === itemHospitalCode){
    return true;
  }

  const rowSingle = rowData.singleGtin || rowData.gtin || '';
  const itemSingle = item.singleGtin || item.gtin || '';
  const rowBox = rowData.boxGtin || '';
  const itemBox = item.boxGtin || '';

  if(rowSingle && itemSingle && sameGtin(rowSingle, itemSingle)){
    return true;
  }

  if(rowBox && itemBox && sameGtin(rowBox, itemBox)){
    return true;
  }

  if(rowSingle && itemBox && sameGtin(rowSingle, itemBox)){
    return true;
  }

  if(rowBox && itemSingle && sameGtin(rowBox, itemSingle)){
    return true;
  }

  const rowName = normalizeTextForCompare(rowData.dressingName || '');
  const itemName = normalizeTextForCompare(item.dressingName || '');
  const rowSize = normalizeTextForCompare(rowData.size || '');
  const itemSize = normalizeTextForCompare(item.size || '');

  return !!rowName && !!itemName && rowName === itemName && rowSize === itemSize;
}

function findExistingRowByItem(item, excludeTr){

    return isSameDressingIdentityForRow(getDictRowData(row), item || {});

function applyDressingItemToDictRow(tr, item){
  if(!tr || !item){
    return;
  }

  const map = {
    '.dict-hospital-code': item.hospitalCode || '',
    '.dict-name': item.dressingName || '',
    '.dict-size': item.size || '',
    '.dict-single-gtin': item.singleGtin || item.gtin || '',
    '.dict-box-gtin': item.boxGtin || '',
    '.dict-box-qty': item.boxQuantity || '',
    '.dict-category': item.category || '',
    '.dict-status': item.status || '使用中'
  };

  Object.keys(map).forEach(function(selector){
    const input = tr.querySelector(selector);
    if(input){
      input.disabled = false;
      input.value = map[selector];
      input.dispatchEvent(new Event('input', { bubbles:true }));
      input.dispatchEvent(new Event('change', { bubbles:true }));
    }
  });

  const single = item.singleGtin || item.gtin || '';
  const box = item.boxGtin || '';

  if(single){
    setRowScannedGtinTarget(tr, single, 'single');
  }

  if(box){
    setRowScannedGtinTarget(tr, box, 'box');
  }

  tr.dataset.rowKey = item.hospitalCode || single || box || '';
}

function mergeSavedItemWithVisibleRows(savedItem, mainTr, duplicateTr){
  const merged = Object.assign({}, savedItem || {});
  const sources = [mainTr, duplicateTr].filter(Boolean);

  function firstValue(selector){
    for(let i = 0; i < sources.length; i++){
      const value = getRowInputValue(sources[i], selector);
      if(value){
        return value;
      }
    }
    return '';
  }

  // 如果這次其實是重掃／重建造成的前端重複列，後端回傳空白時不要把畫面上原本已有的條碼洗掉。
  if(!(merged.singleGtin || merged.gtin)){
    const value = firstValue('.dict-single-gtin');
    if(value){
      merged.singleGtin = value;
      merged.gtin = value;
    }
  }

  if(!merged.boxGtin){
    const value = firstValue('.dict-box-gtin');
    if(value){
      merged.boxGtin = value;
    }
  }

  if(!merged.boxQuantity){
    const value = firstValue('.dict-box-qty');
    if(value){
      merged.boxQuantity = value;
    }
  }

  if(!merged.category){
    const value = firstValue('.dict-category');
    if(value){
      merged.category = value;
    }
  }

  return merged;
}

function updateDressingMasterCacheItem(item){
  if(!item){
    return;
  }

  if(!Array.isArray(dressingMasterCache)){
    dressingMasterCache = [];
  }

  let replaced = false;

  dressingMasterCache = dressingMasterCache.map(function(existing){
    if(isSameDressingIdentityForRow(existing, item)){
      replaced = true;
      return Object.assign({}, existing, item);
    }
    return existing;
  });

  if(!replaced){
    dressingMasterCache.unshift(item);
  }
}

function removeDuplicateDictRowsForItem(item, keepTr){
  Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)')).forEach(function(row){
    if(row === keepTr){
      return;
    }

    if(isSameDressingIdentityForRow(getDictRowData(row), item || {})){
      row.remove();
    }
  });

  ensureDictEmptyRow();
}

}

function restoreDictRowSnapshot(tr){
  let data = {};
  try{
    data = JSON.parse(tr.dataset.originalData || '{}');
  } catch(error){
    data = {};
  }

  const map = {
    '.dict-hospital-code': data.hospitalCode,
    '.dict-name': data.dressingName,
    '.dict-size': data.size,
    '.dict-single-gtin': data.singleGtin,
    '.dict-box-gtin': data.boxGtin,
    '.dict-box-qty': data.boxQuantity,
    '.dict-category': data.category,
    '.dict-status': data.status || '使用中'
  };

  Object.keys(map).forEach(function(selector){
    const input = tr.querySelector(selector);
    if(input){
      input.value = map[selector] || '';
    }
  });
}

function enterDictEditMode(tr){
  if(isDictTableBusy() || isReorderMode){
    showNotice('表格處理中，暫時不能編輯', 'warning', '請稍候');
    return;
  }

  tr.classList.add('editing');
  setDictInputsEnabled(tr, true);
  setDictRowSnapshot(tr);
  bindDictRowDirtyWatch(tr);
  updateDictMainButton(tr);

  setDictTableMode(getDictNextIdleMode());

  const nameInput = tr.querySelector('.dict-name');
  if(nameInput){
    nameInput.focus();
  }
}

function leaveDictEditMode(tr){
  tr.classList.remove('editing');
  delete tr.dataset.isNewRow;

  setDictInputsEnabled(tr, false);
  updateDictMainButton(tr);
  syncDictTableModeFromRows();
}

async function handleDictMainButton(btn){
  const tr = btn.closest('tr');

  if(!tr.classList.contains('editing')){
    enterDictEditMode(tr);
    return;
  }

  if(isDictRowDirty(tr)){
    await saveDictRow(btn);
    return;
  }

  restoreDictRowSnapshot(tr);
  leaveDictEditMode(tr);

  const statusEl = tr.querySelector('.dictStatus');
  if(statusEl){
    statusEl.innerText = '已返回';
    statusEl.className = 'dictStatus saved';
  }
}


async function checkBarcodeConflictBeforeSave(data, originalData){
  originalData = originalData || {};

  const originalSingle = originalData.singleGtin || originalData.gtin || '';
  const originalBox = originalData.boxGtin || '';

  const targets = [
    { type:'single', gtin:data.singleGtin || '' },
    { type:'box', gtin:data.boxGtin || '' }
  ].filter(function(item){
    return item.gtin;
  });

  for(const target of targets){
    const isOriginal =
      sameGtin(target.gtin, originalSingle) ||
      sameGtin(target.gtin, originalBox);

    if(isOriginal){
      continue;
    }

    try{
      const res = await lookupBarcode(target.gtin);

      if(res && res.found && res.data){
        const sameHospitalCode =
          data.hospitalCode &&
          res.data.hospitalCode &&
          String(data.hospitalCode).trim() === String(res.data.hospitalCode).trim();

        const sameNameSize =
          normalizeTextForCompare(data.dressingName) === normalizeTextForCompare(res.data.dressingName) &&
          normalizeTextForCompare(data.size) === normalizeTextForCompare(res.data.size);

        if(sameHospitalCode || sameNameSize){
          continue;
        }

        return {
          conflict:true,
          type:target.type,
          gtin:target.gtin,
          packageType:res.packageType || target.type,
          data:res.data,
          message:'此 GTIN 已由其他資料使用：' + describeDressingItem(res.data)
        };
      }
    } catch(error){
      console.log('儲存前查重失敗，交由後端 save 再判斷', error);
    }
  }

  return { conflict:false };
}
function getOriginalDictRowData(tr){
  try{
    return JSON.parse(tr.dataset.originalData || '{}');
  } catch(error){
    return {};
  }
}


function normalizeDictValueForCompare(value, kind){
  const text = String(value || '').trim();

  if(kind === 'gtin'){
    return normalizeGtinForCompare(text);
  }

  if(kind === 'text'){
    return normalizeTextForCompare(text);
  }

  if(kind === 'number'){
    const clean = text.replace(/,/g, '');
    if(clean === '') return '';
    const num = Number(clean);
    return Number.isFinite(num) ? String(num) : clean;
  }

  return text;
}

function normalizeDictItemForCompare(item){
  item = item || {};

  return {
    hospitalCode: normalizeDictValueForCompare(item.hospitalCode, 'number'),
    dressingName: normalizeDictValueForCompare(item.dressingName, 'text'),
    size: normalizeDictValueForCompare(item.size, 'text'),
    singleGtin: normalizeDictValueForCompare(item.singleGtin || item.gtin, 'gtin'),
    boxGtin: normalizeDictValueForCompare(item.boxGtin, 'gtin'),
    boxQuantity: normalizeDictValueForCompare(item.boxQuantity, 'number'),
    category: normalizeDictValueForCompare(item.category, 'number'),
    status: normalizeDictValueForCompare(item.status || '使用中', 'text')
  };
}

function getCurrentDictItemsForCompare(){
  return Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)')).map(function(tr){
    return normalizeDictItemForCompare(getDictRowData(tr));
  });
}

function getBackendDictItemsForCompare(items){
  return (Array.isArray(items) ? items : []).map(function(item){
    return normalizeDictItemForCompare(item);
  });
}

function areDictListsSame(currentItems, backendItems){
  return JSON.stringify(currentItems || []) === JSON.stringify(backendItems || []);
}

async function syncDictListIfChanged(options){
  options = options || {};

  try{
    const res = await listBarcode();

    if(!res || !res.ok){
      throw new Error((res && res.message) || '主檔讀取失敗');
    }

    const backendData = res.data || [];
    const currentItems = getCurrentDictItemsForCompare();
    const backendItems = getBackendDictItemsForCompare(backendData);

    dressingMasterCache = backendData;

    if(areDictListsSame(currentItems, backendItems)){
      setDictLoadState('ready', `已讀取 ${backendData.length} 筆敷料資料，畫面與後端一致`);

      if(options.sameMessage){
        showNotice(options.sameMessage, 'success', options.sameTitle || '儲存完成');
      }

      return {
        refreshed:false,
        same:true,
        count:backendData.length
      };
    }

    await loadDictList();

    if(options.changedMessage){
      showNotice(options.changedMessage, 'success', options.changedTitle || '已同步畫面');
    }

    return {
      refreshed:true,
      same:false,
      count:backendData.length
    };
  } catch(error){
    console.log('儲存後比對主檔失敗，改用重新載入', error);
    await loadDictList();

    if(options.fallbackMessage){
      showNotice(options.fallbackMessage, 'warning', options.fallbackTitle || '已重新載入');
    }

    return {
      refreshed:true,
      same:false,
      error:error
    };
  }
}


function hasUnsavedFrontOnlyRows(excludeTr){
  return Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)')).some(function(row){
    if(excludeTr && row === excludeTr){
      return false;
    }

    return row.dataset.frontOnly === '1' || row.dataset.isNewRow === '1';
  });
}

function hasPendingLocalRows(excludeTr){
  /*
    只要畫面上還有其他尚未完成的本地狀態，就不能整張 reload。
    包含：
    1. frontOnly/isNewRow：掃描新增但尚未儲存的列。
    2. editing：正在編輯但尚未完成的既有列。

    原因：reload 只會帶回後端資料，會洗掉前端暫存列，
    也會殺掉正在編輯中的欄位值。
  */
  return Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)')).some(function(row){
    if(excludeTr && row === excludeTr){
      return false;
    }

    return (
      row.dataset.frontOnly === '1' ||
      row.dataset.isNewRow === '1' ||
      row.classList.contains('editing')
    );
  });
}

function finishDictLocalChange(message, title, type){
  ensureDictEmptyRow();

  /*
    局部儲存/刪除完成後不能呼叫 syncDictTableModeFromRows() 來解除 saving，
    因為 syncDictTableModeFromRows() 會在 busy 狀態直接 return。
    這裡必須明確把 table mode 從 saving/deleting 拉回目前畫面應有狀態，
    否則其他列會一直 disabled，畫面顯示「儲存中...」。
  */
  setDictTableMode(getDictNextIdleMode());
  updateBatchSaveButtonVisibility();

  if(message){
    showNotice(message, type || 'success', title || '完成');
  }
}


async function saveDictRow(btn){
  const tr = btn.closest('tr');
  if(isDictTableBusy()){
    return;
  }

  const shouldReloadAfterSave = !hasPendingLocalRows(tr);

  setDictTableMode('saving', '儲存中...');
  const data = getDictRowData(tr);
  const originalData = getOriginalDictRowData(tr) || {};
  const statusEl = tr.querySelector('.dictStatus');

  const hasKeyField =
    data.hospitalCode ||
    data.singleGtin ||
    data.boxGtin;

  if(!hasKeyField){
    statusEl.innerText = '院內碼、單包GTIN、包裝GTIN至少填一項';
    statusEl.className = 'dictStatus error';
    setDictTableMode(getDictNextIdleMode());
    return;
  }

  statusEl.innerText = '儲存前查重中...';
  statusEl.className = 'dictStatus';
  btn.disabled = true;
  btn.innerText = '...';

  let conflict = { conflict:false };

  try{
    conflict = await checkBarcodeConflictBeforeSave(data, originalData);
  } catch(error){
    console.log('儲存前查重失敗，繼續交由後端判斷', error);
  }

  if(conflict && conflict.conflict){
    statusEl.innerText = '已存在，未儲存';
    statusEl.className = 'dictStatus error';

    showNotice(
      String(conflict.message || '此資料已存在') + '\n\n請重新載入主檔，或改用既有資料。',
      'warning',
      '儲存前發現重複'
    );

    btn.disabled = false;
    updateDictMainButton(tr);
    setDictTableMode(getDictNextIdleMode());
    return;
  }

  statusEl.innerText = '儲存中...';
  statusEl.className = 'dictStatus';

  try{
    const res = await saveBarcode({
      originalGtin: originalData.singleGtin || originalData.gtin || '',
      originalBoxGtin: originalData.boxGtin || '',
      hospitalCode: data.hospitalCode || '',
      singleGtin: data.singleGtin || '',
      gtin: data.singleGtin || '',
      dressingName: data.dressingName || '',
      size: data.size || '',
      category: data.category || '',
      boxGtin: data.boxGtin || '',
      boxQuantity: data.boxQuantity || '',
      status: data.status || '使用中'
    });

    if(res && res.ok){
      const savedItem = res.savedItem || res.data || data;
      const existingTargetRow = findExistingRowByItem(savedItem, tr);

      if(existingTargetRow){
        const mergedItem = mergeSavedItemWithVisibleRows(savedItem, existingTargetRow, tr);
        applyDressingItemToDictRow(existingTargetRow, mergedItem);
        updateDressingMasterCacheItem(mergedItem);
        setDictRowSnapshot(existingTargetRow);
        delete existingTargetRow.dataset.frontOnly;
        leaveDictEditMode(existingTargetRow);

        const targetStatusEl = existingTargetRow.querySelector('.dictStatus');
        if(targetStatusEl){
          targetStatusEl.innerText = res.mergeReason ? '已合併/儲存' : '已儲存';
          targetStatusEl.className = 'dictStatus saved';
        }

        tr.remove();
        removeDuplicateDictRowsForItem(mergedItem, existingTargetRow);
        moveDictRowToTop(existingTargetRow);
        flashDictRow(existingTargetRow);

        if(shouldReloadAfterSave){
          await reloadDictListAfterDataChange(
            '已儲存並重新讀取主檔，掃描記憶已清空',
            '儲存完成',
            'success'
          );
        } else {
          finishDictLocalChange(
            '已儲存；因仍有未儲存新增列，暫不重新讀取主檔',
            '儲存完成',
            'success'
          );
        }
        return;
      }

      applyDressingItemToDictRow(tr, savedItem);
      updateDressingMasterCacheItem(savedItem);
      removeDuplicateDictRowsForItem(savedItem, tr);

      statusEl.innerText = res.mergeReason ? '已合併/儲存' : '已儲存';
      statusEl.className = 'dictStatus saved';

      setDictRowSnapshot(tr);
      delete tr.dataset.frontOnly;
      leaveDictEditMode(tr);

      if(shouldReloadAfterSave){
        await reloadDictListAfterDataChange(
          '資料已儲存並重新讀取主檔，掃描記憶已清空',
          '儲存完成',
          'success'
        );
      } else {
        finishDictLocalChange(
          '已儲存；因仍有未儲存新增列，暫不重新讀取主檔',
          '儲存完成',
          'success'
        );
      }
      return;
    }

    statusEl.innerText = (res && res.message) || '儲存失敗';
    statusEl.className = 'dictStatus error';
    showNotice((res && res.message) || '儲存失敗', 'error', '儲存失敗');

  } catch(err){
    statusEl.innerText = '儲存錯誤';
    statusEl.className = 'dictStatus error';
    showNotice('儲存錯誤：' + (err.message || err), 'error', '儲存錯誤');
    console.log(err);
  }

  btn.disabled = false;
  updateDictMainButton(tr);
  setDictTableMode(getDictNextIdleMode());
}

function buildDictSavePayloadFromRow(tr){
  const data = getDictRowData(tr);
  const originalData = getOriginalDictRowData(tr) || {};

  return {
    data:data,
    originalData:originalData,
    payload:{
      originalGtin: originalData.singleGtin || originalData.gtin || '',
      originalBoxGtin: originalData.boxGtin || '',
      hospitalCode: data.hospitalCode || '',
      singleGtin: data.singleGtin || '',
      gtin: data.singleGtin || '',
      dressingName: data.dressingName || '',
      size: data.size || '',
      category: data.category || '',
      boxGtin: data.boxGtin || '',
      boxQuantity: data.boxQuantity || '',
      status: data.status || '使用中'
    }
  };
}

async function saveDictRowWithoutReload(tr){
  const built = buildDictSavePayloadFromRow(tr);
  const data = built.data;
  const originalData = built.originalData;
  const payload = built.payload;
  const statusEl = tr.querySelector('.dictStatus');
  const mainBtn = tr.querySelector('.edit-main-btn');

  const hasKeyField =
    data.hospitalCode ||
    data.singleGtin ||
    data.boxGtin;

  if(!hasKeyField){
    if(statusEl){
      statusEl.innerText = '院內碼、單包GTIN、包裝GTIN至少填一項';
      statusEl.className = 'dictStatus error';
    }

    return {
      ok:false,
      skipped:false,
      message:'院內碼、單包GTIN、包裝GTIN至少填一項'
    };
  }

  if(statusEl){
    statusEl.innerText = '批次儲存中...';
    statusEl.className = 'dictStatus';
  }

  if(mainBtn){
    mainBtn.disabled = true;
    mainBtn.innerText = '...';
  }

  let conflict = { conflict:false };

  try{
    conflict = await checkBarcodeConflictBeforeSave(data, originalData);
  } catch(error){
    console.log('批次儲存前查重失敗，繼續交由後端判斷', error);
  }

  if(conflict && conflict.conflict){
    if(statusEl){
      statusEl.innerText = '已存在，未儲存';
      statusEl.className = 'dictStatus error';
    }

    if(mainBtn){
      mainBtn.disabled = false;
      updateDictMainButton(tr);
    }

    return {
      ok:false,
      skipped:false,
      message:conflict.message || '此資料已存在'
    };
  }

  try{
    const res = await saveBarcode(payload);

    if(res && res.ok){
      tr.dataset.rowKey =
        data.hospitalCode ||
        data.singleGtin ||
        data.boxGtin ||
        '';

      if(statusEl){
        statusEl.innerText = res.mergeReason ? '已合併/儲存' : '已儲存';
        statusEl.className = 'dictStatus saved';
      }

      setDictRowSnapshot(tr);
      delete tr.dataset.frontOnly;
      leaveDictEditMode(tr);

      return {
        ok:true,
        skipped:false,
        response:res
      };
    }

    if(statusEl){
      statusEl.innerText = (res && res.message) || '儲存失敗';
      statusEl.className = 'dictStatus error';
    }

    return {
      ok:false,
      skipped:false,
      message:(res && res.message) || '儲存失敗'
    };

  } catch(err){
    if(statusEl){
      statusEl.innerText = '儲存錯誤';
      statusEl.className = 'dictStatus error';
    }

    console.log(err);

    return {
      ok:false,
      skipped:false,
      message:err && err.message ? err.message : String(err)
    };
  } finally {
    if(mainBtn){
      mainBtn.disabled = false;
      updateDictMainButton(tr);
    }
  }
}

async function batchSaveDict(){
  if(isDictTableBusy()){
    return;
  }

  const editingRows = Array.from(document.querySelectorAll('#dictTbody tr.editing'));

  if(editingRows.length === 0){
    showNotice('目前沒有需要處理的項目', 'warning');
    return;
  }

  const dirtyRows = editingRows.filter(function(tr){
    return isDictRowDirty(tr);
  });

  const cleanRows = editingRows.filter(function(tr){
    return !isDictRowDirty(tr);
  });

  if(dirtyRows.length === 0){
    cleanRows.forEach(function(tr){
      restoreDictRowSnapshot(tr);
      leaveDictEditMode(tr);
      const statusEl = tr.querySelector('.dictStatus');
      if(statusEl){
        statusEl.innerText = '已返回';
        statusEl.className = 'dictStatus saved';
      }
    });

    showNotice('沒有變更需要儲存', 'warning');
    return;
  }

  const btn = document.getElementById('batchSaveBtn');
  const originalText = btn ? btn.innerText : '';

  setDictTableMode('saving', '批次儲存中...');

  if(btn){
    btn.innerText = '批次儲存中...';
    btn.disabled = true;
  }

  const batchPayload = dirtyRows.map(function(tr){
    return buildDictSavePayloadFromRow(tr).payload;
  });

  debugDressingBarcode('batch-save-payload', batchPayload);

  let successCount = 0;
  let failCount = 0;
  let returnedCount = 0;
  const errors = [];

  for(const tr of cleanRows){
    restoreDictRowSnapshot(tr);
    leaveDictEditMode(tr);
    const statusEl = tr.querySelector('.dictStatus');
    if(statusEl){
      statusEl.innerText = '已返回';
      statusEl.className = 'dictStatus saved';
    }
    returnedCount++;
  }

  for(const tr of dirtyRows){
    const result = await saveDictRowWithoutReload(tr);

    if(result && result.ok){
      successCount++;
    } else {
      failCount++;
      if(result && result.message){
        errors.push(result.message);
      }
    }
  }

  if(btn){
    btn.innerText = originalText;
    btn.disabled = false;
  }

  setDictTableMode(getDictNextIdleMode());

  const messages = [];
  if(successCount > 0) messages.push('儲存：' + successCount + ' 筆');
  if(returnedCount > 0) messages.push('未變更返回：' + returnedCount + ' 筆');
  if(failCount > 0) messages.push('失敗：' + failCount + ' 筆');

  showNotice(
    '批次處理完成！\n' + messages.join('\n') +
      (errors.length ? '\n\n第一筆錯誤：' + errors[0] : ''),
    failCount ? 'warning' : 'success'
  );

  if(successCount > 0 && failCount === 0){
    await reloadDictListAfterDataChange(
      '批次儲存完成，已重新讀取主檔並清空掃描記憶。',
      '批次儲存完成',
      'success'
    );
  }
}


function removeDressingItemFromCache(data){
  data = data || {};

  const targetHospitalCode = String(data.hospitalCode || '').trim();
  const targetSingleGtin = data.singleGtin || data.gtin || '';
  const targetBoxGtin = data.boxGtin || '';
  const targetName = normalizeTextForCompare(data.dressingName || '');
  const targetSize = normalizeTextForCompare(data.size || '');

  if(!Array.isArray(dressingMasterCache)){
    dressingMasterCache = [];
    return;
  }

  dressingMasterCache = dressingMasterCache.filter(function(item){
    item = item || {};

    const itemHospitalCode = String(item.hospitalCode || '').trim();
    const itemSingleGtin = item.singleGtin || item.gtin || '';
    const itemBoxGtin = item.boxGtin || '';

    const sameHospitalCode =
      targetHospitalCode &&
      itemHospitalCode &&
      targetHospitalCode === itemHospitalCode;

    const sameSingleGtin =
      targetSingleGtin &&
      sameGtin(itemSingleGtin, targetSingleGtin);

    const sameBoxGtin =
      targetBoxGtin &&
      sameGtin(itemBoxGtin, targetBoxGtin);

    const sameNameSizeFallback =
      !targetHospitalCode &&
      !targetSingleGtin &&
      !targetBoxGtin &&
      targetName &&
      targetSize &&
      normalizeTextForCompare(item.dressingName || '') === targetName &&
      normalizeTextForCompare(item.size || '') === targetSize;

    return !(sameHospitalCode || sameSingleGtin || sameBoxGtin || sameNameSizeFallback);
  });
}

async function deleteDictRow(btn){
  if(isDictTableBusy()){
    return;
  }

  const tr = btn.closest('tr');
  const isFrontOnlyRow =
    tr.dataset.frontOnly === '1' ||
    tr.dataset.isNewRow === '1' ||
    String(btn.innerText || '').trim() === '不儲存';

  // 編輯狀態下，右邊按鈕不是刪除，而是「取消編輯」。
  // 但前端暫存列的右邊按鈕是「不儲存」，必須只刪前端，不能 reload。
  if(tr.classList.contains('editing') && !isFrontOnlyRow){
    restoreDictRowSnapshot(tr);
    leaveDictEditMode(tr);

    const statusEl = tr.querySelector('.dictStatus');
    if(statusEl){
      statusEl.innerText = '已取消編輯';
      statusEl.className = 'dictStatus saved';
    }

    showNotice('已取消編輯，尚未刪除資料', 'success', '取消編輯');
    return;
  }

  const confirmDelete = await showConfirmDialog(
    '確定要刪除這一列嗎？\n\n若後端已有資料，會同步刪除主檔；若尚未儲存，只會移除前端這一列。',
    '刪除確認'
  );

  if(!confirmDelete){
    showNotice('已取消刪除', 'warning', '刪除取消');
    return;
  }

  const data = getDictRowData(tr);
  const key = data.singleGtin || data.boxGtin || data.hospitalCode;

  function removeUnsavedFrontEndRow(message, title){
    /*
      未儲存的新列只存在前端，按「不儲存」時不能 reload 主檔，
      也不能改 dressingMasterCache，否則批次新增時其他暫存列可能被誤清。
      同時清掉該列的掃描記憶，避免下一次掃同 GTIN 又回到已取消的暫存列。
    */
    markDictScanCancelledForRow(tr);
    forgetDictScanMemoryForRow(tr);
    tr.remove();
    ensureDictEmptyRow();
    syncDictTableModeFromRows();
    updateBatchSaveButtonVisibility();

    showNotice(
      message || '已移除未儲存的新列，其他新增列已保留',
      'success',
      title || '不儲存'
    );
  }

  async function removeFrontEndRowAndReload(message, title){
    removeDressingItemFromCache(data);
    tr.remove();
    ensureDictEmptyRow();

    await reloadDictListAfterDataChange(
      message || '已移除前端列，並重新讀取主檔',
      title || '移除完成',
      'success'
    );
  }

  // 前端暫存列尚未進後端：只刪前端列，不 reload，避免批次新增被洗掉。
  if(isFrontOnlyRow){
    removeUnsavedFrontEndRow('已移除未儲存的新列，其他新增列已保留', '不儲存');
    return;
  }

  // 沒有任何可用 key：一定還沒進後端，直接刪前端列，不 reload。
  if(!key){
    removeUnsavedFrontEndRow('此列沒有院內碼/GTIN，已直接移除前端列，其他新增列已保留', '前端移除');
    return;
  }

  setDictTableMode('deleting', '刪除中...');
  btn.disabled = true;
  btn.innerText = '刪除中...';

  try{
    /*
      刪除邏輯簡化：
      1. 交給後端 deleteBarcode 比對主檔是否存在。
      2. 後端有找到：刪除後端資料，前端列也移除。
      3. 後端找不到：代表只是前端暫存/未儲存列，直接移除前端列。
    */
    const res = await deleteBarcode(key, data.hospitalCode);

    if(res && res.ok && res.deleted){
      if(hasPendingLocalRows(tr)){
        removeDressingItemFromCache(data);
        tr.remove();
        finishDictLocalChange('後端主檔已刪除；因仍有未完成編輯或新增列，暫不重新讀取主檔', '刪除完成', 'success');
      } else {
        await removeFrontEndRowAndReload('後端主檔已刪除，已重新讀取主檔並清空掃描記憶', '刪除完成');
      }
      return;
    }

    if(res && res.ok && !res.deleted){
      if(hasPendingLocalRows(tr)){
        tr.remove();
        finishDictLocalChange('後端沒有這筆資料，已直接移除前端列；其他未完成編輯或新增列已保留', '前端移除', 'success');
      } else {
        await removeFrontEndRowAndReload('後端沒有這筆資料，已直接移除前端列並清空掃描記憶', '前端移除');
      }
      return;
    }

    showNotice('刪除失敗：' + ((res && res.message) || '未知錯誤'), 'error', '刪除失敗');

  } catch(err){
    showNotice('刪除錯誤：' + (err.message || err), 'error', '刪除錯誤');
  }

  btn.disabled = false;
  updateDictSecondaryButton(tr);
  setDictTableMode(getDictNextIdleMode());
}

function ensureOptionContainsCurrentValue(values, currentValue){
  const list = Array.isArray(values) ? values.slice() : [];
  const current = String(currentValue || '').trim();

  if(!current){
    return list;
  }

  const currentKey = normalizeTextForCompare(current);
  const exists = list.some(function(item){
    return normalizeTextForCompare(item) === currentKey;
  });

  if(!exists){
    list.unshift(current);
  }

  return list;
}
async function pickValueByPrompt(title, values, defaultValue){
  values = ensureOptionContainsCurrentValue(values || [], defaultValue);

  if(!values || values.length === 0){
    const val = await openAppDialog({
      title: title,
      message: '目前沒有既有選項，請直接輸入：',
      input: true,
      defaultValue: defaultValue || '',
      okText: '確定',
      cancelText: '取消'
    });
    return (val === null || val === false) ? null : String(val).trim();
  }

  while(true){
    const choices = values.map(function(v){ return { label: v, value: v }; });
    choices.push({ label: '➕ 自行輸入...', value: '__MANUAL_INPUT__' });

    const choice = await openAppDialog({
      title: title,
      message: '請選擇現有項目，或點擊最下方「自行輸入...」：',
      input: false,
      choices: choices,
      cancelText: '取消'
    });

    if(choice === null || choice === false){
      return null;
    }

    if(choice === '__MANUAL_INPUT__'){
      const manualVal = await openAppDialog({
        title: title + ' (自行輸入)',
        message: '請輸入內容：',
        input: true,
        defaultValue: defaultValue || '',
        okText: '確定',
        cancelText: '返回選項'
      });

      if(manualVal === null || manualVal === false){
        continue;
      }
      return String(manualVal).trim();
    }

    return choice;
  }
}

function findExistingItemByGtin(gtin){

function rememberDictScanForRow(tr, gtin, target){
  if(!tr || !gtin || (target !== 'single' && target !== 'box')){
    return;
  }

  const key = normalizeGtinForCompare(gtin);
  if(!key){
    return;
  }

  if(!dictScanMemory || typeof dictScanMemory !== 'object'){
    dictScanMemory = {};
  }

  dictScanMemory[key] = {
    gtin: gtin,
    target: target,
    data: getDictRowData(tr)
  };
}

function rememberDictRowBeforeRemove(tr){
  if(!tr){
    return;
  }

  const single = getRowInputValue(tr, '.dict-single-gtin');
  const box = getRowInputValue(tr, '.dict-box-gtin');

  if(single){
    rememberDictScanForRow(tr, single, 'single');
  }

  if(box){
    rememberDictScanForRow(tr, box, 'box');
  }

  const map = getRowScannedGtinMap(tr);
  Object.keys(map || {}).forEach(function(key){
    const target = map[key];
    if(target === 'single' || target === 'box'){
      rememberDictScanForRow(tr, key, target);
    }
  });
}

function clearDictScanMemory(){
  dictScanMemory = {};
  cancelledDictScanKeys = {};

  document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)').forEach(function(tr){
    delete tr.dataset.scannedGtin;
    delete tr.dataset.gtinTarget;
    delete tr.dataset.scannedGtinMap;
  });
}


function forgetDictScanMemoryByGtin(gtin){
  const key = normalizeGtinForCompare(gtin);
  if(key && dictScanMemory && dictScanMemory[key]){
    delete dictScanMemory[key];
  }
}

function markDictScanCancelledByGtin(gtin){
  const key = normalizeGtinForCompare(gtin);
  if(!key){
    return;
  }

  if(!cancelledDictScanKeys || typeof cancelledDictScanKeys !== 'object'){
    cancelledDictScanKeys = {};
  }

  cancelledDictScanKeys[key] = true;
}

function markDictScanCancelledForRow(tr){
  if(!tr){
    return;
  }

  markDictScanCancelledByGtin(tr.dataset.scannedGtin || '');
  markDictScanCancelledByGtin(tr.dataset.rowKey || '');
  markDictScanCancelledByGtin(getRowInputValue(tr, '.dict-single-gtin'));
  markDictScanCancelledByGtin(getRowInputValue(tr, '.dict-box-gtin'));

  const map = getRowScannedGtinMap(tr);
  Object.keys(map || {}).forEach(function(gtin){
    markDictScanCancelledByGtin(gtin);
  });
}

function clearDictScanCancelledByGtin(gtin){
  const key = normalizeGtinForCompare(gtin);
  if(key && cancelledDictScanKeys && cancelledDictScanKeys[key]){
    delete cancelledDictScanKeys[key];
  }
}

function isDictScanCancelled(gtin){
  const key = normalizeGtinForCompare(gtin);
  return !!(key && cancelledDictScanKeys && cancelledDictScanKeys[key]);
}

function forgetDictScanMemoryForRow(tr){
  if(!tr){
    return;
  }

  forgetDictScanMemoryByGtin(tr.dataset.scannedGtin || '');
  forgetDictScanMemoryByGtin(tr.dataset.rowKey || '');
  forgetDictScanMemoryByGtin(getRowInputValue(tr, '.dict-single-gtin'));
  forgetDictScanMemoryByGtin(getRowInputValue(tr, '.dict-box-gtin'));

  const map = getRowScannedGtinMap(tr);
  Object.keys(map || {}).forEach(function(gtin){
    forgetDictScanMemoryByGtin(gtin);
  });

  delete tr.dataset.scannedGtin;
  delete tr.dataset.gtinTarget;
  delete tr.dataset.scannedGtinMap;
}

function removePendingDictScanRow(tr, gtin, message, title){
  /*
    掃描新增流程中途取消時，這列只存在前端，不能 reload 主檔。
    同時必須清掉掃描記憶，否則下次掃同一個 GTIN 會回到已取消的舊暫存列。
  */
  markDictScanCancelledByGtin(gtin);
  markDictScanCancelledForRow(tr);
  forgetDictScanMemoryByGtin(gtin);
  forgetDictScanMemoryForRow(tr);

  if(tr && tr.parentNode){
    tr.remove();
  }

  activeDictGtinInput = null;
  ensureDictEmptyRow();
  syncDictTableModeFromRows();
  updateBatchSaveButtonVisibility();

  if(message !== false){
    showNotice(
      message || '已取消本次掃描建檔流程，暫存列已移除',
      'warning',
      title || '已取消'
    );
  }
}

function getRememberedDictScan(gtin){
  const key = normalizeGtinForCompare(gtin);
  if(!key || !dictScanMemory || !dictScanMemory[key]){
    return null;
  }

  return dictScanMemory[key];
}

function recreateRememberedScanRow(gtin, parsed){
  const memory = getRememberedDictScan(gtin);
  if(!memory || !memory.data){
    return null;
  }

  const data = Object.assign({}, memory.data);
  const target = memory.target === 'box' ? 'box' : 'single';

  if(target === 'box'){
    data.boxGtin = gtin;
  } else {
    data.singleGtin = gtin;
    data.gtin = gtin;
  }

  const emptyRow = document.getElementById('dictEmptyRow');
  if(emptyRow){
    emptyRow.remove();
  }

  const tr = createDictRow(data, true);
  tr.dataset.scannedGtin = gtin;
  tr.dataset.rowKey = data.singleGtin || data.boxGtin || data.hospitalCode || gtin;
  setRowScannedGtinTarget(tr, gtin, target);

  moveDictRowToTop(tr);
  setDictInputsEnabled(tr, true);
  bindDictRowDirtyWatch(tr);
  updateDictMainButton(tr);

  const statusEl = tr.querySelector('.dictStatus');
  if(statusEl){
    statusEl.innerText = target === 'box'
      ? '已從本輪掃描記憶補回盒裝GTIN，請確認後儲存'
      : '已從本輪掃描記憶補回單包GTIN，請確認後儲存';
    statusEl.className = 'dictStatus';
  }

  showNotice(
    target === 'box' ? '已補回盒裝GTIN' : '已補回單包GTIN',
    'success',
    '已補回條碼'
  );

  flashDictRow(tr);
  return tr;
}

function getRowScannedGtinMap(tr){
  if(!tr){
    return {};
  }

  try{
    return JSON.parse(tr.dataset.scannedGtinMap || '{}') || {};
  } catch(error){
    return {};
  }
}

function setRowScannedGtinTarget(tr, gtin, target){
  if(!tr || !gtin || (target !== 'single' && target !== 'box')){
    return;
  }

  const key = normalizeGtinForCompare(gtin);
  if(!key){
    return;
  }

  const map = getRowScannedGtinMap(tr);
  map[key] = target;
  tr.dataset.scannedGtinMap = JSON.stringify(map);
  tr.dataset.scannedGtin = gtin;
  tr.dataset.gtinTarget = target;
  rememberDictScanForRow(tr, gtin, target);
}

function getRowRememberedGtinTarget(tr, gtin){
  if(!tr || !gtin){
    return '';
  }

  const key = normalizeGtinForCompare(gtin);
  const map = getRowScannedGtinMap(tr);

  if(key && map[key]){
    return map[key];
  }

  if(sameGtin(tr.dataset.scannedGtin || '', gtin)){
    const target = String(tr.dataset.gtinTarget || '').trim();
    if(target === 'single' || target === 'box'){
      return target;
    }
  }

  const memory = getRememberedDictScan(gtin);
  if(memory && (memory.target === 'single' || memory.target === 'box')){
    return memory.target;
  }

  return '';
}

function rowHasRememberedGtin(tr, gtin){
  const key = normalizeGtinForCompare(gtin);
  if(!tr || !key){
    return false;
  }

  const map = getRowScannedGtinMap(tr);
  return !!map[key] || sameGtin(tr.dataset.scannedGtin || '', gtin) || sameGtin(tr.dataset.rowKey || '', gtin);
}

function findExistingRowByGtin(gtin){
  const rows = Array.from(document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)'));

  const actualRow = rows.find(function(tr){
    return sameGtin(getRowInputValue(tr, '.dict-single-gtin'), gtin) ||
      sameGtin(getRowInputValue(tr, '.dict-box-gtin'), gtin);
  });

  if(actualRow){
    return actualRow;
  }

  // 如果剛剛使用者對這個掃描碼按過「不儲存」或取消流程，
  // 下一次掃同碼必須重新開始，不可以靠舊 scannedGtinMap / scan memory 跳回舊列。
  if(isDictScanCancelled(gtin)){
    return null;
  }

  return rows.find(function(tr){
    return rowHasRememberedGtin(tr, gtin);
  });
}
function describeDressingItem(item){
  item = item || {};
  const name = item.dressingName || '未命名敷料';
  const size = item.size ? ' ' + item.size : '';
  return name + size;
}
function applyExistingItemToRow(tr, item, keepScannedAs){
  const scannedGtin = getScannedGtinFromRow(tr);

  tr.querySelector('.dict-hospital-code').value = item.hospitalCode || '';
  tr.querySelector('.dict-name').value = item.dressingName || '';
  tr.querySelector('.dict-size').value = item.size || '';
  tr.querySelector('.dict-category').value = item.category || '';
  tr.querySelector('.dict-status').value = item.status || '使用中';

  if(keepScannedAs === 'single'){
    tr.querySelector('.dict-single-gtin').value = scannedGtin;
    tr.querySelector('.dict-box-gtin').value = item.boxGtin || '';
  }

  if(keepScannedAs === 'box'){
    tr.querySelector('.dict-single-gtin').value = item.singleGtin || item.gtin || '';
    tr.querySelector('.dict-box-gtin').value = scannedGtin;
  }

  tr.querySelector('.dict-box-qty').value =
    item.boxQuantity || tr.querySelector('.dict-box-qty').value || '';

  setRowScannedGtinTarget(tr, scannedGtin, keepScannedAs);

  tr.dataset.rowKey =
    tr.querySelector('.dict-single-gtin').value ||
    tr.querySelector('.dict-box-gtin').value ||
    scannedGtin;
}

async function promptDictRowValue(row, selector, stepNumber, stepTitle, promptMessage){

async function guideDictRowAfterScan(tr, forcedTarget){
  const scannedGtin = getScannedGtinFromRow(tr);
  if(!scannedGtin){
    showNotice('這列沒有可指定的掃描GTIN', 'warning');
    return false;
  }

  tr.classList.add('editing');
  setDictInputsEnabled(tr, true);

  let target = forcedTarget || '';
  if(!target){
    const choice = await openAppDialog({
      title: '步驟 1：條碼類型',
      message: '請選擇這次掃到的條碼類型：',
      input: false,
      choices: [
        { label: '單包條碼', value: '1' },
        { label: '盒裝條碼', value: '2' }
      ],
      cancelText: '取消'
    });

    if(choice === null || choice === false){
      return false;
    }

    target = String(choice).trim() === '2' ? 'box' : 'single';
  }

  tr.dataset.gtinTarget = target;
  setRowScannedGtinTarget(tr, scannedGtin, target);

  if(target === 'single'){
    const singleInput = tr.querySelector('.dict-single-gtin');
    const boxInput = tr.querySelector('.dict-box-gtin');

    if(singleInput){
      singleInput.value = scannedGtin;
    }

    if(boxInput){
      boxInput.value = boxInput.value || '';
    }
  }

  if(target === 'box'){
    const boxInput = tr.querySelector('.dict-box-gtin');
    const singleInput = tr.querySelector('.dict-single-gtin');

    if(boxInput){
      boxInput.value = scannedGtin;
    }

    if(singleInput){
      singleInput.value = singleInput.value || '';
    }
  }

  const allItems = getExistingDressingItems();
  const currentNameValue = tr.querySelector('.dict-name').value || '';
  const names = ensureOptionContainsCurrentValue(
    Array.from(new Set(
      allItems.map(function(item){
        return String(item.dressingName || '').trim();
      }).filter(Boolean)
    )).sort(),
    currentNameValue
  );

  const name = await pickValueByPrompt(
    '步驟 2：請選擇或輸入敷料名稱',
    names,
    currentNameValue
  );

  if(name === null){
    updateDictMainButton(tr);
    return false;
  }

  tr.querySelector('.dict-name').value = name;

  const currentSizeValue = tr.querySelector('.dict-size').value || '';
  const sizesForName = ensureOptionContainsCurrentValue(
    Array.from(new Set(
      allItems
        .filter(function(item){
          return normalizeTextForCompare(item.dressingName) === normalizeTextForCompare(name);
        })
        .map(function(item){
          return String(item.size || '').trim();
        })
        .filter(Boolean)
    )).sort(),
    currentSizeValue
  );

  const size = await pickValueByPrompt(
    '步驟 3：請選擇或輸入規格描述',
    sizesForName,
    currentSizeValue
  );

  if(size === null){
    updateDictMainButton(tr);
    return false;
  }

  tr.querySelector('.dict-size').value = size;

  const existingItem = findExistingItemByNameAndSize(name, size);

  if(existingItem){
    const existingRow = findExistingRowByNameAndSize(name, size, tr);

    if(existingRow){
      const originalBeforePatch = getDictRowData(existingRow);
      const hadOriginalData = !!existingRow.dataset.originalData;
      const wasEditingBeforeScan = existingRow.classList.contains('editing');

      function rollbackExistingRowAfterCanceledScan(){
        applyDressingItemToDictRow(existingRow, originalBeforePatch);
        forgetDictScanMemoryByGtin(scannedGtin);
        delete existingRow.dataset.scannedGtin;
        delete existingRow.dataset.gtinTarget;
        delete existingRow.dataset.scannedGtinMap;

        if(!hadOriginalData){
          delete existingRow.dataset.originalData;
        }

        if(!wasEditingBeforeScan){
          leaveDictEditMode(existingRow);
        } else {
          updateDictMainButton(existingRow);
          syncDictTableModeFromRows();
        }
      }

      existingRow.classList.add('editing');
      setDictInputsEnabled(existingRow, true);
      bindDictRowDirtyWatch(existingRow);

      // 保留最一開始「後端已儲存狀態」的快照。
      // 如果這列已經有未儲存變更，後續再掃另一個條碼時，不能把未儲存狀態改寫成新的原始值。
      if(!hadOriginalData){
        existingRow.dataset.originalData = JSON.stringify(originalBeforePatch);
      }

      delete existingRow.dataset.isNewRow;

      if(target === 'single'){
        const input = existingRow.querySelector('.dict-single-gtin');
        if(input){
          input.disabled = false;
          input.value = scannedGtin;
          input.dispatchEvent(new Event('input', { bubbles:true }));

      const hospitalCodeInput = existingRow.querySelector('.dict-hospital-code');

      if(price === null){
        rollbackExistingRowAfterCanceledScan();
        return false;
      }

      setRowScannedGtinTarget(existingRow, scannedGtin, target);
      existingRow.dataset.rowKey =
        getRowInputValue(existingRow, '.dict-single-gtin') ||
        getRowInputValue(existingRow, '.dict-box-gtin') ||
        getRowInputValue(existingRow, '.dict-hospital-code') ||

      const statusEl = existingRow.querySelector('.dictStatus');

function flashDictRow(tr){

function reapplyScannedGtinToExistingRow(tr, scannedGtin, parsed){
  if(!tr || !scannedGtin){
    return false;
  }

  moveDictRowToTop(tr);

  const data = getDictRowData(tr);
  const alreadyHasGtin =
    sameGtin(data.singleGtin, scannedGtin) ||
    sameGtin(data.boxGtin, scannedGtin);

  if(alreadyHasGtin){
    return false;
  }

  tr.classList.add('editing');
  setDictInputsEnabled(tr, true);
  bindDictRowDirtyWatch(tr);

  const rememberedTarget = getRowRememberedGtinTarget(tr, scannedGtin);
  let target = rememberedTarget;

  if(target !== 'single' && target !== 'box'){
    if(!data.singleGtin){
      target = 'single';
    } else if(!data.boxGtin){
      target = 'box';
    } else {
      target = 'single';
    }
  }

  const selector =
    target === 'box'
      ? '.dict-box-gtin'
      : '.dict-single-gtin';

  const input = tr.querySelector(selector);
  if(!input){
    return false;
  }

  input.disabled = false;
  input.value = scannedGtin;
  input.dataset.raw = parsed && parsed.raw ? parsed.raw : scannedGtin;
  input.dataset.lot = parsed && parsed.lot ? parsed.lot : '';
  input.dataset.exp = parsed && parsed.exp ? parsed.exp : '';
  input.dispatchEvent(new Event('input', { bubbles:true }));
  input.dispatchEvent(new Event('change', { bubbles:true }));

  setRowScannedGtinTarget(tr, scannedGtin, target);
  tr.dataset.rowKey =
    getRowInputValue(tr, '.dict-single-gtin') ||
    getRowInputValue(tr, '.dict-box-gtin') ||
    getRowInputValue(tr, '.dict-hospital-code') ||
    scannedGtin;

  updateDictMainButton(tr);

  const statusEl = tr.querySelector('.dictStatus');
  if(statusEl){
    statusEl.innerText =
      target === 'box'
        ? '已將剛剛刪掉的盒裝GTIN加回，請確認後儲存'
        : '已將剛剛刪掉的單包GTIN加回，請確認後儲存';
    statusEl.className = 'dictStatus';
  }

  showNotice(
    target === 'box' ? '盒裝GTIN已加回此列' : '單包GTIN已加回此列',
    'success',
    '已補回條碼'
  );

  flashDictRow(tr);
  return true;
}

async function addDictRow(barcode, parsed){
  const emptyRow = document.getElementById('dictEmptyRow');
  if(emptyRow) emptyRow.remove();

  const scannedGtin = String(barcode || '').trim();

  const existingRow = findExistingRowByGtin(scannedGtin);
  if(existingRow){
    moveDictRowToTop(existingRow);
    const reapplied = reapplyScannedGtinToExistingRow(existingRow, scannedGtin, parsed);
    if(!reapplied){
      const data = getDictRowData(existingRow);
      showNotice('', 'warning', describeDressingItem(data));
      flashDictRow(existingRow);
      if(!existingRow.classList.contains('editing')){
        const editBtn = existingRow.querySelector('.edit-main-btn');
        if(editBtn) handleDictMainButton(editBtn);
      }
    }
    return;
  }

  const rememberedRow = recreateRememberedScanRow(scannedGtin, parsed);
  if(rememberedRow){
    return;
  }

  const localExistingItem = findExistingItemByGtin(scannedGtin);
  if(localExistingItem){
    const target = sameGtin(localExistingItem.boxGtin || '', scannedGtin) ? 'box' : 'single';
    let tr = findExistingRowByItem(localExistingItem, null);

    if(!tr){
      tr = createDictRow(localExistingItem, false);
      const tbody = document.getElementById('dictTbody');
      if(tbody){
        tbody.appendChild(tr);
      }
    }

    setRowScannedGtinTarget(tr, scannedGtin, target);
    moveDictRowToTop(tr);

    if(!tr.classList.contains('editing')){
      tr.classList.add('editing');
      setDictInputsEnabled(tr, true);
      bindDictRowDirtyWatch(tr);
      updateDictMainButton(tr);
    }

    reapplyScannedGtinToExistingRow(tr, scannedGtin, parsed);
    removeDuplicateDictRowsForItem(localExistingItem, tr);
    showNotice('', 'success', describeDressingItem(localExistingItem));
    return;
  }

  // 走到這裡代表要重新建立一列；清掉取消標記，讓這一輪新的暫存列可以正常記憶。
  clearDictScanCancelledByGtin(scannedGtin);

  const scanMeta =
    `<div class="scanMeta">掃描GTIN：${escapeHtml(scannedGtin)}${parsed && parsed.lot ? '<br>批號：' + escapeHtml(parsed.lot) : ''}${parsed && parsed.exp ? '<br>效期：' + escapeHtml(parsed.exp) : ''}</div>`;

  const tr = createDictRow({
    hospitalCode:'',
    dressingName:'',
    size:'',
    singleGtin:'',
    gtin:'',
    boxGtin:'',
    boxQuantity:'',
    category:'',
    status:'使用中',
    scanMeta:scanMeta
  }, true);

  tr.dataset.scannedGtin = scannedGtin;
  tr.dataset.rowKey = scannedGtin;

  moveDictRowToTop(tr);

  tr.querySelector('.dictStatus').innerText = '本機主檔未找到，開始引導建檔';
  tr.querySelector('.dictStatus').className = 'dictStatus';

  showNotice('', 'info', '新敷料');

  const completed = await guideDictRowAfterScan(tr);
  if(completed === false){
    removePendingDictScanRow(
      tr,
      scannedGtin,
      '已取消本次掃描建檔流程，其他未儲存列已保留',
      '掃描取消'
    );
  }
}

/* 排序 */
function toggleReorderMode(){
  if(isDictTableBusy()){
    return;
  }

  if(hasDictEditingRows()){
    showNotice('請先儲存、返回或取消編輯，再更改排序', 'warning', '尚有未儲存變更');
    return;
  }

  if(isReorderMode){
    cancelReorderMode();
    return;
  }

  const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
  if(rows.length === 0) return;

  isReorderMode = true;
  setDictTableMode('reordering', '排序模式中；拖曳完成後按儲存排序');
  initialOrder = Array.from(rows).map(r => getDictRowKey(r));

  document.getElementById('dictTable').classList.add('reorder-mode');
  document.getElementById('reorderBtn').innerText = '返回';
  document.getElementById('saveOrderBtn').style.display = 'none';
  document.getElementById('batchSaveBtn').style.display = 'none';

  renderDictTableControls();

  rows.forEach(row => {
    row.setAttribute('draggable','true');
    row.addEventListener('dragstart', handleDragStart);
    row.addEventListener('dragend', handleDragEnd);
    row.addEventListener('dragover', handleDragOver);
    row.addEventListener('drop', handleDrop);
    row.addEventListener('touchstart', handleTouchStart, { passive:false });
    row.addEventListener('touchmove', handleTouchMove, { passive:false });
    row.addEventListener('touchend', handleTouchEnd);
  });
}

function cancelReorderMode(){
  isReorderMode = false;
  document.getElementById('dictTable').classList.remove('reorder-mode');
  document.getElementById('reorderBtn').innerText = '更改排序';
  document.getElementById('saveOrderBtn').style.display = 'none';
  updateBatchSaveButtonVisibility();

  const tbody = document.getElementById('dictTbody');
  const rows = Array.from(tbody.querySelectorAll('tr:not(#dictEmptyRow)'));

  rows.forEach(row => {
    row.removeAttribute('draggable');
    row.removeEventListener('dragstart', handleDragStart);
    row.removeEventListener('dragend', handleDragEnd);
    row.removeEventListener('dragover', handleDragOver);
    row.removeEventListener('drop', handleDrop);
    row.removeEventListener('touchstart', handleTouchStart);
    row.removeEventListener('touchmove', handleTouchMove);
    row.removeEventListener('touchend', handleTouchEnd);
  });

  rows.sort((a,b) => initialOrder.indexOf(getDictRowKey(a)) - initialOrder.indexOf(getDictRowKey(b)));
  rows.forEach(r => tbody.appendChild(r));
  syncDictTableModeFromRows();
}

function checkOrderChanged(){
  const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
  const currentOrder = Array.from(rows).map(r => getDictRowKey(r));
  const changed = JSON.stringify(currentOrder) !== JSON.stringify(initialOrder);
  document.getElementById('saveOrderBtn').style.display = changed ? 'inline-block' : 'none';
  renderDictTableControls();
}

function handleDragStart(e){
  draggedRow = this;
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', getDictRowKey(this));
  }
  setTimeout(() => this.classList.add('dragging'), 0);
}

function handleDragEnd(){
  this.classList.remove('dragging');
  draggedRow = null;
  document.querySelectorAll('#dictTbody tr').forEach(r => r.classList.remove('drag-over','drag-over-bottom'));
}

function handleDragOver(e){
  e.preventDefault();
  if(!draggedRow || this === draggedRow) return false;

  const rect = this.getBoundingClientRect();
  const midpoint = rect.top + rect.height / 2;

  this.classList.remove('drag-over','drag-over-bottom');
  if(e.clientY < midpoint){
    this.classList.add('drag-over');
  } else {
    this.classList.add('drag-over-bottom');
  }
  return false;
}

function handleDrop(e){
  e.preventDefault();
  if(!draggedRow || this === draggedRow) return false;

  this.classList.remove('drag-over','drag-over-bottom');

  const rect = this.getBoundingClientRect();
  const midpoint = rect.top + rect.height / 2;

  if(e.clientY < midpoint){
    this.parentNode.insertBefore(draggedRow, this);
  } else {
    this.parentNode.insertBefore(draggedRow, this.nextSibling);
  }

  checkOrderChanged();
  return false;
}

function handleTouchStart(e){
  if(!e.target.classList.contains('dragHandle')) return;
  draggedRow = this;
  this.classList.add('dragging');
}

function handleTouchMove(e){
  if(!draggedRow || draggedRow !== this) return;
  e.preventDefault();

  const touch = e.touches[0];
  const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
  if(!targetElement) return;

  const targetRow = targetElement.closest('tr');
  if(!targetRow || targetRow === draggedRow || targetRow.id === 'dictEmptyRow' || targetRow.parentNode !== draggedRow.parentNode) return;

  const rect = targetRow.getBoundingClientRect();
  const midpoint = rect.top + rect.height / 2;

  targetRow.parentNode.insertBefore(draggedRow, touch.clientY < midpoint ? targetRow : targetRow.nextSibling);
}

function handleTouchEnd(){
  if(!draggedRow) return;
  this.classList.remove('dragging');
  draggedRow = null;
  checkOrderChanged();
}

async function saveDictOrder(){
  if(isDictTableBusy()){
    return;
  }

  const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
  const barcodes = Array.from(rows).map(tr => getDictRowKey(tr)).filter(Boolean);
  if(barcodes.length === 0) return;

  const btn = document.getElementById('saveOrderBtn');
  setDictTableMode('saving', '排序儲存中...');
  btn.innerText = '儲存中...';
  btn.disabled = true;

  try{
    const res = await reorderBarcode(barcodes.join(','));
    if(res.ok){
      isReorderMode = false;
      btn.style.display = 'none';
      document.getElementById('reorderBtn').innerText = '更改排序';
      updateBatchSaveButtonVisibility();
      document.getElementById('dictTable').classList.remove('reorder-mode');
      invalidateDressingMasterCache('order saved');
      await loadDictList();
    } else {
      showNotice('排序儲存失敗', 'error');
    }
  } catch(err){
    showNotice('儲存錯誤：' + err.message, 'error');
  }

  btn.innerText = '儲存排序';
  btn.disabled = false;
  setDictTableMode(getDictNextIdleMode());
}

function openDressingScanner(button){
  scannerMode = 'row';
  activeDressingInput = button.closest('td').querySelector('.dressingName');
  document.getElementById('scannerOverlay').style.display = 'block';
  startDressingScanner();
}

function startDressingScanner(){
  if(dressingScanner){
    return;
  }

  dressingScanner = new Html5Qrcode('scannerReader');

  const config = {
    fps:10,
    qrbox:{ width:260, height:180 },
    formatsToSupport:[
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E
    ]
  };

  dressingScanner
    .start(
      { facingMode:{ exact:'environment' } },
      config,
      function(decodedText){
        handleBarcodeScanResult(decodedText);
        closeDressingScanner();
      },
      function(errorMessage){}
    )
    .catch(function(err){
      console.log(err);
      showNotice('無法開啟相機，請確認手機瀏覽器已允許相機權限', 'error');
    });
}

function closeDressingScanner(){
  document.getElementById('scannerOverlay').style.display = 'none';

  if(dressingScanner){
    dressingScanner
      .stop()
      .then(function(){
        dressingScanner.clear();
        dressingScanner = null;
      })
      .catch(function(err){
        console.log(err);
        dressingScanner = null;
      });
  }
}

async function handleBarcodeScanResult(barcode){
  const parsed = parseUDI(barcode);
  const gtin = parsed.gtin || '';

  if(!gtin){
    showNotice(
      '掃描內容無法提取有效 GTIN。請確認掃到的是含 AI(01) 的 UDI/GS1 條碼，或是 8/12/13/14 碼純數字條碼。',
      'warning',
      '無法提取GTIN'
    );
    activeDictGtinInput = null;
    return;
  }

  if(scannerMode === 'row'){
    if(activeDressingInput){
      activeDressingInput.value = gtin;
      activeDressingInput.dataset.gtin = gtin;
      activeDressingInput.dataset.lot = parsed.lot || '';
      activeDressingInput.dataset.exp = parsed.exp || '';
      activeDressingInput.dataset.raw = parsed.raw || barcode;
      activeDressingInput.dataset.packageType = '';
      activeDressingInput.dataset.unitQuantity = '1';

      try{
        const res = await lookupBarcode(gtin);
        if(res.found && res.data.dressingName){
          const sizeText = res.data.size ? ` ${res.data.size}` : '';
          const packageText = res.packageType === 'box' ? '（盒裝）' : '';
          activeDressingInput.value = `${res.data.dressingName}${sizeText}${packageText}`;
          activeDressingInput.dataset.packageType = res.packageType || '';
          activeDressingInput.dataset.unitQuantity = String(res.unitQuantity || 1);
          activeDressingInput.title =
            `GTIN: ${gtin}\n包裝: ${res.packageType || ''}\n數量: ${res.unitQuantity || 1}\nLOT: ${parsed.lot || ''}\nEXP: ${parsed.exp || ''}`;

          const row = activeDressingInput.closest('tr');
          const qtyInput = row ? row.querySelector('.quantity') : null;
          if(qtyInput && res.packageType === 'box'){
            qtyInput.value = res.unitQuantity || res.data.boxQuantity || 1;
          }
        }
      } catch(e){
        console.log('查詢失敗', e);
      }
    }
    return;
  }

  if(scannerMode === 'dictField'){
    if(activeDictGtinInput){
      const tr = activeDictGtinInput.closest('tr');

      activeDictGtinInput.disabled = false;
      activeDictGtinInput.value = gtin;
      activeDictGtinInput.dataset.raw = parsed.raw || barcode;
      activeDictGtinInput.dataset.lot = parsed.lot || '';
      activeDictGtinInput.dataset.exp = parsed.exp || '';
      activeDictGtinInput.dispatchEvent(new Event('input', { bubbles:true }));
      activeDictGtinInput.dispatchEvent(new Event('change', { bubbles:true }));

      if(tr){
        moveDictRowToTop(tr);

        const fieldTarget = activeDictGtinInput.classList.contains('dict-box-gtin') ? 'box' : 'single';
        setRowScannedGtinTarget(tr, gtin, fieldTarget);

        tr.dataset.rowKey =
          getRowInputValue(tr, '.dict-single-gtin') ||
          getRowInputValue(tr, '.dict-box-gtin') ||
          getRowInputValue(tr, '.dict-hospital-code') ||
          gtin;

        updateDictMainButton(tr);

        const statusEl = tr.querySelector('.dictStatus');
        if(statusEl){
          statusEl.innerText = '已掃描GTIN，請確認後儲存';
          statusEl.className = 'dictStatus';
        }
      }

      showNotice('GTIN 已填入欄位', 'success', gtin);
    }

    activeDictGtinInput = null;
    return;
  }

  if(scannerMode === 'dict'){
    await addDictRow(gtin, parsed);
  }
}

function parseUDI(barcode){
  const raw = String(barcode || '');
  const GS = String.fromCharCode(29);

  let text = raw.replace(/[()]/g, '').trim();
  let gtin = '';
  let lot = '';
  let exp = '';

  function formatExp(yymmdd){
    if(!yymmdd || yymmdd.length !== 6) return '';
    return `20${yymmdd.substring(0,2)}-${yymmdd.substring(2,4)}-${yymmdd.substring(4,6)}`;
  }

  let i = 0;

  while(i < text.length){
    const ai2 = text.substring(i, i + 2);

    if(ai2 === '01' && i + 16 <= text.length){
      gtin = text.substring(i + 2, i + 16);
      i += 16;
      continue;
    }

    if(ai2 === '17' && i + 8 <= text.length){
      exp = formatExp(text.substring(i + 2, i + 8));
      i += 8;
      continue;
    }

    if(ai2 === '10' && i + 2 <= text.length){
      const start = i + 2;
      let end = text.indexOf(GS, start);

      if(end === -1){
        const nextAiMatch = text.substring(start).match(/(17\d{6}|21[A-Za-z0-9]{1,20}|30\d{1,8})/);
        end = nextAiMatch && nextAiMatch.index > 0
          ? start + nextAiMatch.index
          : text.length;
      }

      lot = text.substring(start, end);
      i = end;
      continue;
    }

    i++;
  }

  if(!gtin){
    const plainDigits =
      raw
        .replace(/[\x00-\x1F\x7F]/g, '')
        .replace(/\s+/g, '')
        .trim();

    if(/^\d{8}$/.test(plainDigits) ||
       /^\d{12}$/.test(plainDigits) ||
       /^\d{13}$/.test(plainDigits) ||
       /^\d{14}$/.test(plainDigits)){
      gtin = plainDigits;
    }
  }

  return {
    raw:raw,
    gtin:gtin,
    lot:lot,
    exp:exp,
    extracted:!!gtin
  };
}

function callDressingBarcodeApi(params){
  return jsonpDressingBarcode(params);
}

function jsonpDressingBarcode(params){
  return new Promise(function(resolve, reject){
    const callbackName =
      '__dressingBarcodeCallback_' +
      Date.now() +
      '_' +
      Math.random().toString(36).slice(2);

    const query = new URLSearchParams();

    Object.keys(params).forEach(function(key){
      if(params[key] !== undefined && params[key] !== null){
        query.set(key, params[key]);
      }
    });

    query.set('callback', callbackName);

    const script = document.createElement('script');

    const timer = setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時，請檢查部署網址或 Sheet 權限'));
    }, 15000);

    window[callbackName] = function(result){
      debugDressingBarcode('response', result);
      cleanup();

      if(!result || typeof result !== 'object'){
        reject(new Error('API 回傳格式錯誤'));
        return;
      }

      resolve(result);
    };

    script.onerror = function(){
      debugDressingBarcode('script-error', { url:script.src, callback:callbackName });
      cleanup();
      reject(new Error('API 載入失敗，請檢查部署網址或 Apps Script 權限'));
    };

    script.src = APP_ENTRY_URL + '?' + query.toString();
    debugDressingBarcode('request', { url:script.src, params:params, callback:callbackName });
    document.head.appendChild(script);

    function cleanup(){
      clearTimeout(timer);
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }

      try{
        delete window[callbackName];
      } catch(error){
        window[callbackName] = undefined;
      }
    }
  });
}

function isDressingBarcodeDebugMode(){
  return /(?:\?|&)debug=1(?:&|$)/.test(window.location.search || '');
}

function debugDressingBarcode(label, data){
  if(!isDressingBarcodeDebugMode()) return;
  console.log('[DressingBarcode]', label, data);
  debugger;
}
