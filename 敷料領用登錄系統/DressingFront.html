<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --line:#dbe4ef;
  --text:#172033;
  --muted:#64748b;
  --primary:#2563eb;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  min-height:100%;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body{
  padding:118px 24px 82px;
  overflow-x:hidden;
}

.shell{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}

.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.pageMapCurrent{ color:var(--text); }

.eyebrow{
  margin:0 0 10px;
  color:#1d4ed8;
  font-size:13px;
  font-weight:800;
}

h1{
  margin:0;
  font-size:clamp(28px,4vw,42px);
  line-height:1.18;
}

.pageLead{
  margin:12px 0 0;
  color:#475569;
  font-size:16px;
  line-height:1.7;
}

.moduleTabs{
  display:flex;
  gap:12px;
  margin-top:24px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.moduleTab{
  border:1px solid var(--line);
  background:#fff;
  color:#334155;
  border-radius:10px;
  padding:12px 24px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(15,23,42,.05);
}

.moduleTab:hover{
  border-color:#93c5fd;
  color:#1d4ed8;
}

.moduleTab.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
  box-shadow:0 10px 24px rgba(37,99,235,.18);
}

.moduleHost{
  margin-top:10px;
}

.moduleArea{
  display:none;
}

.placeholderCard{
  width:100%;
  background:var(--card);
  padding:28px;
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.placeholderTitle{
  margin:0 0 8px;
  font-size:22px;
  font-weight:800;
}

.placeholderText{
  margin:0;
  color:var(--muted);
  line-height:1.7;
}

@media(max-width:760px){
  body{
    padding:104px 12px 72px;
  }

  .moduleTabs{
    gap:8px;
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:4px;
  }

  .moduleTab{
    flex:0 0 auto;
    padding:10px 16px;
    font-size:15px;
  }
}
</style>

<script>
let APP_ENTRY_URL = '<?= appEntryUrl ?>';

if (APP_ENTRY_URL.includes('<' + '?=') || APP_ENTRY_URL.trim() === '') {
  APP_ENTRY_URL = 'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';
}

let AJAX_MODULE_STATE = {
  current:'',
  dictLoadedOnce:false
};

function goHome(){
  window.top.location.href = APP_ENTRY_URL;
}

async function showModule(name){
  document.querySelectorAll('.moduleArea').forEach(function(el){
    el.style.display = 'none';
  });

  document.querySelectorAll('.moduleTab').forEach(function(btn){
    btn.classList.remove('active');
  });

  const target = document.getElementById(name + 'Area');
  const btn = document.querySelector('[data-module-button="' + name + '"]');

  if(btn){
    btn.classList.add('active');
  }

  if(target){
    target.style.display = 'block';
  }

  AJAX_MODULE_STATE.current = name;

  if(name === 'dict' && typeof loadDictList === 'function'){
    if(!AJAX_MODULE_STATE.dictLoadedOnce){
      AJAX_MODULE_STATE.dictLoadedOnce = true;
      await loadDictList();
    }
  }
}

function reloadCurrentModule(){
  if(AJAX_MODULE_STATE.current === 'dict' && typeof loadDictList === 'function'){
    return loadDictList();
  }
}
</script>
</head>

<body>
<main class="shell">
