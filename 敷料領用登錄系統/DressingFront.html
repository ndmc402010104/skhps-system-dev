<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>敷料領用</title>

<style>

body{
margin:0;
padding:24px;
background:#f7f8fb;
font-family:Arial,"Noto Sans TC";
}

.card{
max-width:1400px;
margin:auto;
background:white;
padding:28px;
border-radius:18px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

button{
padding:8px 14px;
font-size:15px;
cursor:pointer;
border-radius:8px;
border:1px solid #bbb;
}

.primary{
background:#2563eb;
color:white;
border:none;
}

.danger{
background:#fee2e2;
color:#991b1b;
}

#formArea{
display:none;
margin-top:20px;
}

.infoRow{
margin-bottom:12px;
}

.infoRow label{
display:inline-block;
width:130px;
font-weight:bold;
}

input{
padding:7px;
border:1px solid #aaa;
border-radius:6px;
box-sizing:border-box;
}

.patientBlock{
margin-top:20px;
padding:18px;
background:#f8fafc;
border-radius:14px;
}

.patientTitle{
font-size:20px;
font-weight:bold;
margin-bottom:14px;
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
margin-top:14px;
}

th{
background:#e2e8f0;
}

th,
td{
border:1px solid #aaa;
padding:10px;
vertical-align:middle;
}

th:nth-child(1),
td:nth-child(1){
width:70px;
text-align:center;
}

th:nth-child(2),
td:nth-child(2){
width:170px;
}

th:nth-child(3),
td:nth-child(3){
width:340px;
}

th:nth-child(4),
td:nth-child(4){
width:100px;
}

th:nth-child(5),
td:nth-child(5){
width:180px;
}

th:nth-child(6),
td:nth-child(6){
width:220px;
}

input:not([type="radio"]){
width:100%;
}

.radioGroup{
display:flex;
align-items:center;
gap:14px;
padding-left:6px;
}

.radioGroup label{
display:flex;
align-items:center;
gap:6px;
margin:0;
white-space:nowrap;
}

.radioGroup input{
margin:0;
}

.quantity{
width:100%;
}

.actions{
margin-top:14px;
display:flex;
gap:10px;
}

</style>

</head>

<body>

<div class="card">

<h1>敷料領用</h1>

<button
class="primary"
onclick="startUse()">

開始領用

</button>

<div id="formArea">

<div class="infoRow">
<label>領用日期與時間：</label>
<input id="useDateTime" readonly>
</div>

<div class="infoRow">
<label>領用人：</label>
<input id="userName">
</div>

<div class="infoRow">
<label>領用單位：</label>
<input id="unitName">
</div>

<div id="patientArea"></div>

<div class="actions">

<button onclick="addPatientBlock()">
下一個病人
</button>

<button
class="primary"
onclick="submitUse()">

送出

</button>

</div>

</div>

</div>

<script>

let patientCount=0;

function startUse(){

document
.getElementById(
'formArea'
)
.style.display='block';

document
.getElementById(
'useDateTime'
)
.value=
new Date()
.toLocaleString(
'zh-TW'
);

if(
patientCount===0
){

addPatientBlock();

}

}



function addPatientBlock(){

patientCount++;

const block=
document.createElement(
'div'
);

block.className=
'patientBlock';

block.innerHTML=

`
<div class="patientTitle">

病人 ${patientCount}

</div>

<div class="infoRow">

<label>

病歷號：

</label>

<input class="patientId">

</div>

<table>

<thead>

<tr>

<th>操作</th>
<th>計價狀態</th>
<th>敷料名稱</th>
<th>數量</th>
<th>支付類別</th>
<th>主治醫師</th>

</tr>

</thead>

<tbody class="dressingRows">

${createRow()}

</tbody>

</table>

<div class="actions">

<button onclick="addRow(this)">
新增一列
</button>

<button
class="
danger
deletePatient">

刪除病人

</button>

</div>

`;

document
.getElementById(
'patientArea'
)
.appendChild(
block
);

refreshPatientTitle();

}



function createRow(){

const id=
Date.now()
+
'_'
+
Math.random();

return `

<tr>

<td>

<button
class="
danger
deleteRow">

刪除

</button>

</td>


<td>

<div class="radioGroup">

<label>

<input
type="radio"
name="charge_${id}"
value="已計價">

已計價

</label>

<label>

<input
type="radio"
name="charge_${id}"
checked
value="未計價">

未計價

</label>

</div>

</td>


<td>

<input
class="dressingName">

</td>


<td>

<input
class="quantity"
type="number"
value="1"
min="1">

</td>


<td>

<div class="radioGroup">

<label>

<input
type="radio"
name="pay_${id}"
value="健保">

健保

</label>

<label>

<input
type="radio"
name="pay_${id}"
checked
value="自費">

自費

</label>

</div>

</td>


<td>

<input
class="doctorName">

</td>

</tr>

`;

}



function addRow(button){

button
.closest(
'.patientBlock'
)
.querySelector(
'.dressingRows'
)
.insertAdjacentHTML(
'beforeend',
createRow()
);

}



document
.addEventListener(
'click',

function(e){

if(
e.target
.classList
.contains(
'deleteRow'
)
){

const tbody=
e.target.closest(
'tbody'
);

if(
tbody.rows.length<=1
){

alert(
'至少保留一列'
);

return;

}

e.target
.closest(
'tr'
)
.remove();

}



if(
e.target
.classList
.contains(
'deletePatient'
)
){

if(
document
.querySelectorAll(
'.patientBlock'
)
.length<=1
){

alert(
'至少保留一位病人'
);

return;

}

e.target
.closest(
'.patientBlock'
)
.remove();

refreshPatientTitle();

}

}

);



function refreshPatientTitle(){

document
.querySelectorAll(
'.patientTitle'
)
.forEach(

function(
el,
i
){

el.innerText=
'病人 '
+
(
i+1
);

}

);

}



function submitUse(){

alert(
'下一步接 Sheet'
);

}

</script>

<?!= versionBadgeHtml ?>

</body>

</html>
