<script>
    let patientCount = 0;
    let dressingScanner = null;
    let activeDressingInput = null;
    let scannerMode = '';
    let isReorderMode = false;
    let initialOrder = [];

    function isAppsScriptMode(){

    return typeof google !== 'undefined'
    && google.script
    && google.script.run;

    }

    function openDressingDict(){
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('dictArea').style.display = 'block';
    loadDictList();
    }

    async function loadDictList() {
    isReorderMode = false;
    document.getElementById('dictTable').classList.remove('reorder-mode');
    document.getElementById('reorderBtn').innerText = '更改排序';
    document.getElementById('saveOrderBtn').style.display = 'none';

    const tbody = document.getElementById('dictTbody');
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#64748b; padding:20px;">載入中...</td></tr>';
    
    try {
    const res = await listBarcode();
    if (res.ok && res.data && res.data.length > 0) {
    tbody.innerHTML = '';
    res.data.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
    <td><input class="dict-barcode readonly" value="${item.barcode}" readonly></td>
    <td><input class="dict-name" value="${item.dressingName}"></td>
    <td><input class="dict-size" value="${item.size || ''}"></td>
    <td><span class="dictStatus saved">已建檔</span></td>
    <td style="white-space:nowrap;">
    <span class="dragHandle">☰</span>
    <button type="button" class="dictActionBtn edit-btn" onclick="editDictRow(this)">編輯</button>
    <button type="button" class="dictActionBtn save-btn primary" style="display:none;" onclick="saveDictRow(this)">儲存</button>
    <button type="button" class="dictActionBtn danger" onclick="deleteDictRow(this)">刪除</button>
    </td>
    `;
    tbody.appendChild(tr);
    });
    } else {
    tbody.innerHTML = '<tr id="dictEmptyRow"><td colspan="5" style="text-align:center; color:#64748b; padding:20px;">目前尚無任何敷料資料</td></tr>';
    }
    } catch (err) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#dc2626; padding:20px;">讀取失敗：' + (err.message || err) + '</td></tr>';
    }
    }

    let draggedRow = null;
    function toggleReorderMode() {
        if (isReorderMode) {
            cancelReorderMode();
            return;
        }

        const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
        if (rows.length === 0) return;
        
        isReorderMode = true;
        initialOrder = Array.from(rows).map(r => r.querySelector('.dict-barcode').value);

        document.getElementById('dictTable').classList.add('reorder-mode');
        document.getElementById('reorderBtn').innerText = '返回';
        document.getElementById('saveOrderBtn').style.display = 'none';
        document.getElementById('batchSaveBtn').style.display = 'none';
        
        rows.forEach(row => {
            row.setAttribute('draggable', 'true');
            row.addEventListener('dragstart', handleDragStart);
            row.addEventListener('dragend', handleDragEnd);
            row.addEventListener('dragover', handleDragOver);
            row.addEventListener('drop', handleDrop);
        });
    }

    function cancelReorderMode() {
        isReorderMode = false;
        document.getElementById('dictTable').classList.remove('reorder-mode');
        document.getElementById('reorderBtn').innerText = '更改排序';
        document.getElementById('saveOrderBtn').style.display = 'none';
        document.getElementById('batchSaveBtn').style.display = 'inline-block';

        const tbody = document.getElementById('dictTbody');
        const rows = Array.from(tbody.querySelectorAll('tr:not(#dictEmptyRow)'));
        
        rows.forEach(row => {
            row.removeAttribute('draggable');
            row.removeEventListener('dragstart', handleDragStart);
            row.removeEventListener('dragend', handleDragEnd);
            row.removeEventListener('dragover', handleDragOver);
            row.removeEventListener('drop', handleDrop);
        });

        rows.sort((a, b) => {
            const aVal = a.querySelector('.dict-barcode').value;
            const bVal = b.querySelector('.dict-barcode').value;
            return initialOrder.indexOf(aVal) - initialOrder.indexOf(bVal);
        });

        rows.forEach(r => tbody.appendChild(r));
    }

    function checkOrderChanged() {
        const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
        const currentOrder = Array.from(rows).map(r => r.querySelector('.dict-barcode').value);
        
        let changed = false;
        if (currentOrder.length !== initialOrder.length) {
            changed = true;
        } else {
            for(let i=0; i<initialOrder.length; i++) {
                if (initialOrder[i] !== currentOrder[i]) {
                    changed = true;
                    break;
                }
            }
        }

        if (changed) {
            document.getElementById('saveOrderBtn').style.display = 'inline-block';
        } else {
            document.getElementById('saveOrderBtn').style.display = 'none';
        }
    }

    function handleDragStart(e) {
        draggedRow = this;
        if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.querySelector('.dict-barcode').value);
        }
        setTimeout(() => this.classList.add('dragging'), 0);
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        draggedRow = null;
        document.querySelectorAll('#dictTbody tr').forEach(r => r.classList.remove('drag-over', 'drag-over-bottom'));
    }

    function handleDragOver(e) {
        e.preventDefault();
        if (!draggedRow || this === draggedRow) return false;
        
        const rect = this.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;

        this.classList.remove('drag-over', 'drag-over-bottom');
        if (e.clientY < midpoint) {
            this.classList.add('drag-over');
        } else {
            this.classList.add('drag-over-bottom');
        }
        return false;
    }

    function handleDrop(e) {
        e.preventDefault();
        if (!draggedRow || this === draggedRow) return false;

        this.classList.remove('drag-over', 'drag-over-bottom');

        const rect = this.getBoundingClientRect();
        const midpoint = rect.top + rect.height / 2;

        if (e.clientY < midpoint) {
            this.parentNode.insertBefore(draggedRow, this);
        } else {
            this.parentNode.insertBefore(draggedRow, this.nextSibling);
        }
        
        checkOrderChanged();

        return false;
    }

    async function saveDictOrder() {
    const rows = document.querySelectorAll('#dictTbody tr:not(#dictEmptyRow)');
    const barcodes = [];
    
    rows.forEach(tr => {
    const input = tr.querySelector('.dict-barcode');
    if (input && input.value) {
    barcodes.push(input.value);
    }
    });
    
    if (barcodes.length === 0) return;

    const btn = document.getElementById('saveOrderBtn');
    btn.innerText = '儲存中...';
    btn.disabled = true;

    try {
    const res = await reorderBarcode(barcodes.join(','));
    if (res.ok) {
    isReorderMode = false;
    btn.style.display = 'none';
    document.getElementById('reorderBtn').innerText = '更改排序';
    document.getElementById('batchSaveBtn').style.display = 'inline-block';
    document.getElementById('dictTable').classList.remove('reorder-mode');
    
    rows.forEach(r => {
        r.removeAttribute('draggable');
        r.removeEventListener('dragstart', handleDragStart);
        r.removeEventListener('dragend', handleDragEnd);
        r.removeEventListener('dragover', handleDragOver);
        r.removeEventListener('drop', handleDrop);
    });
    } else {
    alert('排序儲存失敗');
    }
    } catch (err) {
    alert('儲存錯誤：' + err.message);
    }
    
    btn.innerText = '儲存排序';
    btn.disabled = false;
    }

    function editDictRow(btn) {
    const tr = btn.closest('tr');
    tr.classList.add('editing');
    tr.querySelector('.edit-btn').style.display = 'none';
    tr.querySelector('.save-btn').style.display = 'inline-block';
    tr.querySelector('.dict-name').focus();
    }

    async function saveDictRow(btn) {
    const tr = btn.closest('tr');
    const barcode = tr.querySelector('.dict-barcode').value.trim();
    const name = tr.querySelector('.dict-name').value.trim();
    const size = tr.querySelector('.dict-size').value.trim();
    const statusEl = tr.querySelector('.dictStatus');

    if (!name) {
    statusEl.innerText = '缺少名稱';
    statusEl.className = 'dictStatus error';
    return;
    }

    statusEl.innerText = '儲存中...';
    statusEl.className = 'dictStatus';
    btn.disabled = true;
    btn.innerText = '...';

    try {
    const res = await saveBarcode({ barcode: barcode, dressingName: name, size: size });
    if (res.ok) {
    statusEl.innerText = '已儲存';
    statusEl.className = 'dictStatus saved';
    tr.classList.remove('editing');
    tr.querySelector('.save-btn').style.display = 'none';
    tr.querySelector('.edit-btn').style.display = 'inline-block';
    } else {
    statusEl.innerText = '儲存失敗';
    statusEl.className = 'dictStatus error';
    }
    } catch(err) {
    statusEl.innerText = '儲存錯誤';
    statusEl.className = 'dictStatus error';
    }

    btn.disabled = false;
    btn.innerText = '儲存';
    }

    async function batchSaveDict() {
    const editingRows = document.querySelectorAll('#dictTbody tr.editing');
    if (editingRows.length === 0) {
    alert('目前沒有需要儲存的項目（請先修改或新增敷料）');
    return;
    }

    const btn = document.getElementById('batchSaveBtn');
    const originalText = btn.innerText;
    btn.innerText = '批次處理中...';
    btn.disabled = true;

    let successCount = 0;
    let failCount = 0;

    // 依序執行，避免同時寫入導致 Google Sheet 衝突
    for (const tr of editingRows) {
    const saveBtn = tr.querySelector('.save-btn');
    if (saveBtn) {
    await saveDictRow(saveBtn);
    if (!tr.classList.contains('editing')) {
    successCount++;
    } else {
    failCount++;
    }
    }
    }

    btn.innerText = originalText;
    btn.disabled = false;

    if (failCount > 0) {
    alert(`批次儲存完成！\n成功：${successCount} 筆\n失敗：${failCount} 筆\n\n（可能有部分名稱未填寫或網路錯誤）`);
    } else {
    alert(`批次儲存成功！共更新 ${successCount} 筆項目。`);
    }
    }

    async function deleteDictRow(btn) {
    if (confirm('確定要移除此列嗎？')) {
    const tr = btn.closest('tr');
    const barcodeInput = tr.querySelector('.dict-barcode');

    if (!barcodeInput) {
    tr.remove();
    return;
    }

    const barcode = barcodeInput.value.trim();
    if (!barcode) {
    tr.remove();
    return;
    }

    btn.disabled = true;
    btn.innerText = '刪除中...';

    try {
    const res = await deleteBarcode(barcode);
    if (res.ok) {
    tr.remove();
    const tbody = document.getElementById('dictTbody');
    if (tbody.querySelectorAll('tr').length === 0) {
    tbody.innerHTML = '<tr id="dictEmptyRow"><td colspan="5" style="text-align:center; color:#64748b; padding:20px;">尚未掃描任何條碼，請點擊上方開啟掃描</td></tr>';
    }
    } else {
    alert('刪除失敗：' + (res.message || '未知錯誤'));
    btn.disabled = false;
    btn.innerText = '刪除';
    }
    } catch (err) {
    alert('刪除錯誤：' + err.message);
    btn.disabled = false;
    btn.innerText = '刪除';
    }
    }
    }

    function startDictScanner() {
    scannerMode = 'dict';
    document.getElementById('scannerOverlay').style.display = 'block';
    startDressingScanner();
    }

    async function manualDictScan() {
    const barcode = document.getElementById('dictManualInput').value.trim();
    if(!barcode) return;
    document.getElementById('dictManualInput').value = '';
    scannerMode = 'dict';
    await handleBarcodeScanResult(barcode);
    }

    async function addDictRow(barcode) {
    const emptyRow = document.getElementById('dictEmptyRow');
    if (emptyRow) emptyRow.remove();

    const existingInput = document.querySelector(`input.dict-barcode[value="${barcode}"]`);
    if (existingInput) {
    alert('此條碼已在清單中');
    existingInput.closest('tr').querySelector('.dict-name').focus();
    return;
    }

    const tr = document.createElement('tr');
    tr.classList.add('editing'); // 預設新掃描的進入編輯模式
    tr.innerHTML = `
    <td><input class="dict-barcode readonly" value="${barcode}" readonly></td>
    <td><input class="dict-name" placeholder="請輸入名稱"></td>
    <td><input class="dict-size" placeholder="請輸入尺寸"></td>
    <td><span class="dictStatus">查詢中...</span></td>
    <td style="white-space:nowrap;">
    <span class="dragHandle">☰</span>
    <button type="button" class="dictActionBtn edit-btn" style="display:none;" onclick="editDictRow(this)">編輯</button>
    <button type="button" class="dictActionBtn save-btn primary" onclick="saveDictRow(this)">儲存</button>
    <button type="button" class="dictActionBtn danger" onclick="deleteDictRow(this)">刪除</button>
    </td>
    `;
    document.getElementById('dictTbody').prepend(tr);

    try {
    const res = await lookupBarcode(barcode);
    if (res.found) {
    tr.querySelector('.dict-name').value = res.data.dressingName || '';
    tr.querySelector('.dict-size').value = res.data.size || '';
    tr.querySelector('.dictStatus').innerText = '已建檔';
    tr.querySelector('.dictStatus').className = 'dictStatus saved';
    
    // 已存在的條碼，自動關閉編輯模式
    tr.classList.remove('editing');
    tr.querySelector('.save-btn').style.display = 'none';
    tr.querySelector('.edit-btn').style.display = 'inline-block';
    } else {
    tr.querySelector('.dictStatus').innerText = '新條碼';
    tr.querySelector('.dictStatus').className = 'dictStatus';
    tr.querySelector('.dict-name').focus();
    }
    } catch (err) {
    tr.querySelector('.dictStatus').innerText = '查詢失敗';
    tr.querySelector('.dictStatus').className = 'dictStatus error';
    tr.querySelector('.dict-name').focus();
    }
    }

    function startUse(){

    document.getElementById('formArea').style.display = 'block';
    document.getElementById('dictArea').style.display = 'none';

    document.getElementById('useDateTime').value =
    new Date().toLocaleString('zh-TW');

    if(patientCount === 0){
    addPatientBlock();
    }

    }

    function addPatientBlock(){

    patientCount++;

    const block = document.createElement('div');
    block.className = 'patientBlock';

    block.innerHTML = `
    <div class="patientTitle">病人 ${patientCount}</div>

    <div class="infoRow">
    <label>病歷號：</label>
    <input class="patientId">
    </div>

    <table>
    <thead>
    <tr>
    <th>操作</th>
    <th>計價狀態</th>
    <th>敷料名稱</th>
    <th>數量</th>
    <th>支付類別</th>
    <th>主治醫師</th>
    </tr>
    </thead>

    <tbody class="dressingRows">
    ${createRow()}
    </tbody>
    </table>

    <div class="actions">
    <button type="button" onclick="addRow(this)">新增一列</button>
    <button type="button" class="danger deletePatient">刪除病人</button>
    </div>
    `;

    function createRow(){

    const id = Date.now() + '_' + Math.random();

    return `
    <tr>

    <td>
    <button type="button" class="danger deleteRow">刪除</button>
    </td>

    <td>
    <div class="radioGroup">
    <label>
    <input type="radio" name="charge_${id}" value="已計價">
    已計價
    </label>
    <label>
    <input type="radio" name="charge_${id}" checked value="未計價">
    未計價
    </label>
    </div>
    </td>

    <td>
    <div class="dressingInputGroup">
    <input class="dressingName">
    <button type="button" class="cameraBtn" onclick="openDressingScanner(this)">📷</button>
    </div>
    </td>

    <td>
    <input class="quantity" type="number" value="1" min="1">
    </td>

    <td>
    <div class="radioGroup">
    <label>
    <input type="radio" name="pay_${id}" value="健保">
    健保
    </label>
    <label>
    <input type="radio" name="pay_${id}" checked value="自費">
    自費
    </label>
    </div>
    </td>

    <td>
    <input class="doctorName">
    </td>

    </tr>
    `;

    }

    function addRow(button){

    button
    .closest('.patientBlock')
    .querySelector('.dressingRows')
    .insertAdjacentHTML('beforeend', createRow());

    }

    function openDressingScanner(button){

    scannerMode = 'row';

    activeDressingInput =
    button.closest('td').querySelector('.dressingName');

    document.getElementById('scannerOverlay').style.display = 'block';

    startDressingScanner();

    }

    function startDressingScanner(){

    if(dressingScanner){
    return;
    }

    dressingScanner =
    new Html5Qrcode('scannerReader');

    const config = {
    fps: 10,
    qrbox: {
    width: 260,
    height: 180
    },
    formatsToSupport: [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E
    ]
    };

    dressingScanner
    .start(
    {
    facingMode: {
    exact: 'environment'
    }
    },
    config,
    function(decodedText){

    handleBarcodeScanResult(decodedText);
    closeDressingScanner();

    },
    function(errorMessage){}
    )
    .catch(function(err){

    console.log(err);

    alert(
    '無法開啟相機，請確認手機瀏覽器已允許相機權限'
    );

    });

    }

    function closeDressingScanner(){

    document.getElementById('scannerOverlay').style.display = 'none';

    if(dressingScanner){

    dressingScanner
    .stop()
    .then(function(){

    dressingScanner.clear();
    dressingScanner = null;

    })
    .catch(function(err){

    console.log(err);
    dressingScanner = null;

    });

    }

    }

    async function handleBarcodeScanResult(barcode){

    if(scannerMode === 'row'){
    if(activeDressingInput){
    activeDressingInput.value = barcode;
    }
    return;
    }

    if(scannerMode === 'dict'){
    await addDictRow(barcode);
    return;
    }

    }

    function lookupBarcode(barcode){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .lookupDressingBarcode(barcode);

    });

    }

    return callDressingBarcodeApi({
    action: 'lookupDressingBarcode',
    barcode: barcode
    });

    }

    function listBarcode(){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .listDressingBarcode();

    });

    }

    return callDressingBarcodeApi({
    action: 'listDressingBarcode'
    });

    }

    function reorderBarcode(barcodes){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .reorderDressingBarcode({ barcodes: barcodes });

    });

    }

    return callDressingBarcodeApi({
    action: 'reorderDressingBarcode',

    });

    }

    function deleteBarcode(barcode){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .deleteDressingBarcode({ barcode: barcode });

    });

    }

    return callDressingBarcodeApi({
    action: 'deleteDressingBarcode',
    barcode: barcode
    });

    }

    function saveBarcode(data){

    if(isAppsScriptMode()){

    return new Promise(function(resolve, reject){

    google.script.run
    .withSuccessHandler(resolve)
    .withFailureHandler(reject)
    .saveDressingBarcode(data);

    });

    }

    return callDressingBarcodeApi({
    action: 'saveDressingBarcode',
    barcode: data.barcode,
    dressingName: data.dressingName,
    size: data.size
    });

    }

    function callDressingBarcodeApi(params){

    return jsonpDressingBarcode(params);

    }

    function jsonpDressingBarcode(params){

    return new Promise(function(resolve, reject){

    const callbackName =
    '__dressingBarcodeCallback_' +
    Date.now() +
    '_' +
    Math.random().toString(36).slice(2);

    const query =
    new URLSearchParams();

    Object.keys(params).forEach(function(key){

    if(params[key] !== undefined && params[key] !== null){
    query.set(key, params[key]);
    }

    });

    query.set('callback', callbackName);

    const script =
    document.createElement('script');

    const timer =
    setTimeout(function(){

    cleanup();
    reject(
    new Error('API 逾時，請檢查部署網址或 Sheet 權限')
    );

    }, 15000);

    window[callbackName] = function(result){

    debugDressingBarcode(
    'response',
    result
    );

    cleanup();

    if(!result || typeof result !== 'object') {
    reject(new Error('API 回傳格式錯誤'));
    return;
    }

    resolve(result);

    };

    script.onerror = function(){

    debugDressingBarcode(
    'script-error',
    {
    url: script.src,
    callback: callbackName
    }
    );

    cleanup();
    reject(
    new Error('API 載入失敗，請檢查部署網址或 Apps Script 權限')
    );

    };

    script.src =
    APP_ENTRY_URL +
    '?' +
    query.toString();

    debugDressingBarcode(
    'request',
    {
    url: script.src,
    params: params,
    callback: callbackName
    }
    );

    document.head.appendChild(script);

    function cleanup(){

    clearTimeout(timer);

    if(script.parentNode){
    script.parentNode.removeChild(script);
    }

    try{
    delete window[callbackName];
    }
    catch(error){
    window[callbackName] = undefined;
    }

    }

    });

    }

    function isDressingBarcodeDebugMode(){

    return /(?:\?|&)debug=1(?:&|$)/.test(
    window.location.search || ''
    );

    }

    function debugDressingBarcode(label, data){

    if(!isDressingBarcodeDebugMode()){
    return;
    }

    console.log('[DressingBarcode]', label, data);
    debugger;

    }

    document.addEventListener('click', function(e){

    if(e.target.classList.contains('deleteRow')){

    const tbody =
    e.target.closest('tbody');

    if(tbody.rows.length <= 1){
    alert('至少保留一列');
    return;
    }

    e.target.closest('tr').remove();

    }

    if(e.target.classList.contains('deletePatient')){

    if(document.querySelectorAll('.patientBlock').length <= 1){
    alert('至少保留一位病人');
    return;
    }

    e.target.closest('.patientBlock').remove();

    refreshPatientTitle();

    }

    });

    function refreshPatientTitle(){

    document
    .querySelectorAll('.patientTitle')
    .forEach(function(el, i){

    el.innerText =
    '病人 ' + (i + 1);

    });

    }

    alert('下一步接 Sheet');

    }
