<script>
  /*
  ========================================
  設定 / 全域狀態
  ========================================
  */

  const APP_ENTRY_URL =
    '<?= appEntryUrl ?>';

  const SIGN_SHEET_URL =
    'https://docs.google.com/spreadsheets/d/184zUBhApg5CJnk7To_6FqlPcV1r-LK1kZUt2yyasD68/edit#gid=1049157062';

  let meetings = [];
  let staffList = [];
  let originalPeopleStatus = [];


  /*
  ========================================
  初始化
  ========================================
  */

  window.addEventListener(
    'DOMContentLoaded',
    initPage
  );

  function initPage(){

    document
      .getElementById('meetingSelect')
      .addEventListener(
        'change',
        handleMeetingChange
      );

    loadStaffList();

  }


  /*
  ========================================
  導覽 / 選取會議
  ========================================
  */

  function goHome(){

    window.top.location.href =
      APP_ENTRY_URL;

  }

  function getSelectedMeeting(){

    const index =
      document
        .getElementById('meetingSelect')
        .value;

    if(index === ''){

      alert('請先選擇會議');

      return null;

    }

    return meetings[index];

  }

  function handleMeetingChange(){

    const item =
      getSelectedMeeting();

    const actionCard =
      document.getElementById('actionCard');

    if(!item){

      actionCard.style.display =
        'none';

      return;

    }

    actionCard.style.display =
      'block';

    loadPeopleStatus(item);

  }


  /*
  ========================================
  載入人員 / 會議
  ========================================
  */

  function loadStaffList(){

    google.script.run

      .withSuccessHandler(function(list){

        staffList =
          list || [];

        renderStaffNameList();

        loadMeetings();

      })

      .withFailureHandler(function(err){

        alert(
          '讀取人員名單失敗：' +
          err.message
        );

      })

      .getDefaultStaffList();

  }

  function renderStaffNameList(){

    const dataList =
      document.getElementById('staffNameList');

    dataList.innerHTML =
      '';

    staffList.forEach(function(person){

      const option =
        document.createElement('option');

      option.value =
        person.name;

      option.label =
        (person.role || '') +
        ' ' +
        (person.emp || '');

      dataList.appendChild(option);

    });

  }

  function loadMeetings(selectedKey){

    google.script.run

      .withSuccessHandler(function(data){

        meetings =
          data || [];

        renderMeetingSelect(
          selectedKey
        );

      })

      .withFailureHandler(function(err){

        alert(
          '讀取會議失敗：' +
          err.message
        );

      })

      .getMeetingList();

  }

  function renderMeetingSelect(selectedKey){

    const select =
      document.getElementById('meetingSelect');

    select.innerHTML =
      '<option value="">請選擇會議</option>';

    meetings.forEach(function(item,index){

      const option =
        document.createElement('option');

      option.value =
        index;

      option.textContent =
        item.label;

      select.appendChild(option);

      if(
        selectedKey &&
        item.key === selectedKey
      ){
        select.value =
          index;
      }

    });

  }


  /*
  ========================================
  跳轉到簽到單編輯+更新簽到上傳
  ========================================
  */

  function openSignEditor(){

    const item =
      getSelectedMeeting();

    if(!item){
      return;
    }

    const btn =
      document.getElementById(
        'signBtn'
      );

    setButtonLoading(
      btn,
      true,
      '準備中...'
    );

    google.script.run

      .withSuccessHandler(function(ok){

        setButtonLoading(
          btn,
          false,
          '📄 跳轉到簽到單編輯'
        );

        if(!ok){

          alert(
            '找不到會議'
          );

          return;

        }

        window.open(
          SIGN_SHEET_URL,
          '_blank'
        );

      })

      .withFailureHandler(function(err){

        setButtonLoading(
          btn,
          false,
          '📄 跳轉到簽到單編輯'
        );

        alert(
          err.message
        );

      })

      .updateSignUploadSheet(

        item.course,

        item.date

      );

  }

  /*
  ========================================
  Excel 匯出
  ========================================
  */

  function downloadRawExcel(){

    exportExcel({
      buttonId: 'rawBtn',
      loadingText: '下載中...',
      idleText: '📥 下載簽到原始檔',
      serverFunction: 'exportRawSignData',
      sheetName: '原始資料'
    });

  }

  function downloadUploadExcel(){

    exportExcel({
      buttonId: 'uploadBtn',
      loadingText: '下載中...',
      idleText: '⬇️ 下載簽到上傳',
      serverFunction: 'exportSignUploadData',
      sheetName: '簽到上傳'
    });

  }

  function exportExcel(config){

    const item =
      getSelectedMeeting();

    if(!item){
      return;
    }

    const btn =
      document.getElementById(
        config.buttonId
      );

    setButtonLoading(
      btn,
      true,
      config.loadingText
    );

    google.script.run

      .withSuccessHandler(function(res){

        try{

          if(!res.ok){

            alert(
              res.message ||
              '產生失敗'
            );

            return;

          }

          writeExcelFile(
            res.values,
            config.sheetName,
            res.filename
          );

        }finally{

          setButtonLoading(
            btn,
            false,
            config.idleText
          );

        }

      })

      .withFailureHandler(function(err){

        setButtonLoading(
          btn,
          false,
          config.idleText
        );

        alert(
          '後端錯誤：' +
          err.message
        );

      })

      [config.serverFunction](
        item.course,
        item.date
      );

  }

  function writeExcelFile(values, sheetName, filename){

    const wb =
      XLSX.utils.book_new();

    const ws =
      XLSX.utils.aoa_to_sheet(values);

    XLSX.utils.book_append_sheet(
      wb,
      ws,
      sheetName
    );

    XLSX.writeFile(
      wb,
      filename
    );

  }


  /*
  ========================================
  人員狀態表格
  ========================================
  */

  function loadPeopleStatus(item){

    const area =
      document.getElementById('statusArea');

    area.style.display =
      'block';

    area.innerHTML =
      renderLoadingHtml(
        '讀取會議人員資料中...'
      );

    google.script.run

      .withSuccessHandler(function(rows){

        if(!rows || rows.length === 0){

          originalPeopleStatus = [];

          area.innerHTML =
            buildPeopleStatusHtml([]);

          return;

        }

        originalPeopleStatus =
          JSON.parse(
            JSON.stringify(rows)
          );

        area.innerHTML =
          buildPeopleStatusHtml(rows);

      })

      .withFailureHandler(function(err){

        area.innerHTML =
          '讀取失敗：' +
          err.message;

      })

      .getMeetingPeopleStatus(
        item.course,
        item.date
      );

  }

  function buildPeopleStatusHtml(rows){

    let html =
      `
      <div class="peopleToolbar">
        <button
          id="peopleEditBtn"
          class="secondaryBtn"
          onclick="togglePeopleEdit()"
        >
          編輯
        </button>
      </div>

      <div class="statusTableWrap">
        <table class="statusTable">
          <thead>
            <tr>
              <th style="width:70px;"></th>
              <th>職級</th>
              <th>姓名</th>
              <th>員工編號</th>
              <th>簽到時間</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="peopleTableBody">
      `;

    rows.forEach(function(row){

      html +=
        buildPeopleRowHtml(row);

    });

    html +=
      `
          </tbody>
        </table>
      </div>

      <button
        id="addPeopleRowBtn"
        class="secondaryBtn"
        style="display:none;margin-top:12px;"
        onclick="addPeopleRow()"
      >
        ＋ 新增一列
      </button>
      `;

    return html;

  }

  function buildPeopleRowHtml(row){

    const deleteButton =
      row.source === 'backend'
      ? `
        <button
          class="deleteRowBtn"
          onclick="deletePeopleRow(this)"
        >
          ✕
        </button>
      `
      : '';

    return `
      <tr>
        <td class="rowDeleteCell">
          ${deleteButton}
        </td>

        <td>
          <input
            class="peopleInput"
            value="${escapeHtml(row.role || '')}"
            disabled
          >
        </td>

        <td>
          <input
            class="peopleInput"
            value="${escapeHtml(row.name || '')}"
            disabled
          >
        </td>

        <td>
          <input
            class="peopleInput"
            value="${escapeHtml(row.emp || '')}"
            disabled
          >
        </td>

        <td>
          <input
            class="peopleInput"
            value="${escapeHtml(row.time || '')}"
            disabled
          >
        </td>

        <td>
          ${buildStatusSelect(row.status)}
        </td>
      </tr>
    `;

  }

  function buildStatusSelect(status){

    const options = [
      '簽到成功',
      '未簽到',
      '未於課程時間內簽到',
      '驗證失敗',
      '請假'
    ];

    let html =
      '<select class="peopleInput" disabled>';

    options.forEach(function(option){

      html +=
        '<option ' +
        (status === option ? 'selected' : '') +
        '>' +
        option +
        '</option>';

    });

    html +=
      '</select>';

    return html;

  }


  /*
  ========================================
  人員編輯
  ========================================
  */

  function togglePeopleEdit(){

    const btn =
      document.getElementById('peopleEditBtn');

    const table =
      document.querySelector('.statusTable');

    const inputs =
      document.querySelectorAll('.peopleInput');

    const addBtn =
      document.getElementById('addPeopleRowBtn');

    const enteringEdit =
      btn.textContent.trim() === '編輯';

    if(enteringEdit){

      table.classList.add('editingPeople');

      inputs.forEach(function(input){
        input.disabled = false;
      });

      addBtn.style.display =
        'block';

      btn.textContent =
        '儲存';

      return;

    }

    saveChangedPeopleStatus();

  }

  function addPeopleRow(){

    const tbody =
      document.getElementById('peopleTableBody');

    const tr =
      document.createElement('tr');

    tr.classList.add('newRow');

    tr.innerHTML =
      `
      <td class="rowDeleteCell">
        <button
          class="deleteRowBtn"
          onclick="deletePeopleRow(this)"
        >
          ✕
        </button>
      </td>

      <td>
        <input
          class="peopleInput"
          placeholder="職級"
        >
      </td>

      <td>
        <input
          class="peopleInput"
          list="staffNameList"
          onchange="fillStaffInfo(this)"
          placeholder="姓名"
        >
      </td>

      <td>
        <input
          class="peopleInput"
          placeholder="員工編號"
        >
      </td>

      <td>
        <input
          class="peopleInput"
          placeholder="簽到時間"
        >
      </td>

      <td>
        <select class="peopleInput">
          <option>簽到成功</option>
          <option>未簽到</option>
          <option>未於課程時間內簽到</option>
          <option>驗證失敗</option>
          <option>請假</option>
        </select>
      </td>
      `;

    tbody.appendChild(tr);

  }

  function deletePeopleRow(button){

    const tr =
      button.closest('tr');

    const inputs =
      tr.querySelectorAll('.peopleInput');

    const marked =
      tr.classList.contains('markedDelete');

    if(marked){

      tr.classList.remove('markedDelete');

      tr.dataset.delete =
        '';

      inputs.forEach(function(input){
        input.disabled = false;
      });

      button.textContent =
        '✕';

      return;

    }

    tr.classList.add('markedDelete');

    tr.dataset.delete =
      '1';

    inputs.forEach(function(input){
      input.disabled = true;
    });

    button.disabled =
      false;

    button.textContent =
      '復原';

  }

  function saveChangedPeopleStatus(){

    const item =
      getSelectedMeeting();

    if(!item){
      return;
    }

    const changed =
      collectChangedPeopleRows();
      
    if(changed.length === 0){

      exitPeopleEditMode();

      return;

    }

    const editBtn =
      document.getElementById(
        'peopleEditBtn'
      );

    setButtonLoading(
      editBtn,
      true,
      '儲存中...'
    );

    setPeopleEditLocked(
      true
    );

    google.script.run

      .withSuccessHandler(function(){

        setPeopleEditLocked(
          false
        );

        setButtonLoading(
          editBtn,
          false,
          '編輯'
        );

        loadMeetings(
          item.key
        );

        loadPeopleStatus(
          item
        );

      })

      .withFailureHandler(function(err){

        setPeopleEditLocked(
          false
        );

        setButtonLoading(
          editBtn,
          false,
          '儲存'
        );

        alert(
          '儲存失敗\n' +
          err.message
        );

      })

      .saveBackendPeopleStatus(
        item.course,
        item.date,
        changed
      );
  }

  function collectChangedPeopleRows(){

    const rows =
      document.querySelectorAll(
        '#peopleTableBody tr'
      );

    const changed =
      [];

    rows.forEach(function(tr,index){

      const inputs =
        tr.querySelectorAll('.peopleInput');

      const old =
        originalPeopleStatus[index];

      const data = {
        originalName:
          old && old.name
          ? old.name
          : '',
        role: inputs[0]?.value?.trim() || '',
        name: inputs[1]?.value?.trim() || '',
        emp: inputs[2]?.value?.trim() || '',
        signTime:
        cleanManualSignTime(
          inputs[3]?.value?.trim() || ''
        ),
        status: inputs[4]?.value || ''
      };

      const isEmptyRow =
        !data.role &&
        !data.name &&
        !data.emp &&
        !data.signTime;

      if(isEmptyRow){

        if(tr.classList.contains('newRow')){
          tr.remove();
        }

        return;

      }

      if(!data.name){
        return;
      }

      if(tr.dataset.delete === '1'){

        changed.push({
          ...data,
          delete: true
        });

        return;

      }

      if(
        tr.classList.contains('newRow') ||
        !old ||
        data.role !== old.role ||
        data.name !== old.name ||
        data.emp !== old.emp ||
        data.signTime !== old.time ||
        data.status !== old.status
      ){

        changed.push(data);

      }

    });

    return changed;

  }

  function exitPeopleEditMode(){

    const table =
      document.querySelector('.statusTable');

    const inputs =
      document.querySelectorAll('.peopleInput');

    const addBtn =
      document.getElementById('addPeopleRowBtn');

    const editBtn =
      document.getElementById('peopleEditBtn');

    table?.classList.remove('editingPeople');

    inputs.forEach(function(input){
      input.disabled = true;
    });

    addBtn.style.display =
      'none';

    editBtn.textContent =
      '編輯';

  }

  function fillStaffInfo(input){

    const person =
      staffList.find(function(p){
        return p.name === input.value;
      });

    if(!person){
      return;
    }

    const tr =
      input.closest('tr');

    const inputs =
      tr.querySelectorAll('.peopleInput');

    inputs[0].value =
      person.role || '';

    inputs[1].value =
      person.name || '';

    inputs[2].value =
      person.emp || '';

  }


  /*
  ========================================
  共用工具
  ========================================
  */

  function setButtonLoading(btn, loading, text){

    btn.disabled =
      loading;

    btn.classList.toggle(
      'loading',
      loading
    );

    btn.innerHTML =
      text;

  }

  function escapeHtml(text){

    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

  }

  function renderLoadingHtml(text){

    return `
      <div class="card">
        <div class="loadingBox">
          <div class="loadingCircle"></div>
          <div>${text}</div>
        </div>
      </div>
    `;

  }

  function setPeopleEditLocked(locked){

    document
      .querySelectorAll('.deleteRowBtn')
      .forEach(function(btn){
        btn.disabled = locked;
      });

    const addBtn =
      document.getElementById('addPeopleRowBtn');

    if(addBtn){
      addBtn.disabled = locked;
    }

  }

  function cleanManualSignTime(value){

    if(!value){
      return '';
    }

    if(
      value.startsWith('-')
    ){
      return '';
    }

    return value;

  }
</script>
