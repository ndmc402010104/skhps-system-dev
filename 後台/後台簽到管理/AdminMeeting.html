<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body{

      font-family:
        Arial,
        "Noto Sans TC",
        "Microsoft JhengHei",
        sans-serif;

      background:
        radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
        linear-gradient(180deg,#fbfdff 0%,#f4f7fb 100%);

      color:
        #172033;

      padding:
        96px 24px 82px;

      max-width:
        1600px;

      margin:
        auto;

    }

    .pageHero{
      margin-bottom:24px;
    }

    .pageMap{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:24px;
      color:#64748b;
      font-size:13px;
      font-weight:700;
    }

    .pageMapLink{
      border:0;
      padding:0;
      background:transparent;
      color:#2563eb;
      font:inherit;
      cursor:pointer;
      box-shadow:none;
      width:auto;
    }

    .pageMapLink:hover{
      transform:none;
      box-shadow:none;
      background:transparent;
    }

    .pageMapCurrent{
      color:#172033;
    }

    .pageMapSep{
      color:#94a3b8;
    }

    .eyebrow{
      margin:0 0 10px;
      color:#1d4ed8;
      font-size:13px;
      font-weight:800;
    }

    .pageHero h1{
      margin:0;
      font-size:clamp(28px,4vw,42px);
      line-height:1.18;
      letter-spacing:0;
    }

    .pageLead{
      margin:12px 0 0;
      color:#475569;
      font-size:16px;
      line-height:1.7;
    }

    .card{
      background:rgba(255,255,255,.92);
      padding:32px;
      border-radius:8px;
      box-shadow:0 10px 30px rgba(15,23,42,.07);
      border:1px solid rgba(226,232,240,.9);
      margin-bottom:22px;
    }

    .card h2{
      margin-top:0;
      margin-bottom:18px;
      font-size:22px;
    }

    select{
      width:100%;
      box-sizing:border-box;
      padding:16px;
      font-size:18px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      background:white;
      color:#172033;
    }

    button{
      width:100%;
      padding:17px 18px;
      font-size:18px;
      font-weight:700;
      border-radius:8px;
      border:1px solid transparent;
      cursor:pointer;
      transition:all .18s ease;
      box-shadow:0 3px 10px rgba(15,23,42,.05);
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(15,23,42,.09);
    }

    button:active{
      transform:translateY(0);
    }

    .homeBtn{
      width:auto;
      padding:12px 22px;
      background:#eef2f7;
      color:#475569;
      border:1px solid #d6dde7;
      font-size:16px;
      box-shadow:0 2px 8px rgba(15,23,42,.04);
    }

    .homeBtn:hover{
      background:white;
      color:#1e293b;
    }

    .buttonGroup{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:20px;
    }

    .primaryBtn{
      background:#eef2ff;
      color:#334155;
      border-color:#dbe4ff;
    }

    .primaryBtn:hover{
      background:#e3eaff;
      color:#1e293b;
    }

    .secondaryBtn{
      background:#f8fafc;
      color:#334155;
      border-color:#e2e8f0;
    }

    .secondaryBtn:hover{
      background:#f1f5f9;
    }

    .successBtn{
      background:#eaf8ef;
      color:#1f5133;
      border-color:#cfead8;
    }

    .successBtn:hover{
      background:#dff3e7;
      color:#163b25;
    }

    .loading{
      opacity:.8;
      pointer-events:none;
    }

    .loading::before{
      content:'';
      width:18px;
      height:18px;
      margin-right:10px;
      border:3px solid rgba(51,65,85,.25);
      border-top:3px solid currentColor;
      border-radius:50%;
      display:inline-block;
      vertical-align:middle;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    .statusArea{
      margin-bottom:18px;
    }

    .peopleStatusCard{
      overflow:hidden;
    }

    .statusList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:18px;
    }

    .statusRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-radius:8px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      font-size:16px;
    }

    .statusRow span{
      margin-left:8px;
      color:#64748b;
    }
    .statusTableWrap{
      overflow-x:auto;
      max-width:100%;
      margin-bottom:12px;
      border:1px solid #e2e8f0;
      border-radius:8px;
      background:white;
    }

    .statusTable{

      width:100%;

      min-width:880px;

      border-collapse:collapse;

      table-layout:auto;

    }

    .statusTable td,
    .statusTable th{

      white-space:nowrap;

      overflow:hidden;

      text-overflow:ellipsis;

    }

    .statusTable th{
      padding:12px 10px;
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
      color:#0f172a;
      font-size:15px;
      font-weight:700;
      text-align:center;
    }

    .statusTable td{
      padding:4px 4px;
      border-bottom:1px solid #e2e8f0;
      background:white;
      vertical-align:middle;
    }

    .statusTable tr:last-child td{
      border-bottom:0;
    }

    .statusTable th:nth-child(1),
    .statusTable td:nth-child(1),
    .statusTable th:nth-child(2),
    .statusTable td:nth-child(2){
      width:46px;
      text-align:center;
      overflow:visible;
    }

    .statusTable th:nth-child(3),
    .statusTable td:nth-child(3){
      width:44px;
      text-align:center;
    }

    .statusTable th:nth-child(4),
    .statusTable td:nth-child(4){
      width:92px;
      text-align:center;
    }

    .statusTable th:nth-child(5),
    .statusTable td:nth-child(5){
      width:128px;
      text-align:center;
    }

    .statusTable th:nth-child(6),
    .statusTable td:nth-child(6){
      width:128px;
      text-align:center;
    }

    .statusTable th:nth-child(7),
    .statusTable td:nth-child(7){
      width:230px;
      text-align:center;
    }

    .statusTable th:nth-child(8),
    .statusTable td:nth-child(8){
      width:150px;
      text-align:center;

    }

    .statusTable input,
    .statusTable select{
      box-sizing:border-box;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      font-size:15px;
    }

    .statusTable .autoTextField{
      display:block;
      width:max(
        var(--field-min, 76px),
        calc(var(--field-em, 6) * 1em + 32px)
      );
      max-width:100%;
      margin:0 auto;
    }

    .statusTable input[type="datetime-local"]{
      display:block;
      width:216px;
      max-width:100%;
      margin:0 auto;
      font-size:13px;
      padding-left:8px;
      padding-right:6px;
      font-family:Consolas, "Courier New", monospace;
      font-variant-numeric:tabular-nums;
    }

    .statusTable select{
      display:block;
      width:112px;
      max-width:100%;
      margin:0 auto;
    }

    .miniBtn{
      padding:10px 12px;
      font-size:15px;
      border-radius:8px;
      background:#eef2ff;
      color:#334155;
      border:1px solid #dbe4ff;
    }

    .peopleToolbar{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .peopleToolbar button{
      width:auto;
      padding:10px 18px;
      font-size:15px;
    }

    .cancelChangesBtn{
      display:none;
      background:#fff7ed;
      color:#9a3412;
      border-color:#fed7aa;
    }

    .cancelChangesBtn:hover{
      background:#ffedd5;
      color:#7c2d12;
    }

    .statusTable td.cellChanged{
      background:#fffbeb;
      box-shadow:inset 0 0 0 2px #facc15;
    }

    .statusTable td.cellChanged input,
    .statusTable td.cellChanged select{
      border-color:#f59e0b;
      background:#fffaf0;
    }

    .peopleInput:disabled{
      background:#f8fafc;
      color:#334155;
      border-color:transparent;
    }

    .statusTable input,
    .statusTable select{
      min-width:0;
    }

    #addPeopleRowBtn{
      width:100%;
      margin-top:0;
      padding:17px 18px;
      border-radius:8px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
      box-shadow:none;
    }

    /* 刪除欄 */

    .sourceDeleteCell{
      width:46px;
      text-align:center;
      overflow:visible !important;
    }

    .deleteSourceBtn{

      display:none;

      width:40px;
      height:40px;

      margin:auto;

      padding:0;

      border-radius:999px;

      background:#fff5f5;

      color:#dc2626;

      border:1px solid #fecaca;

      align-items:center;

      justify-content:center;

    }

    /* 只有編輯模式顯示 */

    .editingPeople .deleteSourceBtn{
      display:flex;
    }

    .deleteSourceBtn:hover{
      background:#ffe4e6;
    }

    .deleteRawBtn{
      background:#f3fff5;
      color:#22a447;
      border-color:#c8f1d3;
    }

    .deleteRawBtn:hover{
      background:#dcfce7;
    }

    .deleteBackendBtn{
      background:#fff5f5;
      color:#dc2626;
      border-color:#fecaca;
    }

    .deleteBackendBtn:hover{
      background:#ffe4e6;
    }

    .sourceMarkedDelete{
      width:40px;
      min-width:40px;
      max-width:40px;
      height:40px;
      padding:0;
      font-weight:800;
      cursor:pointer;
      opacity:1;
      transform:none;
      white-space:nowrap;
      line-height:1;
    }

    .deleteRawBtn.sourceMarkedDelete{
      background:#ecfdf5;
      color:#15803d;
      border-color:#86efac;
      box-shadow:0 0 0 2px rgba(34,197,94,.12);
    }

    .deleteBackendBtn.sourceMarkedDelete{
      background:#fff7ed;
      color:#c2410c;
      border-color:#fdba74;
      box-shadow:0 0 0 2px rgba(249,115,22,.12);
    }

    .rowSwitchingRaw .deleteBackendBtn.sourceMarkedDelete{
      background:#eff6ff;
      color:#1d4ed8;
      border-color:#bfdbfe;
      box-shadow:0 0 0 2px rgba(59,130,246,.12);
    }

    .rowSwitchingBackend .deleteRawBtn.sourceMarkedDelete{
      background:#f5f3ff;
      color:#6d28d9;
      border-color:#ddd6fe;
      box-shadow:0 0 0 2px rgba(124,58,237,.12);
    }

    .recorderCell{
      width:auto;
      min-width:0;
      max-width:none;
      text-align:center;
      position:relative;
    }

    .roleCell{
      position:relative;
    }

    .statusTable input.recorderRadio{
      appearance:none;
      -webkit-appearance:none;
      width:42px;
      min-width:42px;
      height:42px;
      box-sizing:border-box;
      border-radius:999px;
      border:2px solid #b8c2d0;
      margin:auto;
      padding:0;
      display:block;
      background:white;
      cursor:pointer;
      pointer-events:none;
      position:relative;
      transition:.18s;
      box-shadow:none;
    }

    .statusTable.editingPeople input.recorderRadio{
      pointer-events:auto;
      opacity:1;
      cursor:pointer;
    }

    .statusTable input.recorderRadio:hover{
      transform:scale(1.04);
    }

    .recorderRadio::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:0;
      height:0;
      border-radius:999px;
      background:transparent;
      transform:translate(-50%,-50%);
    }

    .statusTable input.recorderRadio:checked{
      background:#5a79ff;
      border-color:#5a79ff;
    }

    .recorderRadio:checked::after{
      content:"✓";
      width:auto;
      height:auto;
      color:white;
      background:transparent;
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .backendRecorderRemoved .recorderRadio:checked{
      opacity:1 !important;
      background:#5a79ff;
      border-color:#5a79ff;
      box-shadow:0 0 0 5px rgba(90,121,255,.12);
    }

    .newRow{
      background:#fafcff;
    }

    /* 標記刪除 */

    .rowWillRemove td:nth-child(n+3){
      position:relative;
      background:#fff7f8 !important;
    }

    .rowWillRemove td:nth-child(n+3)::after{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      top:50%;
      height:3px;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(220,38,38,.82) 14%,
        rgba(220,38,38,.82) 86%,
        transparent
      );
      border-radius:999px;
      pointer-events:none;
      transform:translateY(-50%);
      z-index:6;
    }

    .rowWillRemove input,
    .rowWillRemove select{
      color:#64748b;
      background:transparent !important;
      border-color:rgba(252,165,165,.45);
      pointer-events:none;
    }

    .rowSwitchingRaw td:nth-child(n+3){
      background:#f8fbff !important;
    }

    .rowSwitchingRaw input,
    .rowSwitchingRaw select{
      border-color:#bfdbfe;
      background:#eff6ff;
      color:#334155;
      pointer-events:none;
    }

    .rowSwitchingBackend td:nth-child(n+3){
      background:#fbfaff !important;
    }

    .rowSwitchingBackend input,
    .rowSwitchingBackend select{
      border-color:#ddd6fe;
      background:#f5f3ff;
      color:#334155;
      pointer-events:none;
    }

    .rowWillRemove .deleteSourceBtn,
    .rowSwitchingRaw .deleteSourceBtn,
    .rowSwitchingBackend .deleteSourceBtn{
      pointer-events:auto;
    }

    .loadingBox{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:28px;
      font-size:18px;
      color:#64748b;
    }

    .loadingCircle{
      width:22px;
      height:22px;
      border:3px solid #cbd5e1;
      border-top-color:#64748b;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    body.saving{
      pointer-events:none;
    }

    body.saving .loadingBox{
      pointer-events:auto;
    }

    .deleteSourceBtn:disabled,
    #addPeopleRowBtn:disabled,
    .recorderRadio:disabled{

      opacity: 0.35;

      cursor: not-allowed;

      pointer-events: none;

      transform: none;

    }

    .deleteSourceBtn:disabled:hover,
    #addPeopleRowBtn:disabled:hover,
    .recorderRadio:disabled:hover{

      background: inherit;

    }

    @media(max-width:1200px){

      .card.peopleStatusCard{
        padding-left:16px;
        padding-right:16px;
      }

      .statusTableWrap{
        overflow-x:hidden;
      }

      .statusTable{
        min-width:0;
        table-layout:fixed;
      }

      .statusTable input,
      .statusTable select{
        width:100%;
        padding-left:7px;
        padding-right:7px;
        font-size:13px;
      }

      .statusTable .autoTextField{
        width:100%;
      }

      .statusTable input[type="datetime-local"]{
        width:100%;
        font-size:11px;
        padding-left:6px;
        padding-right:4px;
      }

      .statusTable select{
        width:100%;
        font-size:12px;
      }

      .statusTable th{
        padding-left:4px;
        padding-right:4px;
        font-size:12px;
      }

      .statusTable td{
        padding-left:3px;
        padding-right:3px;
      }

      .statusTable th:nth-child(1),
      .statusTable td:nth-child(1),
      .statusTable th:nth-child(2),
      .statusTable td:nth-child(2){
        width:6%;
      }

      .statusTable th:nth-child(3),
      .statusTable td:nth-child(3){
        width:5%;
      }

      .statusTable th:nth-child(4),
      .statusTable td:nth-child(4){
        width:11%;
      }

      .statusTable th:nth-child(5),
      .statusTable td:nth-child(5){
        width:16%;
      }

      .statusTable th:nth-child(6),
      .statusTable td:nth-child(6){
        width:15%;
      }

      .statusTable th:nth-child(7),
      .statusTable td:nth-child(7){
        width:25%;
      }

      .statusTable th:nth-child(8),
      .statusTable td:nth-child(8){
        width:16%;
      }

      .deleteSourceBtn{
        width:30px;
        min-width:30px;
        max-width:30px;
        height:30px;
        font-size:16px;
      }

      .statusTable input.recorderRadio{
        width:32px;
        min-width:32px;
        height:32px;
      }

    }

    @media(max-width:720px){

      body{
        padding:92px 14px 72px;
      }

      .homeBtn{
        width:100%;
      }

      .card{
        padding:22px;
        border-radius:8px;
      }

      .sourceDeleteCell{
        overflow:hidden !important;
      }

      .deleteSourceBtn{
        width:24px;
        min-width:24px;
        max-width:24px;
        height:24px;
        font-size:13px;
      }

      .statusTable input.recorderRadio{
        width:28px;
        min-width:28px;
        height:28px;
      }

    }
  </style>

  <script>
    window.APP_ENTRY_URL =
      '<?= appEntryUrl ?>';

    window.ADMIN_PAGE_KEY =
      '<?= adminPageKey ?>';
  </script>

  <?!= include('後台/後台簽到管理/AdminMeetingScript'); ?>


</head>
