<!DOCTYPE html>
<html>

<head>

<base target="_top">
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<style>

:root{
  --bg:#f4f7fb;
  --ink:#172033;
  --muted:#64748b;
  --line:#dbe4ef;
  --primary:#2563eb;
  --primaryDark:#1d4ed8;
  --mint:#0f766e;
  --amber:#b45309;
  --softBlue:#eaf2ff;
  --softMint:#e8f7f3;
  --softAmber:#fff4df;
  --purple:#7c3aed;
  --softPurple:#ede9fe;
  --gray:#475569;
  --softGray:#f1f5f9;
}
*{
  box-sizing:border-box;
}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
}
.shell{
  width:min(980px,100%);
  margin:0 auto;
  padding:96px 24px 82px;
}
.hero{
  display:block;
}
.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:#64748b;
  font-size:13px;
  font-weight:700;
}
.pageMapCurrent{
  color:#172033;
}
.eyebrow{
  margin:0 0 10px;
  color:var(--primaryDark);
  font-size:13px;
  font-weight:800;
}
h1{
  max-width:760px;
  margin:0;
  font-size:clamp(32px,4.6vw,52px);
  line-height:1.12;
  letter-spacing:0;
}
.lead{
  max-width:760px;
  margin:18px 0 0;
  color:#475569;
  font-size:17px;
  line-height:1.7;
}
.panel{
  margin-top:28px;
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
  overflow:hidden;
}
.panelHead{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--line);
}
.panelHead h2{
  margin:0;
  font-size:20px;
}
.panelHead p{
  margin:8px 0 0;
  color:var(--muted);
  line-height:1.55;
}
.actions{
  display:grid;
  gap:12px;
  padding:18px;
}
.entryButton{
  width:100%;
  min-height:86px;
  display:grid;
  grid-template-columns:48px minmax(0,1fr) 24px;
  align-items:center;
  gap:14px;
  padding:16px;
  text-align:left;
  color:var(--ink);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:8px;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.entryButton:hover{
  transform:translateY(-2px);
  border-color:#adc2e8;
  box-shadow:0 12px 24px rgba(15,23,42,.09);
}
.entryButton:focus-visible{
  outline:3px solid rgba(37,99,235,.25);
  outline-offset:2px;
}
.entryButton.disabled{
  opacity:0.5;
  cursor:not-allowed;
}
.entryButton.disabled:hover{
  transform:none;
  border-color:var(--line);
  box-shadow:none;
}
.entryIcon{
  width:48px;
  height:48px;
  display:grid;
  place-items:center;
  border-radius:8px;
  font-size:22px;
  font-weight:800;
}
.entryButton.primary .entryIcon{
  color:var(--primaryDark);
  background:var(--softBlue);
}
.entryButton.secondary .entryIcon{
  color:var(--mint);
  background:var(--softMint);
}
.entryButton.purple .entryIcon{
  color:var(--purple);
  background:var(--softPurple);
}
.entryButton.gray .entryIcon{
  color:var(--gray);
  background:var(--softGray);
}
.entryTitle{
  display:block;
  font-size:18px;
  font-weight:800;
}
.entryDesc{
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}
.arrow{
  color:#94a3b8;
  font-size:24px;
  font-weight:400;
}
.footerNote{
  margin-top:18px;
  color:#64748b;
  font-size:13px;
  line-height:1.6;
}
@media(max-width:820px){
  .shell{
    padding:92px 16px 72px;
  }
  .entryButton{
    grid-template-columns:44px minmax(0,1fr) 20px;
    min-height:78px;
    padding:14px;
  }
  .entryIcon{
    width:44px;
    height:44px;
  }
}

</style>



<script>

/*
========================================
後端注入資料
Admin.gs
↓
showAdminIndexPage()
========================================
*/

const APP_ENTRY_URL =
'<?= appEntryUrl ?>';

const ADMIN_PAGE_KEY =
'<?= adminPageKey ?>';



/*
========================================
進入會議簽到管理

流程：

AdminIndex
↓

Route.gs

↓

AdminMeeting.html

功能包含：
- 查詢會議
- 修改簽到狀態
- 補登 / 請假
- 匯出簽到單與上傳檔
========================================
*/

function goMeeting(){

window.top.location.href =

APP_ENTRY_URL
+
'?page='
+
ADMIN_PAGE_KEY
+
'meeting';

}

function goSystemHome(){

window.top.location.href =

APP_ENTRY_URL;

}

function goAdminHome(){

window.top.location.href =

APP_ENTRY_URL
+
'?page='
+
ADMIN_PAGE_KEY;

}

</script>

</head>



<body>

<main class="shell">

<?!= include('共用設定檔/AppShell', { subtitle: '後台首頁', onClick: 'goAdminHome()', maxWidth: '980px' }) ?>

<nav class="pageMap" aria-label="頁面地圖">
  <span class="pageMapCurrent">後台首頁</span>
</nav>

<section class="hero">

  <p class="eyebrow">管理功能</p>

  <h1>後台首頁</h1>

  <p class="lead">
    整形外科科室系統管理後台，選擇下方功能以進行資料維護與設定。
  </p>

  <div class="panel">

    <div class="panelHead">
      <h2>請選擇管理項目</h2>
      <p>點擊對應模組進入管理頁面。</p>
    </div>

    <div class="actions">

      <button class="entryButton primary" onclick="goMeeting()">
        <span class="entryIcon">會</span>
        <span>
          <span class="entryTitle">晨會簽到管理</span>
          <span class="entryDesc">查詢會議與簽到狀態、補登與請假，並匯出簽到單與原始資料。</span>
        </span>
        <span class="arrow">›</span>
      </button>

      <button class="entryButton secondary" onclick="goSystemHome()">
        <span class="entryIcon">首</span>
        <span>
          <span class="entryTitle">回科室系統首頁</span>
          <span class="entryDesc">返回前台功能入口。</span>
        </span>
        <span class="arrow">›</span>
      </button>

      <button class="entryButton purple disabled">
        <span class="entryIcon">人</span>
        <span>
          <span class="entryTitle">人員管理</span>
          <span class="entryDesc">開發中。</span>
        </span>
        <span class="arrow">›</span>
      </button>

      <button class="entryButton gray disabled">
        <span class="entryIcon">設</span>
        <span>
          <span class="entryTitle">系統設定</span>
          <span class="entryDesc">開發中。</span>
        </span>
        <span class="arrow">›</span>
      </button>

    </div>

  </div>

  <p class="footerNote">
    新光整形外科科室系統
  </p>

</section>

</main>

</body>

</html>
