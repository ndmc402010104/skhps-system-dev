<script>
const APP_ENTRY_URL =
  '<?= appEntryUrl ?>';

const GITHUB_PAGE_MAP = {
  home:'科室系統用戶端/FrontIndex.html',
  frontIndex:'科室系統用戶端/FrontIndex.html',
  signQR:'科室系統用戶端/SignQRGenerator.html',
  hospitalSignIn:'科室系統用戶端/HospitalSignIn.html',
  dressingFront:'敷料領用登錄系統/DressingFront.html',
  dressingUse:'敷料領用登錄系統/DressingUse.html',
  dressingDict:'敷料領用登錄系統/DressingFront.html#dressingDict'
};

function isGithubPage(){
  return window.location.hostname.includes('github.io');
}

function getGithubRepoBasePath(){
  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts.length ? '/' + parts[0] + '/' : '/';
}

function getGithubPageUrl(pageKey){
  const path = GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;
  return window.location.origin + getGithubRepoBasePath() + path;
}

function getAppEntryUrl(){
  const value = String(APP_ENTRY_URL || '').trim();
  if(value.includes('<' + '?=') || !value){
    return 'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';
  }
  return value;
}

function parseTemplateJson(text, fallback){
  text = String(text || '').trim();
  if(!text || text.indexOf('<?') >= 0){
    return fallback || [];
  }
  try{
    return JSON.parse(text);
  } catch(error){
    return fallback || [];
  }
}

let staffList =
  parseTemplateJson('<?!= staffList ?>', []);

let extraList =
  parseTemplateJson('<?!= extraList ?>', []);

function callAppsScriptApi(params){
  params = params || {};
  return new Promise(function(resolve, reject){
    const callbackName =
      '__frontApiCallback_' +
      Date.now() +
      '_' +
      Math.random().toString(36).slice(2);
    const query = new URLSearchParams();

    Object.keys(params).forEach(function(key){
      const value = params[key];
      if(value !== undefined && value !== null){
        query.set(key, typeof value === 'object' ? JSON.stringify(value) : value);
      }
    });

    query.set('callback', callbackName);

    const script = document.createElement('script');
    const timer = setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時，請確認 Apps Script 部署權限'));
    }, 20000);

    window[callbackName] = function(result){
      cleanup();
      resolve(result);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('API 載入失敗，請確認 Apps Script 部署網址'));
    };

    script.src = getAppEntryUrl() + '?' + query.toString();
    document.head.appendChild(script);

    function cleanup(){
      clearTimeout(timer);
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
      try{
        delete window[callbackName];
      } catch(error){
        window[callbackName] = undefined;
      }
    }
  });
}

function goHome(){

  window.top.location.href =
    isGithubPage()
      ? getGithubPageUrl('home')
      : getAppEntryUrl();

}

function log(account,password){

  document
    .getElementById('accountId')
    .value =
    account;

  document
    .getElementById('passwordId')
    .value =
    password || '';

  document
    .getElementById('subBtn')
    .click();

}

function manualLogin(){

  const account =
    document
      .getElementById('manualAccount')
      .value
      .trim();

  if(!account){
    alert('請輸入員工編號');
    return;
  }

  log(account,'');

}

function renderStaff(){

  const vsBox =
    document.getElementById('vsBox');

  const residentBox =
    document.getElementById('residentBox');

  vsBox.innerHTML = '';
  residentBox.innerHTML = '';

  staffList.forEach(function(person){

    if(person.name === '吳明娟'){
      return;
    }

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn';

    btn.textContent =

      (
        person.role || ''
      )

      +

      ' '

      +

      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    if(
      person.role === 'VS' ||
      person.role === 'F' ||
      person.role === 'Fellow'
    ){
      vsBox.appendChild(btn);
    }else{
      residentBox.appendChild(btn);
    }

  });

  if(staffList.length === 0){
    vsBox.innerHTML =
      '<div class="notice">人員清單尚未載入；仍可使用下方手動輸入員工編號。</div>';
    residentBox.innerHTML =
      '<div class="notice">清單讀取完成後會顯示完整人員按鈕。</div>';
  }

}

function renderExtra(){

  const extraBox =
    document.getElementById('extraBox');

  extraBox.innerHTML = '';

  extraList.forEach(function(person){

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn extraBtn';

    btn.textContent =
      person.title +
      ' ' +
      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    extraBox.appendChild(btn);

  });

  if(extraList.length === 0){
    extraBox.innerHTML =
      '<div class="notice">額外帳號清單尚未載入。</div>';
  }

}

async function loadHospitalSignInListsFromApi(){
  if(!isGithubPage() || staffList.length > 0 || extraList.length > 0){
    return;
  }

  try{
    const res = await callAppsScriptApi({ action:'getHospitalSignInLists' });
    if(!res || !res.ok){
      throw new Error((res && res.message) || '清單讀取失敗');
    }
    staffList = Array.isArray(res.staffList) ? res.staffList : [];
    extraList = Array.isArray(res.extraList) ? res.extraList : [];
    renderStaff();
    renderExtra();
  } catch(error){
    console.warn('load hospital sign-in lists failed', error);
  }
}

function installGithubAppShellFallback(){
  if(!isGithubPage()){
    return;
  }

  document.body.style.padding = '0';
  document.body.style.display = 'flex';
  document.body.style.flexDirection = 'column';
  document.body.style.minHeight = '100vh';

  if(!document.getElementById('githubAppShellStyle')){
    const shellStyle = document.createElement('style');
    shellStyle.id = 'githubAppShellStyle';
    shellStyle.textContent =
      ':root{--app-shell-wide-inset:15vw;--app-shell-wide-width:70vw;--app-shell-gutter:24px;}' +
      '.appHeader{padding:0 var(--app-shell-gutter)!important;}' +
      '.appVersionFooter{position:fixed;left:0;right:0;bottom:0;z-index:10000;height:42px;display:flex;align-items:center;justify-content:center;padding:0 16px;box-sizing:border-box;background:rgba(248,251,255,.94);border-top:1px solid rgba(148,163,184,.38);box-shadow:0 -8px 24px rgba(15,23,42,.08);backdrop-filter:blur(10px);}' +
      '.appVersionBadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;line-height:1.1;color:#475569;background:rgba(255,255,255,.72);border:1px solid rgba(148,163,184,.45);border-radius:8px;padding:6px 8px;max-width:100%;}' +
      '.appVersionBadgeMode{font-weight:700;}' +
      '@media(min-width:1200px){.shell,.wrap,.container,.testPage{width:var(--app-shell-wide-width)!important;max-width:none!important;margin-left:auto!important;margin-right:auto!important;padding-left:0!important;padding-right:0!important;}.appHeader{padding:0 var(--app-shell-wide-inset)!important;}}' +
      '@media(max-width:820px){.appHeader{padding:0 16px!important;}}';
    document.head.appendChild(shellStyle);
  }

  const mainShell = document.querySelector('.shell');
  if(mainShell){
    mainShell.style.flex = '1';
    mainShell.style.padding = '24px 24px 66px';
    mainShell.style.boxSizing = 'border-box';
  }

  if(!document.querySelector('.appHeader')){
    const ghHeader = document.createElement('header');
    ghHeader.className = 'appHeader';
    ghHeader.style.cssText = 'position:relative; flex-shrink:0; z-index:20; display:flex; justify-content:space-between; align-items:center; gap:18px; height:76px; margin:0; box-sizing:border-box; border-bottom:1px solid #dbe4ef; background:rgba(248,251,255,.92); backdrop-filter:blur(10px); box-shadow:0 8px 24px rgba(15,23,42,.06);';
    ghHeader.innerHTML =
      '<div class="brand" onclick="goHome()" style="display:flex; align-items:center; gap:14px; cursor:pointer;">' +
        '<div class="brandMark" style="width:46px; height:46px; display:grid; place-items:center; border-radius:14px; color:#ffffff; font-size:22px; font-weight:800; background:linear-gradient(135deg,#2563eb,#0f766e); box-shadow:0 12px 24px rgba(37,99,235,.2);">S</div>' +
        '<div class="brandText" style="display:grid; gap:2px;">' +
          '<span class="brandName" style="font-size:18px; font-weight:800;">新光整形外科科室系統</span>' +
          '<span class="brandSub" style="color:#64748b; font-size:13px;">院內系統快速登入</span>' +
        '</div>' +
      '</div>';
    document.body.prepend(ghHeader);
  }

  if(!document.querySelector('.appVersionFooter')){
    const ghFooter = document.createElement('div');
    ghFooter.className = 'appVersionFooter';
    ghFooter.dataset.appFooter = '1';
    ghFooter.innerHTML = '<div class="appVersionBadge"><span class="appVersionBadgeMode">前端頁面</span></div>';
    document.body.appendChild(ghFooter);
  }
}

function initPage(){

  installGithubAppShellFallback();
  renderStaff();
  renderExtra();
  loadHospitalSignInListsFromApi();

}

window.addEventListener(
  'DOMContentLoaded',
  initPage
);
</script>
