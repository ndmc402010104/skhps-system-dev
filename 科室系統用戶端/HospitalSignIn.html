<script>
const APP_ENTRY_URL =
  '<?= appEntryUrl ?>';

const GITHUB_PAGE_MAP = {
  home:'科室系統用戶端/FrontIndex.html',
  frontIndex:'科室系統用戶端/FrontIndex.html',
  signQR:'科室系統用戶端/SignQRGenerator.html',
  hospitalSignIn:'科室系統用戶端/HospitalSignIn.html',
  dressingFront:'敷料領用登錄系統/DressingFront.html',
  dressingUse:'敷料領用登錄系統/DressingUse.html',
  dressingDict:'敷料領用登錄系統/DressingFront.html#dressingDict'
};

function isGithubPage(){
  return (window.location.hostname.indexOf('script.google.com') < 0);
}

function isAppsScriptPage(){
  return !isGithubPage() &&
    typeof google !== 'undefined' &&
    google.script &&
    google.script.run;
}

function getGithubRepoBasePath(){
  if(!window.location.hostname.includes('github.io')){
    return '/';
  }

  const parts = window.location.pathname.split('/').filter(Boolean);
  return parts.length ? '/' + parts[0] + '/' : '/';
}

function getGithubPageUrl(pageKey){
  const path = GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;
  return window.location.origin + getGithubRepoBasePath() + path;
}

function getAppEntryUrl(){
  const value = String(APP_ENTRY_URL || '').trim();
  if(value && !value.includes('<' + '?=')){
    return value;
  }

  if(isGithubPage()){
    return (
      window.SKH_ENVIRONMENTS &&
      window.SKH_ENVIRONMENTS.webProd &&
      window.SKH_ENVIRONMENTS.webProd.apiUrl
    ) || (
      window.SKH_ENVIRONMENTS &&
      window.SKH_ENVIRONMENTS.gasDev &&
      window.SKH_ENVIRONMENTS.gasDev.apiUrl
    ) || '';
  }

  try{
    const currentUrl = new URL(window.location.href);
    currentUrl.search = '';
    currentUrl.hash = '';
    return currentUrl.toString();
  } catch(error){
    return window.location.href.split('?')[0].split('#')[0];
  }
}

function parseTemplateJson(text, fallback){
  text = String(text || '').trim();
  if(!text || text.indexOf('<' + '?') >= 0){
    return fallback || [];
  }
  try{
    return JSON.parse(text);
  } catch(error){
    return fallback || [];
  }
}

let staffList =
  parseTemplateJson('<?!= staffList ?>', []);

let extraList =
  parseTemplateJson('<?!= extraList ?>', []);

function callAppsScriptApi(params){
  params = params || {};
  return new Promise(function(resolve, reject){
    const callbackName =
      '__frontApiCallback_' +
      Date.now() +
      '_' +
      Math.random().toString(36).slice(2);
    const query = new URLSearchParams();

    Object.keys(params).forEach(function(key){
      const value = params[key];
      if(value !== undefined && value !== null){
        query.set(key, typeof value === 'object' ? JSON.stringify(value) : value);
      }
    });

    query.set('callback', callbackName);

    const script = document.createElement('script');
    const timer = setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時，請確認 Apps Script 部署權限'));
    }, 20000);

    window[callbackName] = function(result){
      cleanup();
      resolve(result);
    };

    script.onerror = function(){
      cleanup();
      reject(new Error('API 載入失敗，請確認 Apps Script 部署網址'));
    };

    script.src = getAppEntryUrl() + '?' + query.toString();
    document.head.appendChild(script);

    function cleanup(){
      clearTimeout(timer);
      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
      try{
        delete window[callbackName];
      } catch(error){
        window[callbackName] = undefined;
      }
    }
  });
}

function goHome(){

  window.top.location.href =
    isGithubPage()
      ? getGithubPageUrl('home')
      : getAppEntryUrl();

}

function log(account,password){

  document
    .getElementById('accountId')
    .value =
    account;

  document
    .getElementById('passwordId')
    .value =
    password || '';

  document
    .getElementById('subBtn')
    .click();

}

function manualLogin(){

  const account =
    document
      .getElementById('manualAccount')
      .value
      .trim();

  if(!account){
    alert('請輸入員工編號');
    return;
  }

  log(account,'');

}

function renderStaff(){

  const vsBox =
    document.getElementById('vsBox');

  const residentBox =
    document.getElementById('residentBox');

  vsBox.innerHTML = '';
  residentBox.innerHTML = '';
  vsBox.classList.remove('is-empty');
  residentBox.classList.remove('is-empty');

  staffList.forEach(function(person){

    if(person.name === '吳明娟'){
      return;
    }

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn';

    btn.textContent =

      (
        person.role || ''
      )

      +

      ' '

      +

      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    if(
      person.role === 'VS' ||
      person.role === 'F' ||
      person.role === 'Fellow'
    ){
      vsBox.appendChild(btn);
    }else{
      residentBox.appendChild(btn);
    }

  });

  if(staffList.length === 0){
    vsBox.classList.add('is-empty');
    residentBox.classList.add('is-empty');
  }

}

function renderExtra(){

  const extraBox =
    document.getElementById('extraBox');

  extraBox.innerHTML = '';
  extraBox.classList.remove('is-empty');

  extraList.forEach(function(person){

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn extraBtn';

    btn.textContent =
      person.title +
      ' ' +
      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    extraBox.appendChild(btn);

  });

  if(extraList.length === 0){
    extraBox.classList.add('is-empty');
  }

}

function applyHospitalSignInLists(res){
  res = res || {};
  staffList = Array.isArray(res.staffList) ? res.staffList : [];
  extraList = Array.isArray(res.extraList) ? res.extraList : [];
  renderStaff();
  renderExtra();
}

function loadHospitalSignInListsFromAppsScript(){
  return new Promise(function(resolve, reject){
    if(!isAppsScriptPage()){
      reject(new Error('google.script.run 不可用'));
      return;
    }

    google.script.run
      .withSuccessHandler(function(res){
        applyHospitalSignInLists(res);
        resolve(res);
      })
      .withFailureHandler(function(error){
        reject(error);
      })
      .getHospitalSignInLists();
  });
}

async function loadHospitalSignInLists(){
  if(staffList.length > 0 || extraList.length > 0){
    return;
  }

  const done =
    typeof pushAppWait === 'function'
      ? pushAppWait('正在讀取登入名單...')
      : function(){};

  try{
    if(isGithubPage()){
      const res = await callAppsScriptApi({ action:'getHospitalSignInLists' });
      if(!res || !res.ok){
        throw new Error((res && res.message) || '清單讀取失敗');
      }
      applyHospitalSignInLists(res);
      return;
    }

    await loadHospitalSignInListsFromAppsScript();
  } catch(error){
    console.warn('load hospital sign-in lists failed', error);
  } finally {
    done();
  }
}



function installGithubAppShellFallback(){
  if(!isGithubPage()){
    return;
  }

  if(!document.getElementById('githubAppShellStyle')){
    const shellStyle = document.createElement('style');
    shellStyle.id = 'githubAppShellStyle';
    shellStyle.textContent =
      ':root{--app-shell-wide-inset:15vw;--app-shell-wide-width:70vw;--app-shell-gutter:24px;}' +
      '.appHeader{padding:0 var(--app-shell-gutter)!important;}' +
      '.appWaitIndicator{position:fixed;top:12px;left:50%;z-index:1450;display:none;align-items:center;gap:9px;max-width:min(420px,calc(100vw - 32px));padding:9px 14px;border:1px solid #bfdbfe;border-radius:999px;background:rgba(255,255,255,.96);box-shadow:0 8px 24px rgba(15,23,42,.12);color:#1e3a8a;font-size:13px;font-weight:900;transform:translateX(-50%);overflow:hidden;}' +
      '.appWaitIndicator.is-active{display:flex;}' +
      '.appWaitIndicator::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:linear-gradient(90deg,transparent,#2563eb,transparent);animation:appWaitSweep 1.05s linear infinite;}' +
      '.appWaitSpinner{width:15px;height:15px;flex:0 0 auto;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:appWaitSpin .72s linear infinite;}' +
      '.appWaitText{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}' +
      '@keyframes appWaitSpin{to{transform:rotate(360deg);}}' +
      '@keyframes appWaitSweep{from{transform:translateX(-100%);}to{transform:translateX(100%);}}' +      '@media(min-width:1200px){.shell,.wrap,.container,.testPage{width:var(--app-shell-wide-width)!important;max-width:none!important;margin-left:auto!important;margin-right:auto!important;padding-left:0!important;padding-right:0!important;}.appHeader{padding:0 var(--app-shell-wide-inset)!important;}}' +
      '@media(max-width:820px){.appHeader{padding:0 16px!important;}}';
    document.head.appendChild(shellStyle);
  }

  if(!document.querySelector('.appHeader')){
    const ghHeader = document.createElement('header');
    ghHeader.className = 'appHeader';
    ghHeader.style.cssText = 'position:fixed; top:0; left:0; right:0; z-index:20; display:flex; justify-content:space-between; align-items:center; gap:18px; height:76px; margin:0; box-sizing:border-box; border-bottom:1px solid #dbe4ef; background:rgba(248,251,255,.92); backdrop-filter:blur(10px); box-shadow:0 8px 24px rgba(15,23,42,.06);';
    ghHeader.innerHTML =
      '<div class="brand" onclick="goHome()" style="display:flex; align-items:center; gap:14px; cursor:pointer;">' +
        '<div class="brandMark" style="width:46px; height:46px; display:grid; place-items:center; border-radius:14px; color:#ffffff; font-size:22px; font-weight:800; background:linear-gradient(135deg,#2563eb,#0f766e); box-shadow:0 12px 24px rgba(37,99,235,.2);">S</div>' +
        '<div class="brandText" style="display:grid; gap:2px;">' +
          '<span class="brandName" style="font-size:18px; font-weight:800;">新光整形外科科室系統</span>' +
          '<span class="brandSub" style="color:#64748b; font-size:13px;">院內系統快速登入</span>' +
        '</div>' +
      '</div>';
    document.body.prepend(ghHeader);
  }

  if(!document.getElementById('appWaitIndicator')){
    const waitNode = document.createElement('div');
    waitNode.id = 'appWaitIndicator';
    waitNode.className = 'appWaitIndicator';
    waitNode.setAttribute('role', 'status');
    waitNode.setAttribute('aria-live', 'polite');
    waitNode.setAttribute('aria-busy', 'false');
    waitNode.innerHTML =
      '<span class="appWaitSpinner" aria-hidden="true"></span>' +
      '<span id="appWaitText" class="appWaitText">處理中...</span>';
    document.body.appendChild(waitNode);
  }

  if(!window.AppWait || typeof window.AppWait.push !== 'function'){
    const waitStack = [];
    let waitSeq = 0;

    function renderWait(){
      const indicator = document.getElementById('appWaitIndicator');
      const textEl = document.getElementById('appWaitText');
      if(!indicator || !textEl){
        return;
      }

      const active = waitStack.length > 0;
      const current = active ? waitStack[waitStack.length - 1] : null;
      indicator.classList.toggle('is-active', active);
      indicator.setAttribute('aria-busy', active ? 'true' : 'false');
      textEl.innerText = current && current.message ? current.message : '處理中...';
    }

    function pushWait(message){
      const id = ++waitSeq;
      let closed = false;
      waitStack.push({ id:id, message:message || '處理中...' });
      renderWait();
      return function(){
        if(closed){
          return;
        }
        closed = true;
        const index = waitStack.findIndex(function(item){ return item.id === id; });
        if(index >= 0){
          waitStack.splice(index, 1);
        }
        renderWait();
      };
    }

    window.AppWait = { push:pushWait, render:renderWait };
    window.pushAppWait = pushWait;
    window.renderAppWaitIndicator = renderWait;
  }

  if(
    !window.renderEnvironmentFooter &&
    !window.__SKH_ENVIRONMENT_FOOTER_LOADING__ &&
    !document.querySelector('script[data-skh-environment-footer-script="true"], script[data-skh-environment-footer-fallback], script[data-skh-environment-footer]') &&
    !Array.prototype.some.call(document.scripts || [], function(script){ return String(script.src || '').indexOf('EnvironmentFooter.js') >= 0; })
  ){
    window.__SKH_ENVIRONMENT_FOOTER_LOADING__ = true;
    const footerScript = document.createElement('script');
    footerScript.src = window.location.hostname.includes('github.io')
      ? 'https://ndmc402010104.github.io/plastic-surgery-department-system/%E5%85%B1%E7%94%A8%E8%A8%AD%E5%AE%9A%E6%AA%94/EnvironmentFooter.js'
      : '/%E5%85%B1%E7%94%A8%E8%A8%AD%E5%AE%9A%E6%AA%94/EnvironmentFooter.js';
    footerScript.src += '?v=' + Date.now();
    footerScript.dataset.skhEnvironmentFooterScript = 'true';
    footerScript.setAttribute('data-skh-environment-footer', '1');
    footerScript.setAttribute('data-skh-environment-footer-fallback', '1');
    footerScript.onload = function(){ window.__SKH_ENVIRONMENT_FOOTER_LOADING__ = false; if(window.renderEnvironmentFooter){ window.renderEnvironmentFooter(); } };
    footerScript.onerror = function(error){ window.__SKH_ENVIRONMENT_FOOTER_LOADING__ = false; if(window.console && window.console.warn){ window.console.warn('[footer] EnvironmentFooter.js load failed', error); } };
    document.body.appendChild(footerScript);
  }
}

function initPage(){

  installGithubAppShellFallback();
  renderStaff();
  renderExtra();
  loadHospitalSignInLists();

}

window.addEventListener(
  'DOMContentLoaded',
  initPage
);
</script>
