<script>

  const APP_ENTRY_URL =
    '<?= appEntryUrl ?>';

  const GITHUB_PAGE_MAP = {
    home:'科室系統用戶端/FrontIndex.html',
    frontIndex:'科室系統用戶端/FrontIndex.html',
    signMeeting:'科室系統用戶端/SignMeeting.html',
    signQR:'科室系統用戶端/SignQRGenerator.html',
    hospitalSignIn:'科室系統用戶端/HospitalSignIn.html',
    dressingFront:'敷料領用登錄系統/DressingFront.html',
    dressingUse:'敷料領用登錄系統/DressingUse.html',
    dressingDict:'敷料領用登錄系統/DressingFront.html#dressingDict'
  };

  function isGithubPage(){
    return (window.location.hostname.includes('github.io') || window.location.hostname === 'dev-skhps.jonaminz.com' || window.location.hostname === 'skhps.jonaminz.com');
  }

  function getGithubRepoBasePath(){
    if(!window.location.hostname.includes('github.io')){
      return '/';
    }

    const parts = window.location.pathname.split('/').filter(Boolean);
    return parts.length ? '/' + parts[0] + '/' : '/';
  }

  function getGithubPageUrl(pageKey){
    const path = GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;
    return window.location.origin + getGithubRepoBasePath() + path;
  }

  function getFrontendPageUrl(pageKey, params){
    const baseUrl =
      getGithubPageUrl(pageKey);

    const url =
      new URL(
        baseUrl,
        window.location.href
      );

    Object.keys(params || {}).forEach(function(key){
      const value = params[key];
      if(value !== undefined && value !== null && value !== ''){
        url.searchParams.set(key, value);
      }
    });

    return url.toString();
  }

  function getAppEntryUrl(){
    const value = String(APP_ENTRY_URL || '').trim();
    if(value && !value.includes('<' + '?=')){
      return value;
    }

    if(isGithubPage()){
      return 'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';
    }

    try{
      const currentUrl = new URL(window.location.href);
      currentUrl.search = '';
      currentUrl.hash = '';
      return currentUrl.toString();
    } catch(error){
      return window.location.href.split('?')[0].split('#')[0];
    }
  }

  function callAppsScriptApi(params){
    params = params || {};
    return new Promise(function(resolve, reject){
      const callbackName =
        '__frontApiCallback_' +
        Date.now() +
        '_' +
        Math.random().toString(36).slice(2);
      const query = new URLSearchParams();

      Object.keys(params).forEach(function(key){
        const value = params[key];
        if(value !== undefined && value !== null){
          query.set(key, typeof value === 'object' ? JSON.stringify(value) : value);
        }
      });

      query.set('callback', callbackName);

      const script = document.createElement('script');
      const timer = setTimeout(function(){
        cleanup();
        reject(new Error('API 逾時，請確認 Apps Script 部署權限'));
      }, 20000);

      window[callbackName] = function(result){
        cleanup();
        resolve(result);
      };

      script.onerror = function(){
        cleanup();
        reject(new Error('API 載入失敗，請確認 Apps Script 部署網址'));
      };

      script.src = getAppEntryUrl() + '?' + query.toString();
      document.head.appendChild(script);

      function cleanup(){
        clearTimeout(timer);
        if(script.parentNode){
          script.parentNode.removeChild(script);
        }
        try{
          delete window[callbackName];
        } catch(error){
          window[callbackName] = undefined;
        }
      }
    });
  }

  const QR_KEEPALIVE_REFRESH_MS =
    4 * 60 * 1000;

  let qrPreviewRefreshTimer =
    null;

  function goHome(){

    window.top.location.href =
      isGithubPage()
        ? getGithubPageUrl('home')
        : getAppEntryUrl();

  }

  function makeSignQR(){

    const meeting =
      getSelectedMeeting();

    if(!meeting || !meeting.course || !meeting.date || !meeting.token){
      alert('請先選擇有效會議。');
      return;
    }

    const signUrl =
      buildSignQRUrl(
        meeting
      );

    const qrUrl =
      buildQRCodeImageUrl(
        signUrl
      );

    renderSignQR(
      signUrl,
      qrUrl,
      meeting
    );

    const enablePopup =
      document
        .getElementById('popupQR')
        .checked;

    if(enablePopup){

      openSignQRPopup(
        signUrl,
        qrUrl,
        meeting
      );

    }

  }

  function getSelectedMeeting(){

    const select =
      document.getElementById('course');

    const selectedValue =
      select
        ? String(select.value || '')
        : '';

    if(!selectedValue){
      return null;
    }

    const raw =
      decodeURIComponent(selectedValue);

    const parts =
      raw.split('||');

    return {
      course: parts[0],
      date: parts[1],
      token: parts[2]
    };

  }

  function buildSignQRUrl(meeting){
    if(isGithubPage()){
      return getFrontendPageUrl(
        'signMeeting',
        {
          course: meeting.course,
          date: meeting.date,
          token: meeting.token,
          v: Date.now()
        }
      );
    }

    return (
      getAppEntryUrl() +
      '?page=signmeeting' +
      '&course=' +
      encodeURIComponent(meeting.course) +
      '&date=' +
      encodeURIComponent(meeting.date) +
      '&token=' +
      encodeURIComponent(meeting.token) +
      '&v=' +
      Date.now()
    );

  }

  function buildQRCodeImageUrl(signUrl){

    return (
      'https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&margin=30&data=' +
      encodeURIComponent(signUrl)
    );

  }

  function buildKeepAliveSignUrl(signUrl){

    try{
      const url =
        new URL(
          signUrl,
          window.location.href
        );

      url.searchParams.set(
        'v',
        Date.now()
      );

      return url.toString();
    }
    catch(error){
      const separator =
        signUrl.indexOf('?') >= 0
          ? '&'
          : '?';

      return signUrl +
        separator +
        'v=' +
        Date.now();
    }

  }

  function startQRPreviewKeepAlive(signUrl){

    if(qrPreviewRefreshTimer){
      clearInterval(
        qrPreviewRefreshTimer
      );
    }

    qrPreviewRefreshTimer =
      setInterval(
        function(){
          const img =
            document.querySelector(
              '#result .qrPreview img'
            );

          if(!img){
            return;
          }

          img.src =
            buildQRCodeImageUrl(
              buildKeepAliveSignUrl(
                signUrl
              )
            );
        },
        QR_KEEPALIVE_REFRESH_MS
      );

  }

  function renderSignQR(signUrl,qrUrl,meeting){

    const meetingTitle =
      escapeHtml(meeting && meeting.course ? meeting.course : '會議簽到');

    const meetingTime =
      escapeHtml(meeting && meeting.date ? meeting.date : '');

    const safeSignUrl =
      escapeHtml(signUrl);

    const safeQrUrl =
      escapeHtml(qrUrl);

    document
      .getElementById('result')
      .innerHTML =
        '<section class="card qrPreview">' +
        '<h2>' + meetingTitle + '</h2>' +
        (meetingTime ? '<p class="qrPreviewTime">' + meetingTime + '</p>' : '') +
        '<p class="qrPreviewHint">請掃描 QR code 簽到</p>' +
        '<a href="' + safeSignUrl + '" target="_blank">' +
        '<img src="' + safeQrUrl + '">' +
        '</a>' +
        '</section>';

    startQRPreviewKeepAlive(
      signUrl
    );

  }

  function escapeHtml(value){

    return String(value || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');

  }

  function openSignQRPopup(signUrl,qrUrl,meeting){

    const popup =
      window.open(
        '',
        '_blank'
      );

    if(!popup){

      alert(
        '瀏覽器阻擋了新分頁，請允許彈出視窗。'
      );

      return;

    }

    const meetingTitle =
      escapeHtml(meeting && meeting.course ? meeting.course : '會議簽到');

    const meetingTime =
      escapeHtml(meeting && meeting.date ? meeting.date : '');

    const safeSignUrl =
      escapeHtml(signUrl);

    const safeQrUrl =
      escapeHtml(qrUrl);

    const popupRefreshScript =
      [
        '(function(){',
        'var originalSignUrl=' + JSON.stringify(signUrl) + ';',
        'var refreshMs=' + QR_KEEPALIVE_REFRESH_MS + ';',
        'var wakeLock=null;',
        'function buildSignUrl(){',
        'try{var url=new URL(originalSignUrl,window.location.href);url.searchParams.set("v",Date.now());return url.toString();}',
        'catch(error){return originalSignUrl+(originalSignUrl.indexOf("?")>=0?"&":"?")+"v="+Date.now();}',
        '}',
        'function buildQrUrl(url){',
        'return "https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&margin=30&data="+encodeURIComponent(url);',
        '}',
        'function updateQr(){',
        'var img=document.getElementById("qrImage");',
        'var link=document.getElementById("qrLink");',
        'var nextSignUrl=buildSignUrl();',
        'if(link){link.href=nextSignUrl;}',
        'if(img){img.src=buildQrUrl(nextSignUrl);}',
        '}',
        'async function requestWakeLock(){',
        'try{',
        'if(!("wakeLock" in navigator)){return;}',
        'wakeLock=await navigator.wakeLock.request("screen");',
        'wakeLock.addEventListener("release",function(){wakeLock=null;});',
        '}catch(error){}',
        '}',
        'document.addEventListener("visibilitychange",function(){',
        'if(document.visibilityState==="visible"){requestWakeLock();updateQr();}',
        '});',
        'requestWakeLock();',
        'setInterval(updateQr,refreshMs);',
        '})();'
      ].join('');

    popup.document.write(
      '<html>' +
      '<head>' +
      '<title>簽到 QR</title>' +
      '<style>' +
      'body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#f8fafc;color:#172033;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;}' +
      '.qrStage{width:100vw;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;box-sizing:border-box;text-align:center;}' +
      '.qrCopy{max-width:min(88vw,860px);display:grid;justify-items:center;gap:14px;}' +
      '.meetingName{margin:0;font-size:clamp(34px,5vw,64px);line-height:1.12;font-weight:800;}' +
      '.meetingTime{margin:0;color:#475569;font-size:clamp(20px,2.8vw,34px);font-weight:700;}' +
      '.qrHint{margin:0;color:#1d4ed8;font-size:clamp(22px,3vw,38px);font-weight:800;}' +
      '.qrLink{display:block;}' +
      'img{width:min(68vh,78vw,680px);max-width:100%;max-height:62vh;cursor:default;background:#ffffff;border:1px solid #dbe4ef;border-radius:8px;padding:18px;box-sizing:border-box;box-shadow:0 18px 45px rgba(15,23,42,.12);}' +
      '.qrLink[href] img,#qrImage[onclick]{cursor:pointer;}' +
      '@media(orientation:landscape){.qrStage{flex-direction:row;gap:clamp(28px,5vw,70px);padding:clamp(28px,4vw,56px);text-align:left;}.qrCopy{width:min(42vw,560px);justify-items:start;}.meetingName{font-size:clamp(36px,4vw,72px);}.meetingTime{font-size:clamp(22px,2.3vw,38px);}.qrHint{font-size:clamp(24px,2.5vw,42px);}img{width:min(72vh,42vw,720px);max-height:82vh;}}' +
      '@media(orientation:portrait){.qrStage{padding:28px 18px;}.meetingName{font-size:clamp(30px,8vw,58px);}img{width:min(76vw,58vh,620px);max-height:56vh;}}' +
      '</style>' +
      '</head>' +
      '<body>' +
      '<main class="qrStage">' +
      '<section class="qrCopy">' +
      '<h1 class="meetingName">' + meetingTitle + '</h1>' +
      (meetingTime ? '<p class="meetingTime">' + meetingTime + '</p>' : '') +
      '<p class="qrHint">請掃描 QR code 簽到</p>' +
      '</section>' +
      '<a id="qrLink" class="qrLink" href="' + safeSignUrl + '" target="_blank">' +
      '<img id="qrImage" src="' + safeQrUrl + '">' +
      '</a>' +
      '</main>' +
      '<script>' +
      popupRefreshScript +
      '<\/script>' +
      '</body>' +
      '</html>'
    );

    popup.document.close();

  }

  function hasSelectableMeetingOption(select){
    if(!select){
      return false;
    }

    return Array.from(select.options).some(function(option){
      const value = String(option.value || '').trim();
      const text = String(option.textContent || '').trim();

      if(!value){
        return false;
      }

      if(value.indexOf('<' + '?') >= 0 || text.indexOf('<' + '?') >= 0){
        return false;
      }

      return true;
    });
  }

  function ensureMeetingOptionsPlaceholder(){
    const select = document.getElementById('course');
    if(!select){
      return;
    }

    if(hasSelectableMeetingOption(select)){
      return;
    }

    select.innerHTML =
      '<option value="">正在載入會議清單...</option>';
  }

  function applyMeetingOptions(options){
    const select = document.getElementById('course');
    if(!select){
      return;
    }

    const html = String(options || '').trim();

    if(html){
      select.innerHTML = html;
    } else {
      select.innerHTML = '<option value="">目前沒有可用會議</option>';
    }
  }

  async function loadSignQRMeetingOptionsFromGithubApi(){
    const res = await callAppsScriptApi({ action:'getSignQRMeetingOptions' });
    if(!res || !res.ok){
      throw new Error((res && res.message) || '會議清單讀取失敗');
    }

    applyMeetingOptions(res.options);
  }

  function loadSignQRMeetingOptionsFromAppsScript(){
    return new Promise(function(resolve, reject){
      if(
        typeof google === 'undefined' ||
        !google.script ||
        !google.script.run
      ){
        reject(new Error('google.script.run 不可用'));
        return;
      }

      google.script.run
        .withSuccessHandler(function(options){
          applyMeetingOptions(options);
          resolve(options);
        })
        .withFailureHandler(function(error){
          reject(error);
        })
        .getSignQRMeetingOptions();
    });
  }

  async function loadSignQRMeetingOptions(){
    const select = document.getElementById('course');
    if(!select){
      return;
    }

    if(hasSelectableMeetingOption(select)){
      return;
    }

    const done =
      typeof pushAppWait === 'function'
        ? pushAppWait('正在讀取會議清單...')
        : function(){};

    try{
      if(isGithubPage()){
        await loadSignQRMeetingOptionsFromGithubApi();
      } else {
        await loadSignQRMeetingOptionsFromAppsScript();
      }
    } catch(error){
      console.warn('load sign QR options failed', error);
      select.innerHTML = '<option value="">會議清單讀取失敗</option>';
    } finally {
      done();
    }
  }

    document.body.style.padding = '0';

    if(!document.getElementById('githubAppShellStyle')){

        '.appWaitIndicator.is-active{display:flex;}' +

        '@keyframes appWaitSweep{from{transform:translateX(-100%);}to{transform:translateX(100%);}}' +
        '.appVersionFooter{position:fixed;left:0;right:0;bottom:0;z-index:10000;height:46px;display:flex;align-items:center;justify-content:center;padding:0 16px;box-sizing:border-box;background:rgba(248,251,255,.94);border-top:1px solid rgba(148,163,184,.38);box-shadow:0 -8px 24px rgba(15,23,42,.08);backdrop-filter:blur(10px);}' +
      '' +
      '.appVersionBadge{display:inline-flex;align-items:center;gap:5px;min-height:28px;padding:6px 10px;border:1px solid transparent;border-radius:999px;background:transparent;color:#64748b;font-size:11px;font-weight:800;line-height:1.1;text-decoration:none;white-space:nowrap;cursor:default;}' +
      '' +
      '.appVersionBadge.is-active{color:#ffffff;background:linear-gradient(135deg,#2563eb,#0f766e);border-color:transparent;box-shadow:0 8px 18px rgba(37,99,235,.20);}' +
      '.appVersionBadgeMode{font-weight:900;}' +
      '.appVersionText{font-weight:800;opacity:.9;}' +
      '' +
      '@media(max-width:600px){.appVersionFooter{height:42px;padding:0 8px}.appVersionBadge{font-size:10px;padding:5px 8px}}' +
        '@media(min-width:1200px){.shell,.wrap,.container,.testPage{width:var(--app-shell-wide-width)!important;max-width:none!important;margin-left:auto!important;margin-right:auto!important;padding-left:0!important;padding-right:0!important;}.appHeader{padding:0 var(--app-shell-wide-inset)!important;}}' +
        '@media(max-width:820px){.appHeader{padding:0 16px!important;}}';
      document.head.appendChild(shellStyle);
    }

    const mainShell = document.querySelector('.shell');
    if(mainShell){
      mainShell.style.flex = '1';
      mainShell.style.padding = '24px 24px 66px';
      mainShell.style.boxSizing = 'border-box';
    }

    if(!document.querySelector('.appHeader')){
      const ghHeader = document.createElement('header');
      ghHeader.className = 'appHeader';
      ghHeader.style.cssText = 'position:relative; flex-shrink:0; z-index:20; display:flex; justify-content:space-between; align-items:center; gap:18px; height:76px; margin:0; box-sizing:border-box; border-bottom:1px solid #dbe4ef; background:rgba(248,251,255,.92); backdrop-filter:blur(10px); box-shadow:0 8px 24px rgba(15,23,42,.06);';
      ghHeader.innerHTML =
        '<div class="brand" onclick="goHome()" style="display:flex; align-items:center; gap:14px; cursor:pointer;">' +
          '<div class="brandMark" style="width:46px; height:46px; display:grid; place-items:center; border-radius:14px; color:#ffffff; font-size:22px; font-weight:800; background:linear-gradient(135deg,#2563eb,#0f766e); box-shadow:0 12px 24px rgba(37,99,235,.2);">S</div>' +
          '<div class="brandText" style="display:grid; gap:2px;">' +
            '<span class="brandName" style="font-size:18px; font-weight:800;">新光整形外科科室系統</span>' +
            '<span class="brandSub" style="color:#64748b; font-size:13px;">簽到 QR 產生器</span>' +
          '</div>' +
        '</div>';
      document.body.prepend(ghHeader);
    }

    if(!document.getElementById('appWaitIndicator')){
      const waitNode = document.createElement('div');
      waitNode.id = 'appWaitIndicator';
      waitNode.className = 'appWaitIndicator';
      waitNode.setAttribute('role', 'status');
      waitNode.setAttribute('aria-live', 'polite');
      waitNode.setAttribute('aria-busy', 'false');
      waitNode.innerHTML =
        '<span class="appWaitSpinner" aria-hidden="true"></span>' +
        '<span id="appWaitText" class="appWaitText">處理中...</span>';
      document.body.appendChild(waitNode);
    }

    if(!window.AppWait || typeof window.AppWait.push !== 'function'){
      const waitStack = [];
      let waitSeq = 0;

      function renderWait(){
        const indicator = document.getElementById('appWaitIndicator');
        const textEl = document.getElementById('appWaitText');
        if(!indicator || !textEl){
          return;
        }

        const active = waitStack.length > 0;
        const current = active ? waitStack[waitStack.length - 1] : null;
        indicator.classList.toggle('is-active', active);
        indicator.setAttribute('aria-busy', active ? 'true' : 'false');
        textEl.innerText = current && current.message ? current.message : '處理中...';
      }

      function pushWait(message){
        const id = ++waitSeq;
        let closed = false;
        waitStack.push({ id:id, message:message || '處理中...' });
        renderWait();
        return function(){
          if(closed){
            return;
          }
          closed = true;
          const index = waitStack.findIndex(function(item){ return item.id === id; });
          if(index >= 0){
            waitStack.splice(index, 1);
          }
          renderWait();
        };
      }

      window.AppWait = { push:pushWait, render:renderWait };
      window.pushAppWait = pushWait;
      window.renderAppWaitIndicator = renderWait;
    }

    if(!document.querySelector('.appVersionFooter')){
      const ghFooter = document.createElement('div');
      ghFooter.className = 'appVersionFooter';
      ghFooter.dataset.appFooter = '1';
      ghFooter.innerHTML = `
    <div class="appVersionBadge is-active" aria-label="環境版本資訊">
      <span class="appVersionBadgeMode">測試版</span>
      <span class="appVersionText">v2.27.20-202606042358</span>
    </div>
  `;
      document.body.appendChild(ghFooter);
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    ensureMeetingOptionsPlaceholder();

    if(isGithubPage()){
      installGithubAppShellFallback();
    }

    loadSignQRMeetingOptions();
  });

</script>

</head>

<body>

<main class="shell">

  <?!= include('共用設定檔/AppShell', { subtitle: '簽到 QR 產生器', onClick: 'goHome()', maxWidth: '1400px', showCalendarSource: true }) ?>

  <nav class="pageMap" aria-label="頁面地圖">
    <button class="pageMapLink" onclick="goHome()">首頁</button>
    <span class="pageMapSep">/</span>
    <span class="pageMapCurrent">簽到 QR 產生器</span>
  </nav>

  <section class="pageHero">
    <p class="eyebrow">簽到工具</p>
    <h1>會議簽到 QR</h1>
    <p class="pageLead">選擇會議後產生簽到連結與 QR Code，供現場投影或列印使用。</p>
  </section>

  <section class="card">
    <div class="formGrid">
      <label class="fieldLabel" for="course">
        會議
        <select id="course">
          <?!= options ?>
        </select>
      </label>

      <label class="optionRow">

        <input
          type="checkbox"
          id="popupQR"
          checked
        >

        自動彈出全螢幕 QR

      </label>

      <button
        class="mainBtn"
        onclick="makeSignQR()"
      >
        產生 QR
      </button>
    </div>
  </section>

  <div id="result"></div>

</main>

</body>

</html>
