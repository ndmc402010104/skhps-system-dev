<!DOCTYPE html>
<html>

<head>

<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --line:#dbe4ef;
  --text:#172033;
  --muted:#64748b;
  --primary:#2563eb;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  min-height:100%;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
}

body{
  padding:118px 24px 82px;
  overflow-x:hidden;
}

.shell{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}

.pageHero{ margin-bottom:24px; }

.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.pageMapLink{
  border:0;
  padding:0;
  background:transparent;
  color:var(--primary);
  font:inherit;
  cursor:pointer;
}

.pageMapCurrent{ color:var(--text); }
.pageMapSep{ color:#94a3b8; }

.eyebrow{
  margin:0 0 10px;
  color:#1d4ed8;
  font-size:13px;
  font-weight:800;
}

h1{
  margin:0;
  font-size:clamp(28px,4vw,42px);
  line-height:1.18;
  letter-spacing:0;
}

.pageLead{
  margin:12px 0 0;
  color:#475569;
  font-size:16px;
  line-height:1.7;
}

.card{
  width:100%;
  background:var(--card);
  padding:28px;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.formGrid{
  display:grid;
  gap:18px;
}

.fieldLabel{
  display:grid;
  gap:8px;
  color:#334155;
  font-size:15px;
  font-weight:800;
}

select{
  width:100%;
  min-height:58px;
  padding:0 52px 0 16px;
  border:1px solid #cbd5e1;
  border-radius:8px;
  background:#ffffff;
  color:var(--text);
  font-size:17px;
  line-height:1.4;
}

select:focus{
  outline:3px solid rgba(37,99,235,.18);
  border-color:#93b4e8;
}

.optionRow{
  display:flex;
  align-items:center;
  gap:10px;
  width:max-content;
  max-width:100%;
  color:#475569;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.optionRow input{
  width:20px;
  height:20px;
  accent-color:var(--primary);
}

button{
  border-radius:8px;
  border:1px solid #d6dde7;
  background:#ffffff;
  color:#334155;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease,background .16s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(15,23,42,.08);
}

.mainBtn{
  width:100%;
  min-height:58px;
  padding:12px 18px;
  border:0;
  background:var(--primary);
  color:#ffffff;
  font-size:18px;
  font-weight:800;
}

.mainBtn:hover{
  background:#1d4ed8;
}

#result{
  margin-top:22px;
}

.qrPreview{
  display:grid;
  justify-items:center;
  gap:14px;
  text-align:center;
}

.qrPreview h2{
  margin:0;
  font-size:clamp(24px,3vw,34px);
  line-height:1.2;
}

.qrPreviewTime{
  margin:0;
  color:#475569;
  font-size:18px;
  font-weight:800;
}

.qrPreviewHint{
  margin:0;
  color:#1d4ed8;
  font-size:20px;
  font-weight:800;
}

.qrPreview img{
  width:420px;
  max-width:100%;
  cursor:pointer;
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  box-shadow:0 14px 32px rgba(15,23,42,.08);
}

@media(max-width:640px){
  body{
    padding:104px 16px 72px;
  }

  .card{
    padding:20px;
  }

  h1{
    font-size:28px;
  }

  select{
    min-height:54px;
    font-size:16px;
  }
}

</style>

<script>

  const APP_ENTRY_URL =
    '<?= appEntryUrl ?>';

  function goHome(){

    window.top.location.href =
      APP_ENTRY_URL;

  }

  function makeSignQR(){

    const meeting =
      getSelectedMeeting();

    const signUrl =
      buildSignQRUrl(
        meeting
      );

    const qrUrl =
      buildQRCodeImageUrl(
        signUrl
      );

    renderSignQR(
      signUrl,
      qrUrl,
      meeting
    );

    const enablePopup =
      document
        .getElementById('popupQR')
        .checked;

    if(enablePopup){

      openSignQRPopup(
        signUrl,
        qrUrl,
        meeting
      );

    }

  }

  function getSelectedMeeting(){

    const raw =
      decodeURIComponent(
        document
          .getElementById('course')
          .value
      );

    const parts =
      raw.split('||');

    return {
      course: parts[0],
      date: parts[1],
      token: parts[2]
    };

  }

  function buildSignQRUrl(meeting){

    return (
      APP_ENTRY_URL +
      '?page=signmeeting' +
      '&course=' +
      encodeURIComponent(meeting.course) +
      '&date=' +
      encodeURIComponent(meeting.date) +
      '&token=' +
      encodeURIComponent(meeting.token) +
      '&v=' +
      Date.now()
    );

  }

  function buildQRCodeImageUrl(signUrl){

    return (
      'https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&margin=30&data=' +
      encodeURIComponent(signUrl)
    );

  }

  function renderSignQR(signUrl,qrUrl,meeting){

    const meetingTitle =
      escapeHtml(meeting && meeting.course ? meeting.course : '會議簽到');

    const meetingTime =
      escapeHtml(meeting && meeting.date ? meeting.date : '');

    const safeSignUrl =
      escapeHtml(signUrl);

    const safeQrUrl =
      escapeHtml(qrUrl);

    document
      .getElementById('result')
      .innerHTML =
        '<section class="card qrPreview">' +
        '<h2>' + meetingTitle + '</h2>' +
        (meetingTime ? '<p class="qrPreviewTime">' + meetingTime + '</p>' : '') +
        '<p class="qrPreviewHint">請掃描 QR code 簽到</p>' +
        '<a href="' + safeSignUrl + '" target="_blank">' +
        '<img src="' + safeQrUrl + '">' +
        '</a>' +
        '</section>';

  }

  function escapeHtml(value){

    return String(value || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');

  }

  function openSignQRPopup(signUrl,qrUrl,meeting){

    const popup =
      window.open(
        '',
        '_blank'
      );

    if(!popup){

      alert(
        '瀏覽器阻擋了新分頁，請允許彈出視窗。'
      );

      return;

    }

    const meetingTitle =
      escapeHtml(meeting && meeting.course ? meeting.course : '會議簽到');

    const meetingTime =
      escapeHtml(meeting && meeting.date ? meeting.date : '');

    const safeSignUrl =
      escapeHtml(signUrl);

    const safeQrUrl =
      escapeHtml(qrUrl);

    popup.document.write(
      '<html>' +
      '<head>' +
      '<title>簽到 QR</title>' +
      '<style>' +
      'body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#f8fafc;color:#172033;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;}' +
      '.qrStage{width:100vw;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px;box-sizing:border-box;text-align:center;}' +
      '.qrCopy{max-width:min(88vw,860px);display:grid;justify-items:center;gap:14px;}' +
      '.meetingName{margin:0;font-size:clamp(34px,5vw,64px);line-height:1.12;font-weight:800;}' +
      '.meetingTime{margin:0;color:#475569;font-size:clamp(20px,2.8vw,34px);font-weight:700;}' +
      '.qrHint{margin:0;color:#1d4ed8;font-size:clamp(22px,3vw,38px);font-weight:800;}' +
      '.qrLink{display:block;}' +
      'img{width:min(68vh,78vw,680px);max-width:100%;max-height:62vh;cursor:pointer;background:#ffffff;border:1px solid #dbe4ef;border-radius:8px;padding:18px;box-sizing:border-box;box-shadow:0 18px 45px rgba(15,23,42,.12);}' +
      '@media(orientation:landscape){.qrStage{flex-direction:row;gap:clamp(28px,5vw,70px);padding:clamp(28px,4vw,56px);text-align:left;}.qrCopy{width:min(42vw,560px);justify-items:start;}.meetingName{font-size:clamp(36px,4vw,72px);}.meetingTime{font-size:clamp(22px,2.3vw,38px);}.qrHint{font-size:clamp(24px,2.5vw,42px);}img{width:min(72vh,42vw,720px);max-height:82vh;}}' +
      '@media(orientation:portrait){.qrStage{padding:28px 18px;}.meetingName{font-size:clamp(30px,8vw,58px);}img{width:min(76vw,58vh,620px);max-height:56vh;}}' +
      '</style>' +
      '</head>' +
      '<body>' +
      '<main class="qrStage">' +
      '<section class="qrCopy">' +
      '<h1 class="meetingName">' + meetingTitle + '</h1>' +
      (meetingTime ? '<p class="meetingTime">' + meetingTime + '</p>' : '') +
      '<p class="qrHint">請掃描 QR code 簽到</p>' +
      '</section>' +
      '<a class="qrLink" href="' + safeSignUrl + '" target="_blank">' +
      '<img src="' + safeQrUrl + '">' +
      '</a>' +
      '</main>' +
      '</body>' +
      '</html>'
    );

    popup.document.close();

  }

</script>

</head>

<body>

<main class="shell">

  <?!= include('共用設定檔/AppShell', { subtitle: '簽到 QR 產生器', onClick: 'goHome()', maxWidth: '1400px', showCalendarSource: true }) ?>

  <nav class="pageMap" aria-label="頁面地圖">
    <button class="pageMapLink" onclick="goHome()">首頁</button>
    <span class="pageMapSep">/</span>
    <span class="pageMapCurrent">簽到 QR 產生器</span>
  </nav>

  <section class="pageHero">
    <p class="eyebrow">簽到工具</p>
    <h1>會議簽到 QR</h1>
    <p class="pageLead">選擇會議後產生簽到連結與 QR Code，供現場投影或列印使用。</p>
  </section>

  <section class="card">
    <div class="formGrid">
      <label class="fieldLabel" for="course">
        會議
        <select id="course">
          <?!= options ?>
        </select>
      </label>

      <label class="optionRow">

        <input
          type="checkbox"
          id="popupQR"
          checked
        >

        自動彈出全螢幕 QR

      </label>

      <button
        class="mainBtn"
        onclick="makeSignQR()"
      >
        產生 QR
      </button>
    </div>
  </section>

  <div id="result"></div>

</main>

</body>

</html>
