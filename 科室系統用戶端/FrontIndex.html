.entryButton.dressing .entryIcon{

.entryButton.github .entryIcon{
color:#24292f;
background:#f3f4f6;

    height:44px;
  }

</style>


<script>

const APP_ENTRY_URL =
'<?= appEntryUrl ?>';

const APP_DEV_URL =
'<?= appDevUrl ?>';

const APP_PROD_URL =
'<?= appProdUrl ?>';

const APP_ENV =
'<?= appEnv ?>';

const GITHUB_PAGE_MAP = {
  home: '',
  dressingFront: '敷料領用登錄系統/DressingFront.html',
  dressingUse: '敷料領用登錄系統/DressingUse.html'
};

const GITHUB_PAGES_BASE_URL =
'https://ndmc402010104.github.io/plastic-surgery-department-system/';


function getGithubRepoBasePath(){

  const parts =
    window.location.pathname.split('/').filter(Boolean);

  return parts.length
    ? '/' + parts[0] + '/'
    : '/';

}


function getGithubPageUrl(pageKey){

  const path =
    GITHUB_PAGE_MAP[pageKey] || GITHUB_PAGE_MAP.home;

  if(window.location.hostname.includes('github.io')){
    return window.location.origin +
      getGithubRepoBasePath() +
      path;
  }

  return GITHUB_PAGES_BASE_URL +
    path;

}


function getCurrentAppEnv(){

  if(window.location.hostname.includes('github.io')){
    return 'prod';
  }

  if(APP_ENV === 'dev' || APP_ENV === 'prod'){
    return APP_ENV;
  }

  const sources = [
    window.location.href,
    document.referrer || ''
  ];

  try{
    sources.push(
      window.top.location.href
    );
  }
  catch(error){}

  for(let i = 0; i < sources.length; i++){

    const source =
      sources[i] || '';

    if(
      /[?&]appEnv=dev(?:&|#|$)/.test(source) ||
      /\/dev(?:[?#]|$)/.test(source)
    ){
      return 'dev';
    }

    if(
      /[?&]appEnv=prod(?:&|#|$)/.test(source) ||
      /\/exec(?:[?#]|$)/.test(source)
    ){
      return 'prod';
    }

  }

  return 'prod';

}


function buildAppPageUrl(baseUrl, page, env){

  const params =
    [];

  if(page){
    params.push(
      'page=' +
      encodeURIComponent(page)
    );
  }

  params.push(
    'appEnv=' +
    encodeURIComponent(env)
  );

  const separator =
    baseUrl.indexOf('?') >= 0
      ? '&'
      : '?';

  return baseUrl +
    separator +
    params.join('&');

}


function goPage(page){

  const env =
    getCurrentAppEnv();

  const baseUrl =
    env === 'dev'
      ? APP_DEV_URL
      : APP_PROD_URL;

  window.top.location.href =
    buildAppPageUrl(baseUrl, page, env);

}


function goHome(){

  const env =
    getCurrentAppEnv();

  window.top.location.href =
    env === 'dev'
      ? buildAppPageUrl(APP_DEV_URL, '', 'dev')
      : buildAppPageUrl(APP_PROD_URL, '', 'prod');

}


function goQR(){

  goPage(
    'signqr'
  );

}


function goHospitalSignIn(){

  goPage(
    'hospitalsignin'
  );

}


function goDressingFront(){

  const env =
    getCurrentAppEnv();

  window.top.location.href =
    env === 'dev'
      ? buildAppPageUrl(APP_DEV_URL, 'dressingfront', 'dev')
      : getGithubPageUrl('dressingFront');

}

function goUiTest(){

  goPage(
    'uitest'
  );

}

</script>
