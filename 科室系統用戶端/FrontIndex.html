<!DOCTYPE html>
<html>

<head>

<base target="_top">

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<style>

:root{
  --bg:#f4f7fb;
  --ink:#172033;
  --muted:#64748b;
  --line:#dbe4ef;
  --primary:#2563eb;
  --primaryDark:#1d4ed8;
  --mint:#0f766e;
  --amber:#b45309;
  --softBlue:#eaf2ff;
  --softMint:#e8f7f3;
  --softAmber:#fff4df;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,var(--bg) 100%);
}

.shell{
  width:min(980px,100%);
  margin:0 auto;
  padding:118px 24px 82px;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  height:88px;
  margin:0;
  padding:0 max(24px,calc((100vw - 980px) / 2 + 24px));
  box-sizing:border-box;
  border-bottom:1px solid var(--line);
  background:rgba(248,251,255,.92);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
}

.brandMark{
  width:46px;
  height:46px;
  display:grid;
  place-items:center;
  border-radius:14px;
  color:#ffffff;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#2563eb,#0f766e);
  box-shadow:0 12px 24px rgba(37,99,235,.2);
}

.brandText{
  display:grid;
  gap:2px;
}

.brandName{
  font-size:18px;
  font-weight:800;
}

.brandSub{
  color:var(--muted);
  font-size:13px;
}

.hero{
  display:block;
}

.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.pageMapCurrent{
  color:#172033;
}

.eyebrow{
  margin:0 0 10px;
  color:var(--primaryDark);
  font-size:13px;
  font-weight:800;
}

h1{
  max-width:760px;
  margin:0;
  font-size:clamp(32px,4.6vw,52px);
  line-height:1.12;
  letter-spacing:0;
}

.lead{
  max-width:760px;
  margin:18px 0 0;
  color:#475569;
  font-size:17px;
  line-height:1.7;
}

.panel{
  margin-top:28px;
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
  overflow:hidden;
}

.panelHead{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--line);
}

.panelHead h2{
  margin:0;
  font-size:20px;
}

.panelHead p{
  margin:8px 0 0;
  color:var(--muted);
  line-height:1.55;
}

.actions{
  display:grid;
  gap:12px;
  padding:18px;
}

.entryButton{
  width:100%;
  min-height:86px;
  display:grid;
  grid-template-columns:48px minmax(0,1fr) 24px;
  align-items:center;
  gap:14px;
  padding:16px;
  text-align:left;
  color:var(--ink);
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:8px;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}

.entryButton:hover{
  transform:translateY(-2px);
  border-color:#adc2e8;
  box-shadow:0 12px 24px rgba(15,23,42,.09);
}

.entryButton:focus-visible{
  outline:3px solid rgba(37,99,235,.25);
  outline-offset:2px;
}

.entryIcon{
  width:48px;
  height:48px;
  display:grid;
  place-items:center;
  border-radius:8px;
  font-size:22px;
  font-weight:800;
}

.entryButton.primary .entryIcon{
  color:var(--primaryDark);
  background:var(--softBlue);
}

.entryButton.dressing .entryIcon{
  color:var(--mint);
  background:var(--softMint);
}

.entryButton.github .entryIcon{
color:#24292f;
background:#f3f4f6;
}

.entryButton.secondary .entryIcon{
  color:var(--amber);
  background:var(--softAmber);
}

.entryTitle{
  display:block;
  font-size:18px;
  font-weight:800;
}

.entryDesc{
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}

.arrow{
  color:#94a3b8;
  font-size:24px;
  font-weight:400;
}

.footerNote{
  margin-top:18px;
  color:#64748b;
  font-size:13px;
  line-height:1.6;
}

@media(max-width:820px){
  .shell{
    padding:104px 16px 72px;
  }

  .topbar{
    align-items:flex-start;
    justify-content:center;
    height:88px;
    padding:0 16px;
  }

  .entryButton{
    grid-template-columns:44px minmax(0,1fr) 20px;
    min-height:78px;
    padding:14px;
  }

  .entryIcon{
    width:44px;
    height:44px;
  }
}

</style>


<script>

const APP_ENTRY_URL =
'<?= appEntryUrl ?>';


function goPage(page){

  window.top.location.href =
    APP_ENTRY_URL +
    '?page=' +
    encodeURIComponent(
      page
    );

}


function goQR(){

  goPage(
    'signqr'
  );

}


function goHospitalSignIn(){

  goPage(
    'hospitalsignin'
  );

}


function goDressingFront(){

  goPage(
    'dressingfront'
  );

}

function goGithubHome(){

window.open(
'https://ndmc402010104.github.io/plastic-surgery-department-system/',
'_blank'
);

}

</script>

</head>


<body>

<main class="shell">

<header class="topbar">

<div class="brand" onclick="window.top.location.href=APP_ENTRY_URL">
  <div class="brandMark">S</div>
  <div class="brandText">
    <span class="brandName">新光整形外科科室系統</span>
    <span class="brandSub">常用作業入口</span>
  </div>
</div>

</header>

<nav class="pageMap" aria-label="頁面地圖">
  <span class="pageMapCurrent">首頁</span>
</nav>

<section class="hero">

<p class="eyebrow">常用功能集中入口</p>

<h1>
把簽到、院內系統快速登入與敷料領用放在同一個工作台。
</h1>

<p class="lead">
選擇下方功能即可進入對應頁面。首頁保留清楚的入口面板，方便值班與行政流程快速切換。
</p>

<div class="panel">

<div class="panelHead">
  <h2>請選擇要使用的功能</h2>
  <p>依照目前作業情境進入對應表單或工具。</p>
</div>

<div class="actions">

<button
class="entryButton primary"
onclick="goQR()"
>
  <span class="entryIcon">QR</span>
  <span>
    <span class="entryTitle">簽到 QR 產生器</span>
    <span class="entryDesc">建立會議或課程簽到連結與 QR Code。</span>
  </span>
  <span class="arrow">›</span>
</button>

<button
class="entryButton secondary"
onclick="goHospitalSignIn()"
>
  <span class="entryIcon">院</span>
  <span>
    <span class="entryTitle">院內系統快速登入</span>
    <span class="entryDesc">提供院內常用人員與科室人員快速登入。</span>
  </span>
  <span class="arrow">›</span>
</button>

<button
class="entryButton dressing"
onclick="goDressingFront()"
>
  <span class="entryIcon">敷</span>
  <span>
    <span class="entryTitle">敷料領用登錄</span>
    <span class="entryDesc">進入 dressingFront，登錄病人敷料領用資料。</span>
  </span>
  <span class="arrow">›</span>
</button>

<button
class="entryButton github"
onclick="goGithubHome()"
>

<span class="entryIcon">

GH

</span>

<span>

<span class="entryTitle">

GitHub 首頁（測試）

</span>

<span class="entryDesc">

開啟 GitHub Pages 首頁，測試手機版與相機功能。

</span>

</span>

<span class="arrow">

↗

</span>

</button>

</div>

</div>

<p class="footerNote">
下方版本按鈕可切換正式與測試環境，並保留目前頁面參數。
</p>

</section>

</main>

<?!= getVersionBadgeHtml() ?>

</body>

</html>
